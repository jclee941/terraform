#cloud-config
hostname: staging
fqdn: staging.jclee.me
manage_etc_hosts: true

users:
  - name: jclee
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKtqkzRGFpy1dkgndShKi/Qv/HHs/kjX3wQFubrrTwea jclee@proxmox
      - ssh-rsa  jclee@dev

package_update: true
package_upgrade: false

packages:
  - build-essential
  - git
  - curl
  - wget
  - htop
  - vim
  - tmux
  - jq
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release

runcmd:
  # QEMU Guest Agent
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent

  # Docker CE - install
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin || { logger -t cloud-init-docker 'ERROR: Failed to install Docker CE'; exit 1; }
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker jclee

  # Watchtower - automatic container updates (daily at 04:00)
  - docker run -d --name watchtower --restart=unless-stopped -v /var/run/docker.sock:/var/run/docker.sock containrrr/watchtower --cleanup --schedule "0 0 4 * * *" || { logger -t cloud-init-watchtower 'ERROR: Failed to start Watchtower'; exit 1; }

  # Cloudflare WARP - install
  - curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg || { logger -t cloud-init-warp 'ERROR: Failed to fetch WARP GPG key'; exit 1; }
  - echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/cloudflare-client.list
  - apt-get update
  - apt-get install -y cloudflare-warp || { logger -t cloud-init-warp 'ERROR: Failed to install cloudflare-warp package'; exit 1; }
  # Cloudflare WARP - register (personal mode)
  - warp-cli --accept-tos registration new || { logger -t cloud-init-warp 'ERROR: WARP registration failed'; exit 1; }
  - warp-cli --accept-tos mode warp || logger -t cloud-init-warp 'WARN: Failed to set WARP mode'
  - warp-cli --accept-tos connect || logger -t cloud-init-warp 'WARN: WARP connect failed - will retry on next boot'
  # Verify WARP connection
  - sleep 5
  - curl -s https://www.cloudflare.com/cdn-cgi/trace/ | grep -q 'warp=on' && logger -t cloud-init-warp 'WARP connected successfully' || logger -t cloud-init-warp 'WARN: WARP connection pending - manual check required'

write_files:
  - path: /etc/default/qemu-guest-agent
    content: |
      DAEMON_ARGS="-fsfreeze-hook"
    owner: root:root
    permissions: '0644'
  - path: /etc/systemd/system/warp-svc-check.service
    content: |
      [Unit]
      Description=Cloudflare WARP Service Health Check
      After=warp-svc.service
      Wants=warp-svc.service

      [Service]
      Type=oneshot
      ExecStart=/bin/bash -c 'systemctl is-active warp-svc && warp-cli status || echo "warp-svc not running"'

      [Install]
      WantedBy=multi-user.target
    owner: root:root
    permissions: '0644'

final_message: "Cloud-init completed for staging (VM 220) with Docker, Watchtower, and Cloudflare WARP"
