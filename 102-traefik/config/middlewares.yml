# Traefik Dynamic Configuration - Resilient Middleware Chain
# Applied to all internal/MCP routes for retry + circuit breaker protection
#
# Usage: Add "mcp-resilient" middleware to any route:
#   middlewares:
#     - mcp-resilient@file

http:
  middlewares:
    # Retry failed requests up to 5 times with exponential backoff
    mcp-retry:
      retry:
        attempts: 5
        initialInterval: 100ms

    # Trip circuit breaker on high error rates
    mcp-circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.30 || ResponseCodeRatio(500, 600, 0, 600) > 0.25"

    # Combined resilient chain: retry first, then circuit breaker
    mcp-resilient:
      chain:
        middlewares:
          - mcp-retry
          - mcp-circuit-breaker

    # Rate limiting for external-facing endpoints
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # Security headers for all external-facing routes
    security-headers:
      headers:
        # HSTS: enforce HTTPS for 1 year, include subdomains
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        # Prevent clickjacking
        frameDeny: true
        # Prevent MIME-type sniffing
        contentTypeNosniff: true
        # XSS protection
        browserXssFilter: true
        # Referrer policy
        referrerPolicy: strict-origin-when-cross-origin
        # Permissions policy
        permissionsPolicy: camera=(), microphone=(), geolocation=(), payment=()
        # Content Security Policy
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'"
