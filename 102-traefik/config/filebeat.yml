filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/*.log
      - /var/log/syslog
    fields:
      service: system
    fields_under_root: true
    exclude_files:
      - 'traefik\.log$'
      - 'traefik-access\.log$'

  - type: log
    enabled: true
    paths:
      - /var/log/traefik.log
    fields:
      service: traefik
    fields_under_root: true

  - type: log
    enabled: true
    paths:
      - /var/log/traefik-access.log
    fields:
      service: traefik-access
    fields_under_root: true

output.logstash:
  hosts: ["192.168.50.105:5044"]

processors:
  - add_host_metadata: ~

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
