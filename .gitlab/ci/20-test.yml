# =============================================================================
# GitLab CI: Test Stage
# =============================================================================

# Module unit tests
test:modules:
  extends: .terraform_base
  stage: test
  script:
    - echo "Running module unit tests..."
    - cd tests/modules/proxmox && terraform init -backend=false && terraform test
    - cd ${CI_PROJECT_DIR}/tests/modules/shared && terraform init -backend=false && terraform test
  rules:
    - changes:
        - modules/**/*
        - tests/modules/**/*
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  allow_failure: true


# Integration tests
test:integration:
  extends: .terraform_base
  stage: test
  script:
    - cd tests/integration
    - terraform init -backend=false
    - terraform test
  rules:
    - changes:
        - tests/integration/**/*
        - modules/**/*
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  allow_failure: true


# Workspace validation tests
test:workspaces:
  extends: .terraform_base
  stage: test
  parallel:
    matrix:
      - TEST_DIR: "tests/workspaces/pve"
      - TEST_DIR: "tests/workspaces/cloudflare"
      - TEST_DIR: "tests/workspaces/elk"
      - TEST_DIR: "tests/workspaces/slack"
  script:
    - cd "${TEST_DIR}"
    - terraform init -backend=false
    - terraform test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  allow_failure: true
