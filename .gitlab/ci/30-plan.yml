# =============================================================================
# GitLab CI: Plan Stage
# =============================================================================

.terraform_plan_base:
  extends: .terraform_base
  stage: plan
  script:
    - cd "${TF_WORKING_DIR}"
    - terraform init -input=false
    - terraform plan -input=false -no-color -out=tfplan
    - terraform show -json tfplan > plan.json || true
    # Generate human-readable summary
    - terraform show tfplan > plan.txt
    - |
      echo "=== Plan Summary ==="
      grep -E "Plan:|No changes" plan.txt || echo "See full plan for details"
  artifacts:
    paths:
      - ${TF_WORKING_DIR}/tfplan
      - ${TF_WORKING_DIR}/plan.json
      - ${TF_WORKING_DIR}/plan.txt
    expire_in: 1 week
    reports:
      terraform: ${TF_WORKING_DIR}/plan.json

# Parallel plan for all workspaces
plan:all:
  extends: .terraform_plan_base
  parallel:
    matrix:
      - TF_WORKING_DIR: "100-pve"
        TF_WORKSPACE_NAME: "pve"
      - TF_WORKING_DIR: "102-traefik/terraform"
        TF_WORKSPACE_NAME: "traefik"
      - TF_WORKING_DIR: "104-grafana/terraform"
        TF_WORKSPACE_NAME: "grafana"
      - TF_WORKING_DIR: "105-elk/terraform"
        TF_WORKSPACE_NAME: "elk"
      - TF_WORKING_DIR: "108-archon/terraform"
        TF_WORKSPACE_NAME: "archon"
      - TF_WORKING_DIR: "215-synology"
        TF_WORKSPACE_NAME: "synology"
      - TF_WORKING_DIR: "300-cloudflare"
        TF_WORKSPACE_NAME: "cloudflare"
      - TF_WORKING_DIR: "310-safetywallet"
        TF_WORKSPACE_NAME: "safetywallet"
      - TF_WORKING_DIR: "320-slack"
        TF_WORKSPACE_NAME: "slack"
      - TF_WORKING_DIR: "400-gcp"
        TF_WORKSPACE_NAME: "gcp"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# Plan with infrastructure stub for dependent workspaces
plan:infra_dependent:
  extends: .terraform_plan_base
  needs:
    - job: setup:infra:stub
      artifacts: true
  parallel:
    matrix:
      - TF_WORKING_DIR: "102-traefik/terraform"
      - TF_WORKING_DIR: "104-grafana/terraform"
      - TF_WORKING_DIR: "105-elk/terraform"
      - TF_WORKING_DIR: "108-archon/terraform"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
