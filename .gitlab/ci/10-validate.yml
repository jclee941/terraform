# =============================================================================
# GitLab CI: Validate Stage
# =============================================================================

.terraform_base:
  image: hashicorp/terraform:1.10.5
  before_script:
    - terraform version
    - export TF_IN_AUTOMATION=true
    - export TF_INPUT=false

# Generic validation template with workspace parameter
.validate_template:
  extends: .terraform_base
  stage: validate
  script:
    - cd "${TF_WORKING_DIR}"
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate -no-color
    - |
      # Run tflint if available
      if command -v tflint &> /dev/null; then
        tflint --init 2>/dev/null || true
        tflint --format=compact 2>/dev/null || true
      fi
  rules:
    - changes:
        - "${TF_WORKING_DIR}/**/*"
      when: on_success
    - when: never

# Parallel validation for all workspaces
validate:all:
  extends: .terraform_base
  stage: validate
  parallel:
    matrix:
      - TF_WORKING_DIR: "100-pve"
        TF_WORKSPACE_NAME: "pve"
      - TF_WORKING_DIR: "102-traefik/terraform"
        TF_WORKSPACE_NAME: "traefik"
      - TF_WORKING_DIR: "104-grafana/terraform"
        TF_WORKSPACE_NAME: "grafana"
      - TF_WORKING_DIR: "105-elk/terraform"
        TF_WORKSPACE_NAME: "elk"
      - TF_WORKING_DIR: "108-archon/terraform"
        TF_WORKSPACE_NAME: "archon"
      - TF_WORKING_DIR: "215-synology"
        TF_WORKSPACE_NAME: "synology"
      - TF_WORKING_DIR: "300-cloudflare"
        TF_WORKSPACE_NAME: "cloudflare"
      - TF_WORKING_DIR: "310-safetywallet"
        TF_WORKSPACE_NAME: "safetywallet"
      - TF_WORKING_DIR: "320-slack"
        TF_WORKSPACE_NAME: "slack"
      - TF_WORKING_DIR: "400-gcp"
        TF_WORKSPACE_NAME: "gcp"
  script:
    - cd "${TF_WORKING_DIR}"
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate -no-color
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
