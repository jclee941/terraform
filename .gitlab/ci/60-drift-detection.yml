# =============================================================================
# GitLab CI: Drift Detection (Parallel)
# =============================================================================

# Scheduled drift detection for all workspaces - parallel execution
.drift_base:
  stage: verify
  extends: .terraform_base
  script:
    - |
      echo "========================================"
      echo "Drift Detection: ${TF_WORKING_DIR}"
      echo "========================================"

      cd "${CI_PROJECT_DIR}/${TF_WORKING_DIR}"

      # Initialize without backend for drift check
      terraform init -input=false -backend=false

      # Run plan with detailed exit code
      set +e
      terraform plan -detailed-exitcode -input=false -no-color
      EXIT_CODE=$?
      set -e

      case $EXIT_CODE in
        0)
          echo "✅ ${TF_WORKING_DIR}: No drift detected"
          ;;
        1)
          echo "❌ ${TF_WORKING_DIR}: Plan failed (configuration error)"
          exit 1
          ;;
        2)
          echo "⚠️ ${TF_WORKING_DIR}: DRIFT DETECTED"
          # Create GitLab issue (if glab available)
          if command -v glab &> /dev/null; then
            glab issue create \
              --title "[Drift] Changes detected in ${TF_WORKING_DIR}" \
              --label "terraform-drift,automated" \
              --description "Drift detected at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              || echo "Failed to create issue for ${TF_WORKING_DIR}"
          fi
          exit 1
          ;;
      esac
drift:detection:
  extends: .drift_base
  parallel:
    matrix:
      - TF_WORKING_DIR: "100-pve"
      - TF_WORKING_DIR: "102-traefik/terraform"
      - TF_WORKING_DIR: "104-grafana/terraform"
      - TF_WORKING_DIR: "105-elk/terraform"
      - TF_WORKING_DIR: "108-archon/terraform"
      - TF_WORKING_DIR: "215-synology"
      - TF_WORKING_DIR: "300-cloudflare/terraform"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  allow_failure: true
