# =============================================================================
# GitLab CI: Drift Detection
# =============================================================================

# Scheduled drift detection for all workspaces
drift:detection:
  stage: verify
  extends: .terraform_base
  variables:
    WORKSPACES: "100-pve 102-traefik/terraform 104-grafana/terraform 105-elk/terraform 108-archon/terraform 215-synology 300-cloudflare/terraform"
  script:
    - |
      echo "Running drift detection for workspaces..."
      DRIFT_DETECTED=false

      for ws in ${WORKSPACES}; do
        echo ""
        echo "========================================"
        echo "Checking: ${ws}"
        echo "========================================"

        cd "${CI_PROJECT_DIR}/${ws}"

        # Initialize without backend for drift check
        terraform init -input=false -backend=false || continue

        # Run plan with detailed exit code
        set +e
        terraform plan -detailed-exitcode -input=false -no-color
        EXIT_CODE=$?
        set -e

        case $EXIT_CODE in
          0)
            echo "✅ ${ws}: No drift detected"
            ;;
          1)
            echo "❌ ${ws}: Plan failed (configuration error)"
            ;;
          2)
            echo "⚠️ ${ws}: DRIFT DETECTED"
            DRIFT_DETECTED=true
            # Create GitLab issue (if glab available)
            if command -v glab &> /dev/null; then
              glab issue create \
                --title "[Drift] Changes detected in ${ws}" \
                --label "terraform-drift,automated" \
                --description "Drift detected at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                || echo "Failed to create issue for ${ws}"
            fi
            ;;
        esac

        cd "${CI_PROJECT_DIR}"
      done

      if [ "$DRIFT_DETECTED" = true ]; then
        echo ""
        echo "========================================"
        echo "⚠️  DRIFT DETECTED IN ONE OR MORE WORKSPACES"
        echo "========================================"
        exit 1
      else
        echo ""
        echo "✅ All workspaces match expected state"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  allow_failure: true
