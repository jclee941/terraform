# GitLab CI: NFS Cache Deployment Automation
# This job automates the manual deployment steps for GitLab Runner NFS cache

.deploy-nfs-cache-base:
  stage: deploy
  image: golang:1.22-alpine
  variables:
    # Host configurations
    SYNOLOGY_HOST: "192.168.50.215"
    PROXMOX_HOST: "192.168.50.100"
    LXC_ID: "101"
    # SSH options for non-interactive execution
    SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

# Step 1: Setup NFS Share on Synology
deploy-nfs-synology:
  extends: .deploy-nfs-cache-base
  script:
    - echo "=== Setting up NFS share on Synology ==="
    - |
      ssh $SSH_OPTS root@$SYNOLOGY_HOST << 'EOF'
        # Check if share already exists
        if synoshare --get gitlab-runner-cache 2>/dev/null | grep -q "gitlab-runner-cache"; then
          echo "✓ NFS share already exists"
        else
          echo "Creating NFS share..."
          mkdir -p /volume1/gitlab-runner-cache
          synoshare --add gitlab-runner-cache "GitLab Runner Cache" /volume1/gitlab-runner-cache
          synoshare --setnfs gitlab-runner-cache enable
          synonfsext --add-rule gitlab-runner-cache 192.168.50.0/24 rw
          echo "✓ NFS share created"
        fi
        
        # Verify
        echo "=== NFS Export Verification ==="
        showmount -e localhost || echo "NFS server status check"
        cat /etc/exports
      EOF
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# Step 2: Mount NFS on Proxmox and Configure LXC
deploy-nfs-proxmox:
  extends: .deploy-nfs-cache-base
  needs:
    - job: deploy-nfs-synology
      optional: true
  script:
    - echo "=== Copying deployment script to Proxmox ==="
    - scp $SSH_OPTS scripts/setup-nfs-cache-proxmox.go root@$PROXMOX_HOST:/tmp/
    
    - echo "=== Running deployment on Proxmox ==="
    - |
      ssh $SSH_OPTS root@$PROXMOX_HOST << EOF
        set -e
        echo "Mounting NFS share..."
        
        # Create mount point
        mkdir -p /mnt/gitlab-runner-cache
        
        # Check if already mounted
        if mountpoint -q /mnt/gitlab-runner-cache; then
          echo "✓ NFS already mounted"
        else
          # Mount NFS v4.1
          mount -t nfs -o vers=4.1,hard,intr,rsize=8192,wsize=8192,timeo=14 \
            $SYNOLOGY_HOST:/volume1/gitlab-runner-cache /mnt/gitlab-runner-cache
          echo "✓ NFS mounted"
        fi
        
        # Add to fstab if not present
        if ! grep -q "$SYNOLOGY_HOST:/volume1/gitlab-runner-cache" /etc/fstab; then
          echo "$SYNOLOGY_HOST:/volume1/gitlab-runner-cache /mnt/gitlab-runner-cache nfs vers=4.1,hard,intr 0 0" >> /etc/fstab
          echo "✓ Added to fstab"
        fi
        
        # Configure LXC mount point
        echo "Configuring LXC $LXC_ID mount point..."
        LXC_CONF="/etc/pve/lxc/$LXC_ID.conf"
        
        # Backup config
        cp \$LXC_CONF \$LXC_CONF.backup-$(date +%Y%m%d-%H%M%S)
        
        # Remove existing mount point config if present
        sed -i '/mp0:.*gitlab-runner-cache/d' \$LXC_CONF
        
        # Add mount point
        echo "mp0: /mnt/gitlab-runner-cache,mp=/srv/gitlab-runner/cache" >> \$LXC_CONF
        echo "✓ LXC mount point configured"
        
        # Restart LXC container
        echo "Restarting LXC $LXC_ID..."
        pct stop $LXC_ID || true
        sleep 2
        pct start $LXC_ID
        sleep 5
        
        # Wait for container to be ready
        for i in {1..30}; do
          if pct exec $LXC_ID -- echo "ready" 2>/dev/null | grep -q "ready"; then
            echo "✓ LXC is ready"
            break
          fi
          echo "Waiting for LXC to start... (\$i/30)"
          sleep 2
        done
        
        # Verify mount inside container
        echo "=== Verification ==="
        pct exec $LXC_ID -- df -h /srv/gitlab-runner/cache || echo "Mount not visible"
        pct exec $LXC_ID -- touch /srv/gitlab-runner/cache/.deploy-verification 2>/dev/null && \
          pct exec $LXC_ID -- rm /srv/gitlab-runner/cache/.deploy-verification && \
          echo "✓ Write test passed" || echo "✗ Write test failed"
      EOF
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# Step 3: Setup GitLab Runner
deploy-gitlab-runner:
  extends: .deploy-nfs-cache-base
  needs:
    - job: deploy-nfs-proxmox
      optional: true
  script:
    - echo "=== Setting up GitLab Runner in LXC $LXC_ID ==="
    - |
      ssh $SSH_OPTS root@$PROXMOX_HOST << EOF
        # Copy setup script into container
        pct exec $LXC_ID -- mkdir -p /opt/runner/scripts
        pct push $LXC_ID scripts/setup-gitlab-runner-with-cache.go /opt/runner/scripts/setup-gitlab-runner-with-cache.go
        
        # Run setup script inside container
        echo "Running GitLab Runner setup..."
        pct exec $LXC_ID -- bash -c "
          cd /opt/runner/scripts && \
          go run setup-gitlab-runner-with-cache.go
        "
        
        # Verify runner is running
        echo "=== Runner Status ==="
        pct exec $LXC_ID -- systemctl status gitlab-runner --no-pager || true
        pct exec $LXC_ID -- gitlab-runner status || true
      EOF
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# All-in-one deployment job
deploy-nfs-cache-all:
  extends: .deploy-nfs-cache-base
  script:
    - echo "=== Running complete NFS cache deployment ==="
    - |
      # Step 1: Synology
      echo "Step 1/3: Setting up Synology NFS share..."
      ssh $SSH_OPTS root@$SYNOLOGY_HOST "synoshare --get gitlab-runner-cache" 2>/dev/null || \
        ssh $SSH_OPTS root@$SYNOLOGY_HOST << 'SYNO_EOF'
          mkdir -p /volume1/gitlab-runner-cache
          synoshare --add gitlab-runner-cache "GitLab Runner Cache" /volume1/gitlab-runner-cache 2>/dev/null || true
          synoshare --setnfs gitlab-runner-cache enable
          synonfsext --add-rule gitlab-runner-cache 192.168.50.0/24 rw 2>/dev/null || true
          echo "Synology setup complete"
        SYNO_EOF
      
      # Step 2: Proxmox
      echo "Step 2/3: Configuring Proxmox and LXC..."
      ssh $SSH_OPTS root@$PROXMOX_HOST << 'PVE_EOF'
        set -e
        mkdir -p /mnt/gitlab-runner-cache
        mountpoint -q /mnt/gitlab-runner-cache || \
          mount -t nfs -o vers=4.1,hard,intr $SYNOLOGY_HOST:/volume1/gitlab-runner-cache /mnt/gitlab-runner-cache
        grep -q "$SYNOLOGY_HOST:/volume1/gitlab-runner-cache" /etc/fstab || \
          echo "$SYNOLOGY_HOST:/volume1/gitlab-runner-cache /mnt/gitlab-runner-cache nfs vers=4.1,hard,intr 0 0" >> /etc/fstab
        LXC_CONF="/etc/pve/lxc/101.conf"
        sed -i '/mp0:.*gitlab-runner-cache/d' \$LXC_CONF
        echo "mp0: /mnt/gitlab-runner-cache,mp=/srv/gitlab-runner/cache" >> \$LXC_CONF
        pct stop 101 2>/dev/null || true
        sleep 2
        pct start 101
        sleep 5
        for i in {1..30}; do
          pct exec 101 -- echo ready 2>/dev/null && break
          sleep 2
        done
        echo "Proxmox setup complete"
      PVE_EOF
      
      # Step 3: GitLab Runner
      echo "Step 3/3: Setting up GitLab Runner..."
      ssh $SSH_OPTS root@$PROXMOX_HOST << 'RUNNER_EOF'
        pct exec 101 -- mkdir -p /opt/runner/scripts
        pct push 101 scripts/setup-gitlab-runner-with-cache.go /tmp/setup-gitlab-runner-with-cache.go
        pct exec 101 -- bash -c "go run /tmp/setup-gitlab-runner-with-cache.go"
        pct exec 101 -- systemctl is-active gitlab-runner && echo "Runner is active"
      RUNNER_EOF
      
      echo ""
      echo "=== Deployment Complete ==="
      echo "NFS Cache: /srv/gitlab-runner/cache inside LXC 101"
      echo "Registry: registry.jclee.me → 192.168.50.215:5050"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
  environment:
    name: production/nfs-cache
    url: https://registry.jclee.me
