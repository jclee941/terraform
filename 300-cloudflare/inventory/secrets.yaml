# Secret Management Registry
# Values are NEVER stored here — only metadata
# Targets: cf_store (CF Secrets Store), github (GH Actions), vault (HashiCorp Vault)

store:
  id: "88dc5de305594f08aeb9bc04dad2f8cf"
  name: "jclee-secrets"
  account_id: "a8d9c67f586acdd15eebcc65ca3aa5bb"

github:
  owner: "jclee-homelab"
  repos:
    splunk: "splunk"
    blacklist: "blacklist"
    safework: "safework"
    safework2: "safework2"
    resume: "resume"
    money: "money"
    slack: "slack"
    proxmox: "proxmox"
    fortinet: "fortinet"
  # Additional orgs (sync.sh supports primary owner only; use scripts/setup-github-secrets.sh)
  external_repos:
    qws941: "terraform"

vault:
  address: "http://192.168.50.112:8200"
  mount: "secret"

secrets:
  # === TERRAFORM CI/CD (qws941/terraform) ===
  - name: AWS_ACCESS_KEY_ID
    category: ci_cd
    description: "R2-compatible S3 access key for Terraform state backend"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/cloudflare-r2"
    rotate_days: 365

  - name: AWS_SECRET_ACCESS_KEY
    category: ci_cd
    description: "R2-compatible S3 secret key for Terraform state backend"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/cloudflare-r2"
    rotate_days: 365

  - name: TF_API_TOKEN
    category: ci_cd
    description: "Terraform Cloud API token (if using TFC remote ops)"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]

  - name: TF_VAR_PROXMOX_ENDPOINT
    category: ci_cd
    description: "Proxmox VE API endpoint URL"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/proxmox"
    sensitive: false

  - name: TF_VAR_PROXMOX_API_TOKEN
    category: ci_cd
    description: "Proxmox VE API token (user@realm!tokenid=uuid)"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/proxmox"
    rotate_days: 180

  - name: TF_VAR_PROXMOX_INSECURE
    category: ci_cd
    description: "Skip TLS verification for Proxmox API (true/false)"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
    sensitive: false

  - name: TF_VAR_GRAFANA_AUTH
    category: ci_cd
    description: "Grafana admin API key or service account token"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "monitoring/grafana"
    rotate_days: 180

  - name: TF_VAR_N8N_WEBHOOK_URL
    category: ci_cd
    description: "n8n webhook base URL for Grafana alert contact points"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
    sensitive: false

  - name: TF_VAR_SUPABASE_URL
    category: ci_cd
    description: "Supabase project URL for Archon workspace"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
    sensitive: false

  - name: TF_VAR_CLOUDFLARE_ACCOUNT_ID
    category: ci_cd
    description: "Cloudflare account ID for 300-cloudflare workspace"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/cloudflare"
    sensitive: false

  - name: TF_VAR_CLOUDFLARE_ZONE_ID
    category: ci_cd
    description: "Cloudflare DNS zone ID for jclee.me"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/cloudflare"
    sensitive: false

  - name: TF_VAR_SYNOLOGY_DOMAIN
    category: ci_cd
    description: "Synology NAS domain for tunnel proxy"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
    sensitive: false

  - name: TF_VAR_ACCESS_ALLOWED_EMAILS
    category: ci_cd
    description: "Comma-separated emails allowed in CF Access policies"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
    sensitive: false

  - name: TF_VAR_GITHUB_TOKEN
    category: ci_cd
    description: "GitHub PAT for 300-cloudflare and 301-github workspaces"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
    rotate_days: 90

  - name: TF_VAR_VAULT_TOKEN
    category: ci_cd
    description: "HashiCorp Vault token for 300-cloudflare workspace"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
      vault: "infra/vault"
    rotate_days: 90

  - name: CLOUDFLARE_API_TOKEN
    category: ci_cd
    description: "Cloudflare API token for Worker deployment"
    projects: [terraform]
    targets:
      github_external: [qws941/terraform]
