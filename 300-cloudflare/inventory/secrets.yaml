# Secret Management Registry
# Values are NEVER stored here — only metadata
# Targets: cf_store (CF Secrets Store), github (GH Actions)

store:
  id: "88dc5de305594f08aeb9bc04dad2f8cf"
  name: "jclee-secrets"
  account_id: "a8d9c67f586acdd15eebcc65ca3aa5bb"

github:
  owner: "jclee-homelab"
  repos:
    blacklist: "blacklist"
    safework: "safework"
    resume: "resume"
    money: "money"
    slack: "slack"
    proxmox: "proxmox"
    fortinet: "fortinet"
  # Additional orgs (sync.sh supports primary owner only; use scripts/setup-github-secrets.sh)
  external_repos:
    qws941-lab: "terraform"

secrets:
  # === TERRAFORM CI/CD (qws941-lab/terraform) ===
  - name: TF_API_TOKEN
    category: ci_cd
    description: "Terraform Cloud API token (if using TFC remote ops)"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]

  - name: TF_VAR_PROXMOX_ENDPOINT
    category: ci_cd
    description: "Proxmox VE API endpoint URL"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_PROXMOX_API_TOKEN
    category: ci_cd
    description: "Proxmox VE API token (user@realm!tokenid=uuid)"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    rotate_days: 180

  - name: TF_VAR_PROXMOX_INSECURE
    category: ci_cd
    description: "Skip TLS verification for Proxmox API (true/false)"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_GRAFANA_AUTH
    category: ci_cd
    description: "Grafana admin API key or service account token"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    rotate_days: 180

  - name: TF_VAR_N8N_WEBHOOK_URL
    category: ci_cd
    description: "n8n webhook base URL for Grafana alert contact points"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_SUPABASE_URL
    category: ci_cd
    description: "Supabase project URL for Archon workspace"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_CLOUDFLARE_ACCOUNT_ID
    category: ci_cd
    description: "Cloudflare account ID for 300-cloudflare workspace"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_CLOUDFLARE_ZONE_ID
    category: ci_cd
    description: "Cloudflare DNS zone ID for jclee.me"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_SYNOLOGY_DOMAIN
    category: ci_cd
    description: "Synology NAS domain for tunnel proxy"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_ACCESS_ALLOWED_EMAILS
    category: ci_cd
    description: "Comma-separated emails allowed in CF Access policies"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    sensitive: false

  - name: TF_VAR_GITHUB_TOKEN
    category: ci_cd
    description: "GitHub PAT for 300-cloudflare workspace"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    rotate_days: 90

  - name: CLOUDFLARE_API_TOKEN
    category: ci_cd
    description: "Cloudflare API token for Worker deployment"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    rotate_days: 365

  - name: GH_PAT
    category: ci_cd
    description: "GitHub PAT for milestone automation workflow"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    rotate_days: 90

  - name: CF_ACCESS_CLIENT_ID
    category: ci_cd
    description: "Cloudflare Access service token client ID"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]

  - name: CF_ACCESS_CLIENT_SECRET
    category: ci_cd
    description: "Cloudflare Access service token client secret"
    projects: [terraform]
    targets:
      github_external: [qws941-lab/terraform]
    rotate_days: 365

  # === INFRASTRUCTURE ===
  - name: CLOUDFLARE_API_KEY
    category: infrastructure
    description: "Cloudflare Global API Key"
    projects: [resume, blacklist]
    targets:
      github: [resume, blacklist]
    rotate_days: 365

  - name: CLOUDFLARE_EMAIL
    category: infrastructure
    description: "Cloudflare account email"
    projects: [resume, blacklist]
    targets:
      github: [resume, blacklist]
    sensitive: false

  - name: CLOUDFLARE_ACCOUNT_ID
    category: infrastructure
    description: "Cloudflare account ID"
    projects: [resume, blacklist]
    targets:
      github: [resume, blacklist]
    sensitive: false

  - name: PROXMOX_API_TOKEN
    category: infrastructure
    description: "Proxmox API token (user@realm!tokenid=uuid)"
    projects: [proxmox]
    targets:
    rotate_days: 180

  # === MESSAGING (SLACK) ===
  - name: SLACK_BOT_TOKEN
    category: messaging
    description: "Slack Bot OAuth token (xoxb-)"
    projects: [slack]
    targets:
      github: [slack]
    rotate_days: 365

  - name: SLACK_APP_TOKEN
    category: messaging
    description: "Slack App-level token (xapp-)"
    projects: [slack]
    targets:
      github: [slack]

  - name: SLACK_WEBHOOK_URL
    category: messaging
    description: "Slack incoming webhook URL for Grafana alerts and GlitchTip notifications"
    projects: [proxmox, terraform]
    targets:

  # === DATABASE ===
  - name: POSTGRES_PASSWORD
    category: database
    description: "PostgreSQL root password"
    projects: [blacklist]
    targets:
      github: [blacklist]
    rotate_days: 90

  # === APPLICATION SECURITY ===
  - name: FLASK_SECRET_KEY
    category: app_security
    description: "Flask CSRF/session secret key (min 32 chars)"
    projects: [blacklist]
    targets:
      github: [blacklist]
    rotate_days: 180

  - name: CREDENTIAL_MASTER_KEY
    category: app_security
    description: "AES-256 credential encryption key (min 32 chars)"
    projects: [blacklist]
    targets:
      github: [blacklist]
    rotate_days: 365

  # === THREAT INTEL ===
  - name: REGTECH_ID
    category: threat_intel
    description: "Korean Financial Security Institute ID"
    projects: [blacklist]
    targets:
      github: [blacklist]

  - name: REGTECH_PW
    category: threat_intel
    description: "Korean Financial Security Institute password"
    projects: [blacklist]
    targets:
      github: [blacklist]
    rotate_days: 90

  - name: SECUDIUM_ID
    category: threat_intel
    description: "Secudium threat intel provider ID"
    projects: [blacklist]
    targets:
      github: [blacklist]

  - name: SECUDIUM_PW
    category: threat_intel
    description: "Secudium threat intel provider password"
    projects: [blacklist]
    targets:
      github: [blacklist]
    rotate_days: 90

  - name: CF_INGEST_API_KEY
    category: threat_intel
    description: "Cloudflare Workers ingest API key"
    projects: [blacklist]
    targets:
      cf_store: true
      github: [blacklist]

  # === AI / LLM ===
  - name: ANTHROPIC_API_KEY
    category: ai
    description: "Anthropic Claude API key"
    projects: [money]
    targets:
      github: [money]
    rotate_days: 365

  - name: OPENAI_API_KEY
    category: ai
    description: "OpenAI API key"
    projects: [money]
    targets:
      github: [money]
    rotate_days: 365

  - name: GEMINI_API_KEY
    category: ai
    description: "Google Gemini API key"
    projects: [resume]
    targets:
      github: [resume]
    rotate_days: 365

  # === MEDIA / CONTENT ===
  - name: ELEVENLABS_API_KEY
    category: media
    description: "ElevenLabs TTS API key"
    projects: [money]
    targets:
      github: [money]

  - name: REPLICATE_API_TOKEN
    category: media
    description: "Replicate image generation token"
    projects: [money]
    targets:
      github: [money]

  - name: RUNWAY_API_KEY
    category: media
    description: "Runway video generation API key"
    projects: [money]
    targets:
      github: [money]

  - name: SUNO_API_KEY
    category: media
    description: "Suno music generation API key"
    projects: [money]
    targets:
      github: [money]

  # === ELK STACK ===
  - name: ELASTIC_PASSWORD
    category: monitoring
    description: "Elasticsearch admin password"
    projects: [proxmox]
    targets:
    rotate_days: 90

  - name: KIBANA_SYSTEM_PASSWORD
    category: monitoring
    description: "Kibana system user password"
    projects: [proxmox]
    targets:
    rotate_days: 90
