# Archon Knowledge Base — Documentation Sources
# Used by scripts/sync-sources.go to automate crawl/embedding pipeline.
# For SPA sites (ingest_method: inject), use scripts/inject-docs.go instead.
#
# Fields:
#   url:                  Root URL to crawl
#   tags:                 Categorization tags (list)
#   knowledge_type:       documentation | api_reference | tutorial (default: documentation)
#   max_depth:            Crawl depth limit (default: 2)
#   update_frequency:     Re-crawl interval in days (default: 7)
#   extract_code_examples: Extract code blocks (default: true)
#   enabled:              Set false to skip without removing (default: true)
#   ingest_method:        crawl (default) | inject (for SPA sites needing direct injection)

sources:
  # --- Infrastructure ---
  - url: https://pve.proxmox.com/wiki/Main_Page
    tags: [infra, proxmox]
    knowledge_type: documentation
    max_depth: 2

  - url: https://docs.docker.com/compose/
    tags: [infra, docker]
    knowledge_type: documentation
    max_depth: 2

  - url: https://doc.traefik.io/traefik/
    tags: [infra, traefik, networking]
    knowledge_type: documentation
    max_depth: 2

  - url: https://coredns.io/manual/toc/
    tags: [infra, coredns, dns]
    knowledge_type: documentation
    max_depth: 1

  # --- Monitoring & Observability ---
  - url: https://www.elastic.co/guide/en/elasticsearch/reference/current/index.html
    tags: [observability, elk, elasticsearch]
    knowledge_type: documentation
    max_depth: 2

  - url: https://grafana.com/docs/grafana/latest/
    tags: [observability, grafana]
    knowledge_type: documentation
    max_depth: 2

  # --- Database & Backend ---
  - url: https://supabase.com/docs
    tags: [backend, supabase, database]
    knowledge_type: documentation
    max_depth: 2

  # --- IaC ---
  - url: https://developer.hashicorp.com/terraform/language
    tags: [iac, terraform]
    knowledge_type: documentation
    max_depth: 2

  - url: https://developer.hashicorp.com/terraform/cli
    tags: [iac, terraform]
    knowledge_type: documentation
    max_depth: 1

  # --- AI / LLM ---
  - url: https://github.com/ollama/ollama/blob/main/docs/api.md
    tags: [ai, ollama]
    knowledge_type: api_reference
    max_depth: 1

  - url: https://github.com/coleam00/archon
    tags: [ai, archon]
    knowledge_type: documentation
    max_depth: 1

  - url: https://opencode.ai/docs/
    tags: [ai, opencode]
    knowledge_type: documentation
    max_depth: 2
    ingest_method: inject  # SPA site — use inject-docs.go with --sitemap-url https://opencode.ai/sitemap.xml

  - url: https://github.com/sst/opencode
    tags: [ai, opencode]
    knowledge_type: documentation
    max_depth: 1

  # --- CI/CD ---
  - url: https://docs.github.com/en/actions
    tags: [ci, github-actions]
    knowledge_type: documentation
    max_depth: 2
