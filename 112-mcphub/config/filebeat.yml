# REFERENCE ONLY — deployed via templates/filebeat.yml.tftpl + config-renderer.
# Do NOT edit this file; edit the template instead.
filebeat.inputs:
  # Docker container logs (MCPHub, n8n, proxmox-sidecar, playwright-sidecar)
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    fields:
      service: mcphub
    fields_under_root: true
    max_bytes: 500000
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: log

  # System logs
  - type: log
    enabled: true
    paths:
      - /var/log/*.log
      - /var/log/syslog
      - /var/log/auth.log
    fields:
      service: mcphub
    fields_under_root: true
    max_bytes: 500000

output.logstash:
  hosts: ["192.168.50.105:5044"]

processors:
  - add_host_metadata: ~

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
