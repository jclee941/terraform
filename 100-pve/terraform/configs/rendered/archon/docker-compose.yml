services:
  archon-server:
    build:
      context: ./python
      dockerfile: Dockerfile.server
    container_name: archon-server
    ports:
      - "8181:8181"
    environment:
      - SUPABASE_URL=https://supabase.jclee.me
      - SUPABASE_SERVICE_KEY=eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJyb2xlIjogInNlcnZpY2Vfcm9sZSIsICJpc3MiOiAic3VwYWJhc2UiLCAiaWF0IjogMTc3MTYwMDgwMCwgImV4cCI6IDIwODY5NjA4MDB9.vLTEQu-8UATji7axVljZzlmPUrbqbFmx7fjXaQc580Y
      - OPENAI_API_KEY=placeholder
      - SERVICE_DISCOVERY_MODE=docker_compose
      - LOG_LEVEL=INFO
      - ARCHON_SERVER_PORT=8181
      - ARCHON_MCP_PORT=8051
      - ARCHON_UI_PORT=3737
      - ARCHON_HOST=0.0.0.0
    networks:
      - app-network
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "src.server.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8181"
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  archon-mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.mcp
    container_name: archon-mcp
    ports:
      - "8051:8051"
    environment:
      - SUPABASE_URL=https://supabase.jclee.me
      - SUPABASE_SERVICE_KEY=eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJyb2xlIjogInNlcnZpY2Vfcm9sZSIsICJpc3MiOiAic3VwYWJhc2UiLCAiaWF0IjogMTc3MTYwMDgwMCwgImV4cCI6IDIwODY5NjA4MDB9.vLTEQu-8UATji7axVljZzlmPUrbqbFmx7fjXaQc580Y
      - OPENAI_API_KEY=placeholder
      - TRANSPORT=sse
      - ARCHON_MCP_PORT=8051
      - ARCHON_SERVER_PORT=8181
    networks:
      - app-network
    depends_on:
      archon-server:
        condition: service_healthy
    restart: unless-stopped

  archon-frontend:
    build: ./archon-ui-main
    container_name: archon-ui
    ports:
      - "3737:3737"
    environment:
      - VITE_ARCHON_SERVER_PORT=8181
      - ARCHON_SERVER_PORT=8181
      - HOST=0.0.0.0
      - PROD=false
      - DOCKER_ENV=true
    networks:
      - app-network
    depends_on:
      archon-server:
        condition: service_healthy
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
