# Filebeat configuration for 110-n8n (Workflow Automation)
# Rendered by Terraform - DO NOT EDIT MANUALLY

filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true

filebeat.inputs:
  # Docker container logs (n8n, n8n-postgres, n8n-cadvisor, n8n-postgres-exporter)
  - type: filestream
    id: docker-containers
    paths:
      - /var/lib/docker/containers/*/*.log
    parsers:
      - container: {}
    prospector.scanner.symlinks: true
    fields:
      service: n8n
      host_role: n8n
    fields_under_root: false

  # System logs
  - type: filestream
    id: system-logs
    paths:
      - /var/log/*.log
      - /var/log/syslog
    fields:
      service: system
      host_role: n8n
    fields_under_root: false

processors:
  - add_host_metadata: ~
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["192.168.50.105:5044"]

filebeat.registry.path: /var/lib/filebeat/registry
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7

max_message_bytes: 999999
