# Filebeat configuration for 102-traefik (Reverse Proxy)
# Rendered by Terraform - DO NOT EDIT MANUALLY

filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true

filebeat.inputs:
  # Docker container logs
  - type: filestream
    id: docker-containers
    paths:
      - /var/lib/docker/containers/*/*.log
    parsers:
      - container: {}
    prospector.scanner.symlinks: true
    fields:
      service: traefik
      host_role: traefik
    fields_under_root: false

  # System logs
  - type: filestream
    id: system-logs
    paths:
      - /var/log/*.log
      - /var/log/syslog
    exclude_files:
      - 'traefik.*\.log'
    fields:
      service: system
      host_role: traefik
    fields_under_root: false

  # Traefik access logs
  - type: filestream
    id: traefik-access-logs
    paths:
      - /var/log/traefik-access.log
    fields:
      service: traefik-access
      host_role: traefik
    fields_under_root: false

processors:
  - add_host_metadata: ~
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["192.168.50.105:5044"]

filebeat.registry.path: /var/lib/filebeat/registry
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7

max_message_bytes: 999999
