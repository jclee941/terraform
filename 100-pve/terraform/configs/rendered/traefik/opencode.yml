http:
  routers:
    opencode:
      rule: Host(`opencode.jclee.me`)
      entryPoints:
        - websecure
      service: opencode
      middlewares:
        - rate-limit-standard@file
        - chain-basic-auth@file
      tls:
        certResolver: cf
      priority: 10

    opencode-http:
      rule: Host(`opencode.jclee.me`)
      entryPoints:
        - web
      service: opencode
      priority: 10

  services:
    opencode:
      loadBalancer:
        servers:
          - url: http://192.168.50.200:8090
