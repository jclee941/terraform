http:
  routers:
    archon:
      rule: Host(`archon.jclee.me`)
      entryPoints:
        - websecure
      service: archon
      middlewares:
        - rate-limit-api@file
        - chain-basic-auth@file
      tls:
        certResolver: cf
      priority: 10

    archon-http:
      rule: Host(`archon.jclee.me`)
      entryPoints:
        - web
      service: archon
      priority: 10

  services:
    archon:
      loadBalancer:
        servers:
          - url: http://192.168.50.108:3737
