http:
  routers:
    gitlab:
      rule: Host(`gitlab.jclee.me`)
      entryPoints:
        - websecure
      service: gitlab
      middlewares:
        - rate-limit-relaxed@file
      tls:
        certResolver: cf
      priority: 10

    gitlab-http:
      rule: Host(`gitlab.jclee.me`)
      entryPoints:
        - web
      service: gitlab
      priority: 10

  services:
    gitlab:
      loadBalancer:
        servers:
          - url: http://192.168.50.215:8929
