#cloud-config
hostname: youtube
manage_etc_hosts: true

package_update: true
package_upgrade: false

packages:
  - qemu-guest-agent
  - curl
  - vim
  - git
  - gnupg
  - docker.io
  - docker-compose-v2
  - fail2ban

write_files:
  - path: /etc/filebeat/filebeat.yml
    permissions: '0644'
    owner: root:root
    content: |
      # Filebeat configuration for 220-youtube (YouTube Media Server)
      # Rendered by Terraform - DO NOT EDIT MANUALLY
      
      filebeat.autodiscover:
        providers:
          - type: docker
            hints.enabled: true
      
      filebeat.inputs:
        # Docker container logs (media services, watchtower)
        - type: filestream
          id: docker-containers
          paths:
            - /var/lib/docker/containers/*/*.log
          parsers:
            - container: {}
          prospector.scanner.symlinks: true
          fields:
            service: youtube
            host_role: youtube
          fields_under_root: false
      
        # System logs
        - type: filestream
          id: system-logs
          paths:
            - /var/log/*.log
            - /var/log/syslog
          fields:
            service: youtube
            host_role: youtube
          fields_under_root: false
      
      processors:
        - add_host_metadata: ~
        - add_docker_metadata:
            host: "unix:///var/run/docker.sock"
      
      output.logstash:
        hosts: ["192.168.50.105:5044"]
      
      filebeat.registry.path: /var/lib/filebeat/registry
      logging.level: info
      logging.to_files: true
      logging.files:
        path: /var/log/filebeat
        name: filebeat
        keepfiles: 7
      
      max_message_bytes: 999999
      
  - path: /opt/youtube/docker-compose.yml
    permissions: '0644'
    owner: root:root
    content: |
      # Generated by Terraform. DO NOT EDIT MANUALLY.
      services:
        youtube-automation:
          image: alpine:latest
          container_name: youtube-automation
          restart: unless-stopped
          network_mode: bridge
          stop_grace_period: 10s
          env_file:
            - .env
          volumes:
            - ./gcloud-config:/root/.config/gcloud
          healthcheck:
            test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'tail -f' || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
          logging:
            driver: json-file
            options:
              max-size: "10m"
              max-file: "3"
          command: ["sh", "-c", "tail -f /dev/null"]
      
        cadvisor:
          image: gcr.io/cadvisor/cadvisor:v0.51.0
          container_name: cadvisor
          ports:
            - "8888:8080"
          volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
          deploy:
            resources:
              limits:
                memory: 128M
                cpus: '0.25'
          logging:
            driver: json-file
            options:
              max-size: "10m"
              max-file: "3"
          restart: unless-stopped
      
  - path: /opt/youtube/.env
    permissions: '0600'
    owner: root:root
    content: |
      # YouTube Automation - Terraform Rendered Environment Configuration
      # Generated by Terraform. DO NOT EDIT MANUALLY.
      # Template: 220-youtube/templates/.env.tftpl
      
      # Google OAuth Credentials
      GOOGLE_CLIENT_ID=
      GOOGLE_CLIENT_SECRET=
      GOOGLE_REFRESH_TOKEN=
      GOOGLE_PROJECT_ID=
      
      # YouTube
      YOUTUBE_CHANNEL_ID=
      

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - systemctl enable docker
  - systemctl start docker
  - # SSH hardening
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - systemctl restart sshd
  - # fail2ban SSH jail
  - printf '[sshd]\nenabled = true\nport = ssh\nfilter = sshd\nmaxretry = 5\nbantime = 3600\n' > /etc/fail2ban/jail.d/sshd.conf
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - # Google Cloud CLI
  - curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
  - echo 'deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main' | tee /etc/apt/sources.list.d/google-cloud-sdk.list
  - apt-get update && apt-get install -y google-cloud-cli
  - # YouTube automation setup
  - mkdir -p /opt/youtube/gcloud-config
  - cd /opt/youtube && docker compose up -d || true

final_message: "Cloud-init completed for youtube"
