#cloud-config

users:
  - name: jclee
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ssh-rsa  root@pve3

hostname: ollama
manage_etc_hosts: true

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - gnupg
  - software-properties-common
  - ubuntu-drivers-common
  - pciutils
  - qemu-guest-agent

runcmd:
  # Enable QEMU guest agent
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  # Install NVIDIA driver (RTX 5070 Ti / GB203 — requires 570+ series)
  - ubuntu-drivers install --gpgpu nvidia:570-server
  # Load nvidia modules
  - modprobe nvidia
  # Install Ollama
  - curl -fsSL https://ollama.ai/install.sh | sh
  # Configure Ollama to listen on all interfaces
  - mkdir -p /etc/systemd/system/ollama.service.d
  - |
    cat > /etc/systemd/system/ollama.service.d/override.conf << 'CONF'
    [Service]
    Environment="OLLAMA_HOST=0.0.0.0"
    CONF
  - systemctl daemon-reload
  - systemctl enable ollama
  - systemctl restart ollama

final_message: "Cloud-init completed for ollama — NVIDIA driver and Ollama installed"
