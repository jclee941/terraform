# Auto-label configuration for actions/labeler
# Maps file path patterns to PR labels

# === Content Type Labels ===

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'
          - 'README*'
          - 'CHANGELOG*'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '*.yml'
          - '*.yaml'
          - 'Makefile'

terraform:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.tf'
          - '**/*.tfvars'
          - '**/.terraform.lock.hcl'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - '**/Dockerfile*'
          - '**/docker-compose*.yml'
          - '**/.dockerignore'

python:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.py'
          - 'requirements*.txt'
          - 'pyproject.toml'
          - 'setup.py'
          - 'setup.cfg'

typescript:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.ts'
          - '**/*.tsx'
          - '**/*.js'
          - '**/*.jsx'
          - 'package.json'
          - 'tsconfig*.json'

shell:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.sh'
          - '**/*.bash'

config:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.json'
          - '**/*.toml'
          - '**/*.ini'
          - '**/*.cfg'
          - '.editorconfig'
          - '.gitignore'

# === Risk Tier Labels (aligned with auto-merge.yml) ===

risk:critical:
  - changed-files:
      - any-glob-to-any-file:
          - '100-pve/**'
          - 'modules/**'
          - '300-cloudflare/**'
          - '301-github/**'
          - '102-traefik/**'

risk:medium:
  - changed-files:
      - any-glob-to-any-file:
          - '105-elk/**'
          - '107-supabase/**'
          - '108-archon/**'
          - '112-mcphub/**'
          - '200-oc/**'
          - '220-staging/**'

