---
name: Create Issue on Failure
description: >
  Composite action to create a GitHub Issue when a workflow fails.
  Standardizes failure notification across all CI/CD workflows.
  Supports custom title/body, flexible dedup matching, and title updates.

inputs:
  title-prefix:
    description: 'Title prefix for dedup matching and default title generation (e.g., "[Terraform] Apply failed")'
    required: true
  extra-body:
    description: "Additional context to append to auto-generated body"
    required: false
    default: ""
  labels:
    description: "Comma-separated labels for the issue"
    required: false
    default: "bug,automation,codex"
  github-token:
    description: "GitHub token for creating issues"
    required: false
    default: ${{ github.token }}
  custom-title:
    description: "Full issue title (overrides auto-generated title from title-prefix). Leave empty for default."
    required: false
    default: ""
  custom-body:
    description: "Full issue body (replaces auto-generated body entirely). Leave empty for default."
    required: false
    default: ""
  title-match:
    description: "Dedup match mode against title-prefix: prefix (startsWith), exact (===), contains (includes)"
    required: false
    default: "prefix"
  update-title:
    description: "Update existing issue title on recurrence (true/false)"
    required: false
    default: "false"
  comment-body:
    description: "Custom comment on recurrence. Leave empty to use auto-generated or custom-body."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Create Failure Issue
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
      env:
        INPUT_TITLE_PREFIX: ${{ inputs.title-prefix }}
        INPUT_EXTRA_BODY: ${{ inputs.extra-body }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_CUSTOM_TITLE: ${{ inputs.custom-title }}
        INPUT_CUSTOM_BODY: ${{ inputs.custom-body }}
        INPUT_TITLE_MATCH: ${{ inputs.title-match }}
        INPUT_UPDATE_TITLE: ${{ inputs.update-title }}
        INPUT_COMMENT_BODY: ${{ inputs.comment-body }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const today = new Date().toISOString().split('T')[0];
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const commit = context.sha.substring(0, 7);
          const titlePrefix = process.env.INPUT_TITLE_PREFIX;
          const extraBody = process.env.INPUT_EXTRA_BODY;
          const customTitle = process.env.INPUT_CUSTOM_TITLE;
          const customBody = process.env.INPUT_CUSTOM_BODY;
          const titleMatch = process.env.INPUT_TITLE_MATCH || 'prefix';
          const updateTitle = process.env.INPUT_UPDATE_TITLE === 'true';
          const customCommentBody = process.env.INPUT_COMMENT_BODY;
          const labels = process.env.INPUT_LABELS.split(',').map(l => l.trim()).filter(Boolean);

          // GraphQL mutation for assigning Codex bot
          const assignMutation = `mutation($issueId: ID!, $assigneeIds: [ID!]!) {
            addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: $assigneeIds}) {
              clientMutationId
            }
          }`;

          // Build issue title
          const issueTitle = customTitle || `${titlePrefix} (${today})`;

          // Build issue body
          let body;
          if (customBody) {
            body = customBody;
          } else {
            body = [
              `## Workflow Failure`,
              ``,
              `**Date:** ${today}`,
              `**Commit:** [\`${commit}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
              `**Triggered by:** ${context.actor}`,
              `**Workflow:** ${context.workflow}`,
              `**Run:** [View logs](${runUrl})`,
            ].join('\n');

            if (extraBody) {
              body += `\n\n${extraBody}`;
            }

            body += [
              ``,
              ``,
              `### Action Required`,
              `- [ ] Check the [workflow run](${runUrl}) for error details`,
              `- [ ] Fix the root cause and re-run`,
              `- [ ] Close this issue when resolved`,
              ``,
              `---`,
              `*Auto-generated by ${context.workflow}*`,
            ].join('\n');
          }

          // Dedup: search for existing open issue
          const { data: existingIssues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: labels.join(','),
            per_page: 100,
          });

          let duplicate;
          if (titleMatch === 'exact') {
            duplicate = existingIssues.find(issue => issue.title === titlePrefix);
          } else if (titleMatch === 'contains') {
            duplicate = existingIssues.find(issue => issue.title.includes(titlePrefix));
          } else {
            duplicate = existingIssues.find(issue => issue.title.startsWith(titlePrefix));
          }

          if (duplicate) {
            // Build comment body for recurrence
            let commentContent;
            if (customCommentBody) {
              commentContent = customCommentBody;
            } else if (customBody) {
              commentContent = customBody;
            } else {
              commentContent = [
                `## Recurring Failure (${today})`,
                ``,
                `**Commit:** [\`${commit}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
                `**Triggered by:** ${context.actor}`,
                `**Run:** [View logs](${runUrl})`,
                ``,
                `This workflow failed again. See the run logs for details.`,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: duplicate.number,
              body: commentContent,
            });

            if (updateTitle) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                title: issueTitle,
              });
            }

            // Assign Codex bot via GraphQL (REST silently ignores bot accounts)
            try {
              await github.graphql(assignMutation, {
                issueId: duplicate.node_id,
                assigneeIds: ['BOT_kgDODnSAjQ'],
              });
            } catch (e) {
              core.warning('Failed to assign Codex: ' + e.message);
            }

            core.info(`Updated existing issue #${duplicate.number} instead of creating duplicate`);
          } else {
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body,
              labels,
            });

            // Assign Codex bot via GraphQL (REST silently ignores bot accounts)
            try {
              await github.graphql(assignMutation, {
                issueId: created.data.node_id,
                assigneeIds: ['BOT_kgDODnSAjQ'],
              });
            } catch (e) {
              core.warning('Failed to assign Codex: ' + e.message);
            }

            core.info(`Created issue #${created.data.number}`);
          }
