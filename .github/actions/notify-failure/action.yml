name: Create Issue on Failure
description: >
  Composite action to create a GitHub Issue when a workflow fails.
  Standardizes failure notification across all CI/CD workflows.

inputs:
  title-prefix:
    description: 'Title prefix for the issue (e.g., "[Terraform] Apply failed")'
    required: true
  extra-body:
    description: 'Additional context to append to the issue body'
    required: false
    default: ''
  labels:
    description: 'Comma-separated labels for the issue'
    required: false
    default: 'bug,automation'
  github-token:
    description: 'GitHub token for creating issues'
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Create Failure Issue
      uses: actions/github-script@v8
      env:
        INPUT_TITLE_PREFIX: ${{ inputs.title-prefix }}
        INPUT_EXTRA_BODY: ${{ inputs.extra-body }}
        INPUT_LABELS: ${{ inputs.labels }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const today = new Date().toISOString().split('T')[0];
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const commit = context.sha.substring(0, 7);
          const titlePrefix = process.env.INPUT_TITLE_PREFIX;
          const extraBody = process.env.INPUT_EXTRA_BODY;
          const labels = process.env.INPUT_LABELS.split(',').map(l => l.trim()).filter(Boolean);

          let body = [
            `## Workflow Failure`,
            ``,
            `**Date:** ${today}`,
            `**Commit:** [\`${commit}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
            `**Triggered by:** @${context.actor}`,
            `**Workflow:** ${context.workflow}`,
            `**Run:** [View logs](${runUrl})`,
          ].join('\n');

          if (extraBody) {
            body += `\n\n${extraBody}`;
          }

          body += [
            ``,
            ``,
            `### Action Required`,
            `- [ ] Check the [workflow run](${runUrl}) for error details`,
            `- [ ] Fix the root cause and re-run`,
            `- [ ] Close this issue when resolved`,
            ``,
            `---`,
            `*Auto-generated by ${context.workflow}*`,
          ].join('\n');

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `${titlePrefix} (${today})`,
            body,
            labels
          });
