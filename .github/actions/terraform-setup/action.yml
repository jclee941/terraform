name: Setup Terraform
description: >
  Composite action to install Terraform and run terraform init.
  Standardizes Terraform setup across plan, apply, and drift workflows.

inputs:
  terraform-version:
    description: 'Terraform version to install'
    required: false
    default: '1.10.5'
  working-directory:
    description: 'Directory containing Terraform configuration'
    required: true
  init-args:
    description: 'Additional arguments for terraform init'
    required: false
    default: '-input=false'
  install-tflint:
    description: 'Install tflint for linting'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Install tflint
      if: inputs.install-tflint == 'true'
      shell: bash
      run: |
        curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        tflint --version

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init ${{ inputs.init-args }}
