---
name: Import Proxmox Resources
description: >
  Import existing Proxmox LXC/VM/firewall resources into Terraform state.
  Ensures resources already provisioned on the Proxmox node are tracked by
  Terraform without being recreated.

inputs:
  working-directory:
    description: 'Terraform working directory containing the state'
    required: true

runs:
  using: composite
  steps:
    - name: Import existing Proxmox resources
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python3 - <<'PY'
        import os
        import subprocess
        import sys

        has_connect = bool(os.getenv("OP_CONNECT_HOST") and os.getenv("OP_CONNECT_TOKEN"))
        service_token = os.getenv("OP_SERVICE_ACCOUNT_TOKEN") or os.getenv("TF_VAR_op_service_account_token")

        if not (has_connect or service_token):
            print("1Password credentials missing: set OP_CONNECT_HOST/OP_CONNECT_TOKEN or OP_SERVICE_ACCOUNT_TOKEN/TF_VAR_op_service_account_token")
            sys.exit(1)

        resources = [
            ('module.lxc["runner"].proxmox_virtual_environment_container.this', 'pve3/101'),
            ('module.lxc["traefik"].proxmox_virtual_environment_container.this', 'pve3/102'),
            ('module.lxc["coredns"].proxmox_virtual_environment_container.this', 'pve3/103'),
            ('module.lxc["grafana"].proxmox_virtual_environment_container.this', 'pve3/104'),
            ('module.lxc["elk"].proxmox_virtual_environment_container.this', 'pve3/105'),
            ('module.lxc["glitchtip"].proxmox_virtual_environment_container.this', 'pve3/106'),
            ('module.lxc["supabase"].proxmox_virtual_environment_container.this', 'pve3/107'),
            ('module.lxc["archon"].proxmox_virtual_environment_container.this', 'pve3/108'),
            ('module.vm["mcphub"].proxmox_virtual_environment_vm.this', 'pve3/112'),
            ('module.vm["youtube"].proxmox_virtual_environment_vm.this', 'pve3/220'),
            ('module.vm["ollama"].proxmox_virtual_environment_vm.this', 'pve3/109'),
            ('proxmox_virtual_environment_firewall_rules.container["runner"]', 'container/pve3/101'),
            ('proxmox_virtual_environment_firewall_rules.container["traefik"]', 'container/pve3/102'),
            ('proxmox_virtual_environment_firewall_rules.container["coredns"]', 'container/pve3/103'),
            ('proxmox_virtual_environment_firewall_rules.container["grafana"]', 'container/pve3/104'),
            ('proxmox_virtual_environment_firewall_rules.container["elk"]', 'container/pve3/105'),
            ('proxmox_virtual_environment_firewall_rules.container["glitchtip"]', 'container/pve3/106'),
            ('proxmox_virtual_environment_firewall_rules.container["supabase"]', 'container/pve3/107'),
            ('proxmox_virtual_environment_firewall_rules.container["archon"]', 'container/pve3/108'),
            ('proxmox_virtual_environment_firewall_rules.vm["mcphub"]', 'vm/pve3/112'),
            ('proxmox_virtual_environment_firewall_rules.vm["jclee_dev"]', 'vm/pve3/200'),
        ]

        def run(cmd):
            return subprocess.run(cmd, text=True, capture_output=True)

        for address, import_id in resources:
            show = run(["terraform", "state", "show", address])
            if show.returncode == 0:
                print(f"already managed: {address}")
                continue

            imp = run(["terraform", "import", "-input=false", address, import_id])
            output = (imp.stdout or "") + (imp.stderr or "")
            if imp.returncode == 0:
                print(f"imported {address} <- {import_id}")
                continue
            if "already managed by Terraform" in output:
                print(f"already managed: {address}")
                continue
            if any(p in output.lower() for p in ["non-existent", "not found", "does not exist", "unable to find", "unable to read", "404"]):
                print(f"not yet provisioned, will be created: {address}")
                continue
            print(output)
            sys.exit(imp.returncode)
        PY
