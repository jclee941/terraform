# Workflow Registry
# Canonical catalog of all GitHub Actions workflows in this repository.
# Maintained alongside workflow changes. Do not auto-generate.
#
# Convention:
#   - Reusable templates: _name.yml (underscore prefix)
#   - Thin callers: name.yml (no underscore, delegates via workflow_call)
#   - Direct workflows: name.yml (self-contained, no template delegation)
#
# Runner policy:
#   - self-hosted: network-dependent jobs (Terraform, health checks, service access)
#   - ubuntu-latest: stateless CI jobs (lint, scan, docs, bots)

templates:
  # --- Terraform core ---
  - file: _terraform-apply.yml
    name: Terraform Apply (Reusable)
    purpose: Apply Terraform changes for a workspace
    runner: self-hosted
    callers:
      - archon-apply.yml
      - cloudflare-apply.yml
      - elk-apply.yml
      - grafana-apply.yml
      - slack-apply.yml
      - traefik-apply.yml

  - file: _terraform-plan.yml
    name: Terraform Plan (Reusable)
    purpose: Plan Terraform changes for a workspace on PR
    runner: self-hosted
    callers:
      - archon-plan.yml
      - cloudflare-plan.yml
      - elk-plan.yml
      - grafana-plan.yml
      - slack-plan.yml
      - traefik-plan.yml

  - file: _terraform-drift.yml
    name: Terraform Drift Detection (Reusable)
    purpose: Scheduled drift detection across workspaces
    runner: self-hosted
    callers:
      - terraform-drift.yml

  - file: _terraform-test.yml
    name: Terraform Test (Reusable)
    purpose: Unit, workspace, and integration test suites
    runner: ubuntu-latest
    callers:
      - terraform-test.yml

  - file: _terraform-docs.yml
    name: Terraform Docs (Reusable)
    purpose: Auto-generate terraform-docs on PR
    runner: ubuntu-latest
    callers:
      - terraform-docs.yml

  - file: _tfstate-backup.yml
    name: Terraform State Backup (Reusable)
    purpose: Weekly encrypted backup of .tfstate files
    runner: self-hosted
    callers:
      - tfstate-backup.yml

  # --- Security & compliance ---
  - file: _security-scan.yml
    name: Security Scan (Reusable)
    purpose: TFLint + Checkov + tfsec + Trivy security scanning
    runner: self-hosted
    callers:
      - security-scan.yml

  - file: _secret-audit.yml
    name: Secret Audit (Reusable)
    purpose: Audit 1Password secret references against Terraform usage
    runner: self-hosted
    callers:
      - secret-audit.yml

  - file: _secret-sync.yml
    name: Secret Sync (Reusable)
    purpose: Sync 1Password secrets to GitHub Actions secrets
    runner: self-hosted
    callers:
      - secret-sync.yml

  - file: _onepassword-test.yml
    name: 1Password Integration Test (Reusable)
    purpose: Validate 1Password Connect Server connectivity and secret retrieval
    runner: self-hosted
    callers:
      - onepassword-test.yml

  # --- Health checks & verification ---
  - file: _production-verify.yml
    name: Production Verify (Reusable)
    purpose: Post-apply production verification (DNS, services, certs)
    runner: self-hosted
    callers: []  # Called from terraform-apply workflows via needs/composite

  - file: _elk-health-check.yml
    name: ELK Health Check (Reusable)
    purpose: Elasticsearch cluster health, Logstash, ILM policy verification
    runner: self-hosted
    callers:
      - elk-health-check.yml

  - file: _mcp-health-check.yml
    name: MCP Health Check (Reusable)
    purpose: MCPhub server health and MCP endpoint verification
    runner: self-hosted
    callers:
      - mcp-health-check.yml

  - file: _internal-service-access.yml
    name: Internal Service Access Test (Reusable)
    purpose: CF Access-authenticated service reachability (6 services + negative tests)
    runner: ubuntu-latest
    callers:
      - internal-service-access.yml

  # --- CI quality gates ---
  - file: _pr-review.yml
    name: PR Review & Validation (Reusable)
    purpose: Detect changes, yamllint, TF validate/fmt, trivy, governance checks, PR comment
    runner: ubuntu-latest
    callers:
      - pr-review.yml

  - file: _infracost.yml
    name: Infracost (Reusable)
    purpose: Infrastructure cost estimation on PRs
    runner: ubuntu-latest
    callers: []  # Available for caller integration

  # --- Deployment ---
  - file: _worker-deploy.yml
    name: Worker Deploy (Reusable)
    purpose: Deploy Cloudflare Worker via wrangler
    runner: self-hosted
    callers:
      - worker-deploy.yml

  # --- Release ---
  - file: _release.yml
    name: Release (Reusable)
    purpose: Create GitHub release with conventional commit changelog
    runner: ubuntu-latest
    callers:
      - release.yml

  - file: _branch-cleanup.yml
    name: Branch Cleanup (Reusable)
    purpose: Delete merged branches with protected branch guard
    runner: ubuntu-latest
    callers:
      - branch-cleanup.yml

  # --- AI & automation ---
  - file: _opencode.yml
    name: OpenCode AI (Reusable)
    purpose: AI-assisted code changes via issue/PR comments
    runner: ubuntu-latest
    callers:
      - opencode.yml

  - file: _auto-fix-ci.yml
    name: Auto-Fix CI (Reusable)
    purpose: AI-assisted automatic fix for failed CI runs
    runner: ubuntu-latest
    callers:
      - auto-fix-ci.yml

  - file: _codex-pr-review.yml
    name: Codex PR Review (Reusable)
    purpose: AI-assisted PR code review via Codex
    runner: ubuntu-latest
    callers:
      - codex-pr-review.yml

  - file: _issue-lifecycle.yml
    name: Issue Lifecycle (Reusable)
    purpose: Auto-close issues linked to merged PRs
    runner: ubuntu-latest
    callers:
      - issue-lifecycle.yml

  - file: _milestone-automation.yml
    name: Milestone Automation (Reusable)
    purpose: Auto-assign milestones to issues and PRs
    runner: ubuntu-latest
    callers:
      - milestone-automation.yml

direct:
  # --- Terraform dispatch ---
  - file: terraform-apply.yml
    name: Terraform Apply
    trigger: workflow_dispatch
    purpose: Manual multi-workspace Terraform apply
    runner: self-hosted

  - file: terraform-plan.yml
    name: Terraform Plan
    trigger: pull_request
    purpose: Multi-workspace Terraform plan on PR (legacy direct)
    runner: self-hosted

  # --- PR automation (SSoT-synced) ---
  - file: auto-merge.yml
    name: Auto Merge
    trigger: pull_request_target
    purpose: Risk-tier labeling + auto-merge (low only)
    runner: ubuntu-latest

  - file: commitlint.yml
    name: Commitlint
    trigger: pull_request_target
    purpose: Enforce conventional commit messages
    runner: ubuntu-latest

  - file: labeler.yml
    name: Auto-label PRs
    trigger: pull_request_target
    purpose: Auto-apply labels based on changed paths (SSoT-synced)
    runner: ubuntu-latest

  - file: pr-size.yml
    name: PR Size
    trigger: pull_request_target
    purpose: Label PRs by size (XS/S/M/L/XL)
    runner: ubuntu-latest

  # --- Release (SSoT-synced) ---
  - file: release-drafter.yml
    name: Release Drafter
    trigger: push (master)
    purpose: Draft release notes from merged PRs
    runner: ubuntu-latest

  # --- Issue/PR bots (SSoT-synced) ---
  - file: codex-auto-issue.yml
    name: Codex Auto-Issue
    trigger: issues (labeled)
    purpose: AI-generated implementation plan on labeled issues
    runner: ubuntu-latest

  - file: welcome.yml
    name: Welcome
    trigger: issues (opened)
    purpose: Welcome message for new issue authors
    runner: ubuntu-latest

  - file: lock-threads.yml
    name: Lock Threads
    trigger: schedule
    purpose: Lock stale resolved issues/PRs
    runner: ubuntu-latest

  - file: stale.yml
    name: Stale issue/PR cleanup
    trigger: schedule + workflow_dispatch
    purpose: Mark and close stale issues/PRs (SSoT-synced)
    runner: ubuntu-latest

  - file: codex-triage.yml
    name: Codex Triage
    trigger: issues (opened)
    purpose: AI-assisted issue triage for failure-related issues (SSoT-synced)
    runner: ubuntu-latest
