name: "Codex: Refactor / Migration"
description: Refactoring, script migration, or workflow consolidation via Codex
labels: ["codex", "automated", "refactor"]
body:
  - type: markdown
    attributes:
      value: |
        ### Codex Refactor Connector
        Use this template for code migrations, workflow consolidation, and structural improvements.
        Codex will execute the refactoring atomically — behavior must not change.

  - type: dropdown
    id: refactor-type
    attributes:
      label: Refactor Type
      description: What kind of refactoring is this?
      options:
        - Script migration (shell → Go)
        - Workflow consolidation (standalone → reusable)
        - Module extraction / split
        - File reorganization / rename
        - Dependency update (provider versions, action SHAs)
        - Configuration normalization
        - Test coverage improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk Tier
      description: |
        Critical: 100-pve, modules, 300-cloudflare, 102-traefik, .github/workflows
        Medium: 105-elk, 107-supabase, 108-archon, 112-mcphub
        Low: everything else
      options:
        - Critical
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: |
        List the files and directories affected by this refactoring.
        Be explicit about what is IN scope and what is OUT of scope.
      placeholder: |
        **IN scope:**
        - `scripts/create-pr.sh` → migrate to `scripts/create-pr.go`
        - Update references in docs/AGENTS.md, Makefile

        **OUT of scope:**
        - Other shell scripts not related to PR creation
        - Workflow changes
    validations:
      required: true

  - type: textarea
    id: instruction
    attributes:
      label: Refactoring Instructions
      description: |
        Step-by-step instructions for Codex. Include the current state,
        desired end state, and specific transformation rules.
      placeholder: |
        Migrate `scripts/create-pr.sh` from shell to Go:

        1. Create `scripts/create-pr.go` preserving all current functionality:
           - Branch creation from specified base
           - Commit with message (currently uses --no-verify — remove this)
           - Push to remote
           - `gh pr create` with title, body, labels
           - --json and --dry-run flag support
           - Return to base branch after completion
        2. Update Makefile target `create-pr` to call `go run scripts/create-pr.go`
        3. Update references in `scripts/AGENTS.md`
        4. Delete `scripts/create-pr.sh`
        5. Run `go vet scripts/create-pr.go`
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Rules Codex must follow during refactoring.
      value: |
        - Behavior must NOT change unless explicitly specified
        - Do NOT mix refactoring with functional changes
        - Update ALL references (docs, configs, scripts, Makefile) in the same change
        - Follow monorepo naming conventions (kebab-case dirs, lowercase files)
        - Include BUILD.bazel and OWNERS if creating new directories
        - Commit message format: `refactor({module}): {description}`
    validations:
      required: false

  - type: textarea
    id: verification
    attributes:
      label: Verification Steps
      description: How to confirm the refactoring is behavior-preserving.
      placeholder: |
        - All existing tests pass (`make test`)
        - `terraform fmt -check -recursive` passes
        - `terraform validate` passes in affected workspaces
        - `npm run lint:naming` passes
        - No broken imports/references (`grep` for old paths returns 0 results)
        - Dry-run of migrated script produces same output as original
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Related issues, ADRs, or prior discussion about this refactoring.
    validations:
      required: false
