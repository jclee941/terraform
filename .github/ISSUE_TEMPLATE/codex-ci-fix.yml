name: "🔧 Codex CI Fix"
description: Capture a failing workflow run so Codex can diagnose root cause and land a reliable fix.
labels: ["codex", "automated", "ci"]
assignees: [qws941]
body:
  - type: markdown
    attributes:
      value: |
        ### Codex CI/CD Fix Connector
        Use this template to have Codex diagnose and fix broken workflows.
        Paste the failing workflow run URL and error logs — Codex will trace the root cause and apply a fix.

  - type: dropdown
    id: workflow
    attributes:
      label: Failing Workflow
      description: Which workflow is broken?
      options:
        - Archon Apply
        - Archon Plan
        - Auto Fix CI
        - Auto Merge
        - Backup Health Check
        - Backup Restore Test
        - Branch Cleanup
        - Cloudflare Apply
        - Cloudflare Health Check
        - Cloudflare Plan
        - Codex Auto Issue
        - Codex PR Review
        - Codex Triage
        - Commitlint
        - Credential Rotation Reminder
        - ELK Apply
        - ELK Health Check
        - ELK Plan
        - External Uptime Check
        - GitHub Apply
        - GitHub Plan
        - Grafana Apply
        - Grafana Plan
        - Internal Service Access
        - Issue Lifecycle
        - Labeler
        - Lock Threads
        - MCP Health Check
        - Milestone Automation
        - Ollama Apply
        - Ollama Plan
        - 1Password Integration Test
        - OpenCode
        - PR Review
        - PR Size
        - Production Verify
        - Release
        - Release Drafter
        - Runner Health Check
        - Secret Audit
        - Secret Sync
        - Security Scan
        - Slack Apply
        - Slack Plan
        - Stale
        - Synology Health Check
        - Terraform Apply
        - Terraform Docs
        - Terraform Drift
        - Terraform Plan
        - Terraform Test
        - TFState Backup
        - Traefik Apply
        - Traefik Plan
        - Welcome
        - Worker Deploy
    validations:
      required: true

  - type: input
    id: run-url
    attributes:
      label: Failing Run URL
      description: Link to the failing GitHub Actions run.
      placeholder: "https://github.com/qws941/terraform/actions/runs/..."
    validations:
      required: false

  - type: textarea
    id: error-log
    attributes:
      label: Error Log
      description: |
        Paste the relevant error output from the failing run.
        **IMPORTANT**: Redact any secrets, tokens, or passwords before pasting.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: failure-type
    attributes:
      label: Failure Type
      description: What kind of failure is this?
      options:
        - Terraform plan/apply error
        - Terraform init error (backend, provider)
        - 1Password / secrets connectivity
        - Provider API error (Proxmox, Cloudflare, GitHub)
        - Workflow syntax / action version error
        - Permission / authentication error
        - Runner connectivity / self-hosted issue
        - Timeout
        - Unknown / needs diagnosis
    validations:
      required: true

  - type: textarea
    id: instruction
    attributes:
      label: Fix Instructions
      description: |
        Specific instructions for Codex. If unsure of the root cause,
        describe the symptoms and let Codex diagnose.
      placeholder: |
        The GitHub Apply workflow has been failing for 5 consecutive runs.
        Error suggests 1Password rate limiting.

        1. Check `.github/workflows/github-apply.yml` for 1Password API calls
        2. Identify rate-limit-sensitive patterns (parallel secret fetches)
        3. Add retry logic or batch secret fetches
        4. Verify with `actionlint .github/workflows/github-apply.yml`
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Rules Codex must follow when fixing.
      value: |
        - Do NOT change workflow trigger conditions without explicit approval
        - Do NOT remove required status checks
        - Do NOT switch from self-hosted to ubuntu-latest for TF workflows
        - Pin all action versions to full commit SHA, not version tags
        - Preserve plan/apply pair symmetry
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Previous fix attempts, related issues, timeline of failures.
    validations:
      required: false
