name: Bug Report
description: Report a bug in infrastructure, Terraform, or CI/CD
labels: ["bug"]
body:
  - type: dropdown
    id: workspace
    attributes:
      label: Affected Workspace
      description: Which workspace is affected?
      options:
        - 100-pve (core infra)
        - 101-runner (GitHub Actions runner)
        - 102-traefik (reverse proxy)
        - 104-grafana (observability)
        - 105-elk (logging)
        - 106-glitchtip (error tracking)
        - 107-supabase (database)
        - 108-archon (AI knowledge)
        - 112-mcphub (MCP gateway)
        - 200-oc (dev VM)
        - 215-synology (NAS)
        - 220-staging (staging)
        - 300-cloudflare (external)
        - 301-github (external)
        - modules/proxmox
        - modules/shared
        - CI/CD (.github/workflows)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Run `terraform plan` / `terraform apply` / ...
        2. See error
      placeholder: |
        1. cd 100-pve
        2. terraform init
        3. terraform plan
        4. See error: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: textarea
    id: terraform-version
    attributes:
      label: Terraform Version
      description: Output of `terraform version`.
      render: shell
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Debug Output
      description: |
        Paste any relevant log output. Use `TF_LOG=DEBUG terraform plan` for verbose output.
        **IMPORTANT**: Redact any secrets, tokens, or passwords before pasting.
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, related issues, etc.).
    validations:
      required: false
