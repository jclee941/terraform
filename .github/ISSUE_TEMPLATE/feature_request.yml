name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area does this feature affect?
      options:
        - Core Infrastructure (100-pve)
        - Service (101-112)
        - External Provider (300-cloudflare, 301-github)
        - Modules (proxmox, shared)
        - CI/CD (workflows, actions)
        - YouTube Media (220-youtube)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: "Currently, we have to manually ... which causes ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
    validations:
      required: false
  - type: dropdown
    id: risk
    attributes:
      label: Risk Tier
      description: |
        Based on auto-merge.yml risk classification:
        - Critical: 100-pve, modules, 300-cloudflare, 301-github, 102-traefik
        - Medium: 105-elk, 107-supabase, 108-archon, 112-mcphub
        - Low: everything else
      options:
        - Critical
        - Medium
        - Low
        - Unknown
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
    validations:
      required: false
