name: Backup Health Check

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC (after 02:00/03:00 UTC backup windows)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: backup-health-check
  cancel-in-progress: true

jobs:
  health-check:
    uses: ./.github/workflows/_backup-health-check.yml
    secrets: inherit  # pragma: allowlist secret
