name: actionlint

# Validates GitHub Actions workflow files for syntax + semantic errors
# (shell injection risks, invalid expressions, dead branches, etc.).
# sanity.yml only does `yaml.safe_load`, which is not enough.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download actionlint
        run: bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: |
          mkdir -p .github
          cat > .github/actionlint.yaml << 'EOF'
          self-hosted-runner:
            labels:
              - ".*"
          EOF
          ./actionlint -color -config-file .github/actionlint.yaml -ignore 'label ".*" is unknown'
        shell: bash
        run: |
          mkdir -p .github
          cat > .github/actionlint.yaml << 'EOF'
          self-hosted-runner:
            labels:
              - ".*"
          EOF
          ./actionlint -color -config-file .github/actionlint.yaml
        shell: bash
