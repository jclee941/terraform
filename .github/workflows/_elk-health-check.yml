name: ELK Health Check (Reusable)

on:
  workflow_call:
    inputs:
      elk_host:
        description: 'ELK host IP'
        type: string
        default: '192.168.50.105'
      elasticsearch_port:
        description: 'Elasticsearch port'
        type: string
        default: '9200'
      logstash_http_port:
        description: 'Logstash HTTP API port'
        type: string
        default: '8080'
      logstash_exporter_port:
        description: 'Logstash Exporter port'
        type: string
        default: '9198'

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: ELK Stack Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Elasticsearch Cluster Health
        id: es_health
        run: |
          if ! HEALTH_JSON=$(curl -sf --connect-timeout 10 "http://${{ inputs.elk_host }}:${{ inputs.elasticsearch_port }}/_cluster/health" 2>/dev/null); then
            {
              echo "has_failures=true"
              echo "failed=Elasticsearch (${{ inputs.elk_host }}:${{ inputs.elasticsearch_port }}) unreachable"
              echo "report<<EOF_REPORT"
              echo -e "| Service | Status |\n|---------|--------|\n| **Elasticsearch** | **🔴 Unreachable** |\n"
              echo "EOF_REPORT"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STATUS=$(echo "$HEALTH_JSON" | jq -r '.status')
          REPORT="| Service | Status |\n|---------|--------|\n"

          if [ "$STATUS" = "green" ]; then
            REPORT+="| Elasticsearch | ✅ Green |\n"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "yellow" ]; then
            REPORT+="| Elasticsearch | ⚠️ Yellow |\n"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          else
            REPORT+="| Elasticsearch | 🔴 ${STATUS} |\n"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            echo "failed=Elasticsearch cluster status is ${STATUS}" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "report<<EOF_REPORT"
            echo -e "$REPORT"
            echo "EOF_REPORT"
          } >> "$GITHUB_OUTPUT"

      - name: Check Logstash Pipeline Status
        id: logstash_health
        run: |
          if ! curl -sf --connect-timeout 10 "http://${{ inputs.elk_host }}:${{ inputs.logstash_http_port }}/" >/dev/null 2>&1; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            echo "failed=Logstash API (${{ inputs.elk_host }}:${{ inputs.logstash_http_port }}) unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_failures=false" >> "$GITHUB_OUTPUT"

      - name: Check Logstash Exporter
        id: logstash_exporter
        run: |
          if ! curl -sf --connect-timeout 10 "http://${{ inputs.elk_host }}:${{ inputs.logstash_exporter_port }}/metrics" >/dev/null 2>&1; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            echo "failed=Logstash Exporter (${{ inputs.elk_host }}:${{ inputs.logstash_exporter_port }}) unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_failures=false" >> "$GITHUB_OUTPUT"

      - name: Check Indices and ILM
        id: index_health
        run: |
          if ! curl -sf --connect-timeout 10 "http://${{ inputs.elk_host }}:${{ inputs.elasticsearch_port }}/_ilm/policy" >/dev/null 2>&1; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            echo "failed=ILM API unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_failures=false" >> "$GITHUB_OUTPUT"

      - name: Create or update issue on failure
        if: steps.es_health.outputs.has_failures == 'true' || steps.logstash_health.outputs.has_failures == 'true' || steps.logstash_exporter.outputs.has_failures == 'true' || steps.index_health.outputs.has_failures == 'true'
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "🔴 ELK Health Check"
          custom-title: "🔴 ELK Health Check Failed"
          title-match: prefix
          update-title: "true"
          labels: bug,elk
          custom-body: |
            ## ELK Health Check Failed

            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Elasticsearch
            ${{ steps.es_health.outputs.report }}

            ### Failures
            - ES: ${{ steps.es_health.outputs.failed }}
            - Logstash: ${{ steps.logstash_health.outputs.failed }}
            - Exporter: ${{ steps.logstash_exporter.outputs.failed }}
            - Indices: ${{ steps.index_health.outputs.failed }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## ELK Health Check Results"
            echo "${{ steps.es_health.outputs.report }}"
          } >> "$GITHUB_STEP_SUMMARY"
