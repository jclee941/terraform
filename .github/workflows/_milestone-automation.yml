name: Milestone Automation Template

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

env:
  # Managed via GitHub repo variable. Override by setting vars.ALL_REPOS in repo settings.
  ALL_REPOS: ${{ vars.ALL_REPOS || 'qws941/blacklist,qws941/claude,qws941/propose,qws941/proxmox,qws941/resume,qws941/safework2' }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Create weekly milestone across ALL repos
  # Runs: On PR open/reopen events
  # ──────────────────────────────────────────────
  create-weekly-milestone:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create Weekly Milestone (All Repos)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const repos = process.env.ALL_REPOS.split(',').map(r => r.trim());

            function getISOWeek(date) {
              const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
              const dayNum = d.getUTCDay() || 7;
              d.setUTCDate(d.getUTCDate() + 4 - dayNum);
              const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
              return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            }

            function getWeekTitle(date) {
              const year = date.getFullYear();
              const week = getISOWeek(date);
              const weekStr = String(week).padStart(2, '0');
              return { year, week, weekStr, title: `Week ${year}-W${weekStr}` };
            }

            const { year, weekStr, title } = getWeekTitle(new Date());

            const dueDate = new Date();
            const dayOfWeek = dueDate.getDay();
            const daysUntilFriday = (5 - dayOfWeek + 7) % 7 || 7;
            dueDate.setDate(dueDate.getDate() + daysUntilFriday);
            dueDate.setUTCHours(9, 0, 0, 0);

            let created = 0;
            let skipped = 0;

            for (const repoFull of repos) {
              const [owner, repo] = repoFull.split('/');
              try {
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner, repo, state: 'open', per_page: 100
                });

                if (milestones.find(m => m.title === title)) {
                  core.info(`[${repoFull}] "${title}" already exists`);
                  skipped++;
                  continue;
                }

                await github.rest.issues.createMilestone({
                  owner, repo, title,
                  description: `Weekly milestone for ${year} week ${weekStr}.\nAuto-created by milestone-automation.`,
                  due_on: dueDate.toISOString()
                });
                core.info(`[${repoFull}] Created "${title}"`);
                created++;
              } catch (err) {
                core.warning(`[${repoFull}] Failed: ${err.message}`);
              }
            }

            core.info(`\nSummary: ${created} created, ${skipped} skipped across ${repos.length} repos`);

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "[Milestone] Weekly creation failed"
          labels: "bug,automation"

  # ──────────────────────────────────────────────
  # Job 2: Close milestone + rollover across ALL repos
  # Runs: On issue closed events
  # ──────────────────────────────────────────────
  close-and-rollover:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Close Current and Rollover Open Issues (All Repos)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const repos = process.env.ALL_REPOS.split(',').map(r => r.trim());

            function getISOWeek(date) {
              const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
              const dayNum = d.getUTCDay() || 7;
              d.setUTCDate(d.getUTCDate() + 4 - dayNum);
              const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
              return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            }

            function getWeekTitle(date) {
              const year = date.getFullYear();
              const week = getISOWeek(date);
              const weekStr = String(week).padStart(2, '0');
              return { year, week, weekStr, title: `Week ${year}-W${weekStr}` };
            }

            const now = new Date();
            const { year, week, weekStr, title: currentTitle } = getWeekTitle(now);

            const nextWeek = week >= 52 ? 1 : week + 1;
            const nextYear = week >= 52 ? year + 1 : year;
            const nextWeekStr = String(nextWeek).padStart(2, '0');
            const nextTitle = `Week ${nextYear}-W${nextWeekStr}`;

            let totalMoved = 0;
            let totalClosed = 0;

            for (const repoFull of repos) {
              const [owner, repo] = repoFull.split('/');
              try {
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner, repo, state: 'open', sort: 'due_on', direction: 'asc', per_page: 100
                });

                const currentMilestone = milestones.find(m => m.title === currentTitle);
                if (!currentMilestone) {
                  core.info(`[${repoFull}] No milestone "${currentTitle}", skipping`);
                  continue;
                }

                const { data: openIssues } = await github.rest.issues.listForRepo({
                  owner, repo, milestone: currentMilestone.number, state: 'open', per_page: 100
                });

                if (openIssues.length > 0) {
                  let nextMilestone = milestones.find(m => m.title === nextTitle);
                  if (!nextMilestone) {
                    const nextDue = new Date(now);
                    nextDue.setDate(nextDue.getDate() + 7);
                    nextDue.setUTCHours(9, 0, 0, 0);

                    const { data: created } = await github.rest.issues.createMilestone({
                      owner, repo, title: nextTitle,
                      description: `Weekly milestone for ${nextYear} week ${nextWeekStr}.\nAuto-created by rollover.`,
                      due_on: nextDue.toISOString()
                    });
                    nextMilestone = created;
                  }

                  for (const issue of openIssues) {
                    await github.rest.issues.update({
                      owner, repo, issue_number: issue.number, milestone: nextMilestone.number
                    });
                    core.info(`[${repoFull}] Rolled over #${issue.number} → ${nextTitle}`);
                  }
                  totalMoved += openIssues.length;
                }

                await github.rest.issues.updateMilestone({
                  owner, repo, milestone_number: currentMilestone.number, state: 'closed'
                });
                totalClosed++;
                core.info(`[${repoFull}] Closed "${currentTitle}" (${openIssues.length} rolled over)`);
              } catch (err) {
                core.warning(`[${repoFull}] Failed: ${err.message}`);
              }
            }

            core.info(`\nSummary: ${totalClosed} milestones closed, ${totalMoved} issues rolled over`);

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "[Milestone] Close and rollover failed"
          labels: "bug,automation"

  # ──────────────────────────────────────────────
  # Job 3: Auto-assign PR to current week milestone
  # Runs: On PR open/reopen (this repo only)
  # ──────────────────────────────────────────────
  assign-pr-to-milestone:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Assign PR to Current Week Milestone
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            function getISOWeek(date) {
              const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
              const dayNum = d.getUTCDay() || 7;
              d.setUTCDate(d.getUTCDate() + 4 - dayNum);
              const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
              return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            }

            function getWeekTitle(date) {
              const year = date.getFullYear();
              const week = getISOWeek(date);
              const weekStr = String(week).padStart(2, '0');
              return { year, week, weekStr, title: `Week ${year}-W${weekStr}` };
            }

            const pr = context.payload.pull_request;

            if (pr.milestone) {
              core.info(`PR #${pr.number} already has milestone "${pr.milestone.title}", skipping`);
              return;
            }

            const { year, weekStr, title } = getWeekTitle(new Date());

            const { data: milestones } = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            let milestone = milestones.find(m => m.title === title);

            if (!milestone) {
              const dueDate = new Date();
              const dayOfWeek = dueDate.getDay();
              const daysUntilFriday = (5 - dayOfWeek + 7) % 7 || 7;
              dueDate.setDate(dueDate.getDate() + daysUntilFriday);
              dueDate.setUTCHours(9, 0, 0, 0);

              const { data: created } = await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                description: `Weekly milestone for ${year} week ${weekStr}.\nAuto-created by PR assignment.`,
                due_on: dueDate.toISOString()
              });
              milestone = created;
              core.info(`Created milestone "${title}" for PR assignment`);
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              milestone: milestone.number
            });

            core.info(`Assigned PR #${pr.number} "${pr.title}" → ${title}`);

      - name: Report failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.error('Milestone automation job "assign-pr-to-milestone" failed. Check the workflow run logs.');

  # ──────────────────────────────────────────────
  # Job 4: Auto-close milestone when all issues done
  # Runs: On issue close (this repo only)
  # ──────────────────────────────────────────────
  auto-close-milestone:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 5
    steps:
      - name: Auto-close Milestone if All Issues Done
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const issue = context.payload.issue;

            if (!issue.milestone) {
              core.info(`Issue #${issue.number} has no milestone, skipping`);
              return;
            }

            const milestone = issue.milestone;

            const { data: current } = await github.rest.issues.getMilestone({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone_number: milestone.number
            });

            if (current.open_issues === 0 && current.closed_issues > 0) {
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: milestone.number,
                state: 'closed'
              });
              core.info(`Auto-closed milestone "${current.title}" (${current.closed_issues} issues completed)`);
            } else {
              core.info(`Milestone "${current.title}" still has ${current.open_issues} open issues`);
            }

      - name: Report failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.error('Milestone automation job "auto-close-milestone" failed. Check the workflow run logs.');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Milestone automation failure (${new Date().toISOString().slice(0,10)})`,
              body: `The \`auto-close-milestone\` job failed.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automation']
            });
