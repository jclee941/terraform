---
name: 1Password Integration Test (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: 1Password Vault Connectivity
    if: github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup 1Password CLI
        run: |
          if command -v op >/dev/null 2>&1; then
            echo "op CLI already installed: $(op --version)"
          else
            echo "Installing 1Password CLI..."
            curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
              sudo gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" | \
              sudo tee /etc/apt/sources.list.d/1password.list
            sudo apt-get update -qq && sudo apt-get install -y -qq 1password-cli
            echo "Installed: $(op --version)"
          fi

      - name: Validate token
        id: auth
        run: | # pragma: allowlist secret
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "status=missing" >> "$GITHUB_OUTPUT"
            echo "::error::OP_SERVICE_ACCOUNT_TOKEN not set in GitHub secrets"
            exit 1
          fi

          if op vault list --format=json > /dev/null 2>&1; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "✅ 1Password Service Account authentication successful"
          else
            echo "status=expired" >> "$GITHUB_OUTPUT"
            echo "::error::1Password authentication failed — token may be expired"
            exit 1
          fi

      - name: Validate vault access
        id: vault
        run: |
          VAULTS=$(op vault list --format=json 2>/dev/null || echo "[]")
          VAULT_COUNT=$(echo "$VAULTS" | jq 'length')

          if [ "$VAULT_COUNT" -eq 0 ]; then
            echo "status=empty" >> "$GITHUB_OUTPUT"
            echo "::error::No vaults accessible — check service account vault permissions"
            exit 1
          fi

          # Match vault name case-insensitively
          VAULT_ID=$(echo "$VAULTS" | jq -r \
            '[.[] | select(.name | ascii_downcase == "homelab")] | first | .id // empty')

          if [ -n "$VAULT_ID" ]; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "vault_id=${VAULT_ID}" >> "$GITHUB_OUTPUT"
            ITEM_COUNT=$(op item list --vault Homelab --format=json 2>/dev/null | jq 'length')
            echo "item_count=${ITEM_COUNT}" >> "$GITHUB_OUTPUT"
            echo "✅ Homelab vault accessible (ID: ${VAULT_ID}, items: ${ITEM_COUNT})"
          else
            echo "status=missing_vault" >> "$GITHUB_OUTPUT"
            AVAILABLE=$(echo "$VAULTS" | jq -r '.[].name' | tr '\n' ', ')
            echo "::error::Homelab vault not found. Available: ${AVAILABLE}"
            exit 1
          fi

      - name: Validate expected items
        id: items
        run: |
          # shellcheck disable=SC2129
          # 11 items matching modules/shared/onepassword-secrets/main.tf
          EXPECTED_ITEMS="grafana glitchtip proxmox github exa supabase archon cloudflare n8n mcphub elk"
          TOTAL=0
          FOUND=0
          MISSING=""
          REPORT="| Item | Status |\n|------|--------|\n"

          for item in $EXPECTED_ITEMS; do
            TOTAL=$((TOTAL + 1))
            if op item get "$item" --vault Homelab --format=json > /dev/null 2>&1; then
              FOUND=$((FOUND + 1))
              REPORT+="| ${item} | ✅ Found |\n"
            else
              MISSING="${MISSING}${item}, "
              REPORT+="| **${item}** | **🔴 Missing** |\n"
            fi
          done

          {
            echo "total=${TOTAL}"
            echo "found=${FOUND}"
            echo "report<<EOF"
            echo -e "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$MISSING" ]; then
            echo "missing=${MISSING%, }" >> "$GITHUB_OUTPUT"
            echo "has_missing=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing items: ${MISSING%, }"
          else
            echo "has_missing=false" >> "$GITHUB_OUTPUT"
            echo "✅ All ${TOTAL} items found"
          fi

      - name: Validate critical secret fields
        id: fields
        if: steps.items.outputs.has_missing != 'true'
        run: | # pragma: allowlist secret
          # shellcheck disable=SC2129
          # Spot-check one critical field per key service (presence only, not values)
          CHECKS=(
            "grafana|admin_password"
            "proxmox|api_token_name"
            "proxmox|api_token_value"
            "github|personal_access_token"
            "cloudflare|api_token"
            "supabase|service_role_key"
            "elk|elastic_password"
            "mcphub|op_service_account_token"
          )

          TOTAL=0
          OK=0
          EMPTY=""
          PLACEHOLDERS=0
          REPORT="| Item | Field | Status |\n|------|-------|--------|\n"

          for check in "${CHECKS[@]}"; do
            IFS='|' read -r item field <<< "$check"
            TOTAL=$((TOTAL + 1))

            VALUE=$(op item get "$item" --vault Homelab --format=json 2>/dev/null \
              | jq -r --arg f "$field" \
                '.fields[]? | select(.section.label == "secrets") | select(.label == $f) | .value // empty' \
              2>/dev/null) || VALUE=""

            if [ -z "$VALUE" ]; then
              EMPTY="${EMPTY}${item}/${field}, "
              REPORT+="| **${item}** | **${field}** | **🔴 Empty** |\n"
            elif echo "$VALUE" | grep -qiE '^placeholder|^PLACEHOLDER_NEEDS_REAL'; then
              PLACEHOLDERS=$((PLACEHOLDERS + 1))
              EMPTY="${EMPTY}${item}/${field}, "
              REPORT+="| **${item}** | **${field}** | **⚠️ Placeholder** |\n"
            else
              OK=$((OK + 1))
              REPORT+="| ${item} | ${field} | ✅ Set |\n"
            fi
          done

          {
            echo "total=${TOTAL}"
            echo "ok=${OK}"
            echo "placeholders=${PLACEHOLDERS}"
            echo "report<<EOF"
            echo -e "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$EMPTY" ]; then
            echo "empty=${EMPTY%, }" >> "$GITHUB_OUTPUT"
            echo "has_empty=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Empty/placeholder fields: ${EMPTY%, }"
          else
            echo "has_empty=false" >> "$GITHUB_OUTPUT"
            echo "✅ All ${TOTAL} critical fields populated"
          fi

      - name: Capture metadata
        id: meta
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create or update issue on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 1Password"
          title-match: prefix
          labels: bug,1password
          custom-title: "🔴 1Password Integration Test Failed"
          custom-body: |
            ## 1Password Integration Test Failed

            **Date:** ${{ steps.meta.outputs.timestamp }}
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Diagnosis

            ${{ steps.auth.outputs.status == 'missing' && '- ❌ `OP_SERVICE_ACCOUNT_TOKEN` GitHub secret is not set' || '' }}
            ${{ steps.auth.outputs.status == 'expired' && '- ❌ `OP_SERVICE_ACCOUNT_TOKEN` is expired or invalid' || '' }}
            ${{ steps.vault.outputs.status == 'empty' && '- ❌ No vaults accessible — check service account permissions' || '' }}
            ${{ steps.vault.outputs.status == 'missing_vault' && '- ❌ Homelab vault not in service account scope' || '' }}
            ${{ steps.items.outputs.missing != '' && format('- ⚠️ Missing items ({0}/{1}): {2}', steps.items.outputs.found, steps.items.outputs.total, steps.items.outputs.missing) || '' }}
            ${{ steps.fields.outputs.empty != '' && format('- ⚠️ Empty/placeholder fields: {0}', steps.fields.outputs.empty) || '' }}
            ${{ steps.auth.outputs.status == '' && steps.vault.outputs.status == '' && steps.items.outputs.missing == '' && steps.fields.outputs.empty == '' && '- Unknown failure — check workflow logs' || '' }}

            ### Resolution

            See `docs/runbooks/mcp-health-check.md` § 1Password empty vault.

            **Token rotation steps:**
            1. Generate new Service Account token: 1Password admin → Developer → Service Accounts
            2. Update GitHub: `gh secret set OP_SERVICE_ACCOUNT_TOKEN`
            3. Re-run this workflow to verify

      - name: Summary
        if: always()
        run: |
          # shellcheck disable=SC2193
          {
            echo "## 1Password Integration Test"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          AUTH="${{ steps.auth.outputs.status }}"
          VAULT="${{ steps.vault.outputs.status }}"
          ITEMS_MISSING="${{ steps.items.outputs.has_missing }}"
          FIELDS_EMPTY="${{ steps.fields.outputs.has_empty }}"

          AUTH_ICON=$( [ "$AUTH" = 'ok' ] && echo '✅' || echo '🔴' )
          VAULT_ICON=$( [ "$VAULT" = 'ok' ] && echo '✅' || echo '🔴' )
          ITEMS_ICON=$( [ "$ITEMS_MISSING" != 'true' ] && echo '✅' || echo '⚠️' )
          FIELDS_ICON=$( [ "$FIELDS_EMPTY" != 'true' ] && echo '✅' || echo '⚠️' )

          {
            echo "| Token authentication | ${AUTH_ICON} ${AUTH:-not_run} |"
            echo "| Vault access | ${VAULT_ICON} ${VAULT:-not_run} |"
            echo "| Items (${{ steps.items.outputs.found || '?' }}/${{ steps.items.outputs.total || '?' }}) | ${ITEMS_ICON} |"
            echo "| Fields (${{ steps.fields.outputs.ok || '?' }}/${{ steps.fields.outputs.total || '?' }}) | ${FIELDS_ICON} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${{ steps.items.outputs.report }}" ]; then
            {
              echo ""
              echo "### Items"
              echo -e "${{ steps.items.outputs.report }}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "${{ steps.fields.outputs.report }}" ]; then
            {
              echo ""
              echo "### Critical Fields"
              echo -e "${{ steps.fields.outputs.report }}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
