name: Cloudflare Health Check

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: cloudflare-health-check
  cancel-in-progress: true

jobs:
  health-check:
    uses: ./.github/workflows/_cloudflare-health-check.yml
    secrets: inherit  # pragma: allowlist secret
