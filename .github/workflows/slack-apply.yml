name: Slack Apply

on:
  push:
    branches:
      - master
    paths:
      - "320-slack/**"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: slack-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Slack
      working-directory: 320-slack
      failure-title-prefix: "[Slack] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `320-slack`

        ### Checklist
        - [ ] Verify Slack bot token is valid in 1Password
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
