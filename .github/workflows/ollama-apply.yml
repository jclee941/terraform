name: Ollama Apply

on:
  push:
    branches:
      - master
    paths:
      - "109-ollama/**"

permissions:
  contents: read
  issues: write

concurrency:
  group: ollama-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Ollama
      working-directory: 109-ollama/terraform
      needs-infra-state: true
      failure-title-prefix: "[Ollama] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `109-ollama/terraform`

        ### Checklist
        - [ ] Verify Ollama VM is accessible (192.168.50.109)
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
