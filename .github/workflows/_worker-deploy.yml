name: Worker Deploy (Reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Worker source directory (relative to repo root)"
        type: string
        required: true
      worker-name:
        description: "Worker display name for logs and notifications"
        type: string
        required: true
      set-webhook-secret:
        description: "Set WEBHOOK_SECRET via wrangler"
        type: boolean
        required: false
        default: false
      worker-url:
        description: "Deployed worker URL for verification"
        type: string
        required: false
        default: ""
    secrets:
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      TF_VAR_CLOUDFLARE_ACCOUNT_ID:
        description: "Cloudflare account ID (canonical TF_VAR secret name)"
        required: false
      ELK_WEBHOOK_SECRET:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Cloudflare Secrets
        id: check_cf_secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN or TF_VAR_CLOUDFLARE_ACCOUNT_ID not configured. Skipping deploy."
            echo "creds_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "Cloudflare credentials configured"
            echo "creds_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check_cf_secrets.outputs.creds_ok == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"

      - name: Install Dependencies
        if: steps.check_cf_secrets.outputs.creds_ok == 'true'
        run: npm ci

      - name: Deploy
        if: steps.check_cf_secrets.outputs.creds_ok == 'true'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.working-directory }}

      - name: Set WEBHOOK_SECRET
        if: inputs.set-webhook-secret && steps.check_cf_secrets.outputs.creds_ok == 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
        run: echo "${{ secrets.ELK_WEBHOOK_SECRET }}" | npx wrangler secret put WEBHOOK_SECRET

      - name: Post-Deploy Verification
        if: inputs.worker-url != '' && steps.check_cf_secrets.outputs.creds_ok == 'true'
        run: |
          echo "::group::Health Check"
          HEALTH=$(curl -sf "${{ inputs.worker-url }}/health" || echo '{"error":"unreachable"}')
          echo "$HEALTH" | jq .
          echo "::endgroup::"

          if echo "$HEALTH" | jq -e '.status == "ok"' > /dev/null 2>&1; then
            echo "✅ Health check passed"
          else
            echo "::warning::Health check failed or returned unexpected response"
          fi

      - name: Skip Notice
        if: steps.check_cf_secrets.outputs.creds_ok != 'true'
        run: |
          echo "## Worker Deploy - Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "CLOUDFLARE_API_TOKEN or TF_VAR_CLOUDFLARE_ACCOUNT_ID not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Create Issue on Failure
        if: failure() && steps.check_cf_secrets.outputs.creds_ok == 'true'
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "[Worker] Deploy failed"
          extra-body: |
            **Worker:** `${{ inputs.worker-name }}`

            Please investigate the deployment logs.
          labels: "bug,ci"
