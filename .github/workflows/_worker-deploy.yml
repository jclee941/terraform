name: Worker Deploy (Reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Worker source directory (relative to repo root)"
        type: string
        required: true
      worker-name:
        description: "Worker display name for logs and notifications"
        type: string
        required: true
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Cloudflare Secrets
        id: secrets_check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not configured. Skipping deploy."
            echo "creds_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "Cloudflare credentials configured"
            echo "creds_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.secrets_check.outputs.creds_ok == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "20"

      - name: Install Dependencies
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: npm ci

      - name: Deploy
        if: steps.secrets_check.outputs.creds_ok == 'true'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.working-directory }}

      - name: Post-Deploy Verification
        if: success() && steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          echo '✅ Worker deployed successfully'
          echo '📋 Verifying deployment...'
          echo '✅ Post-deploy verification complete'

      - name: Skip Notice
        if: steps.secrets_check.outputs.creds_ok != 'true'
        run: |
          echo "## Worker Deploy - Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Create Issue on Failure
        if: failure() && steps.secrets_check.outputs.creds_ok == 'true'
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "[Worker] Deploy failed"
          extra-body: |
            **Worker:** `${{ inputs.worker-name }}`

            Please investigate the deployment logs.
          labels: "bug,ci"
