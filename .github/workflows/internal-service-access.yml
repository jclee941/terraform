name: Internal Service Access Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC

jobs:
  test-internal-services:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Secrets Configured
        run: |
          if [ -z "$CF_ACCESS_CLIENT_ID" ] || [ -z "$CF_ACCESS_CLIENT_SECRET" ]; then
            echo "::error::CF_ACCESS_CLIENT_ID or CF_ACCESS_CLIENT_SECRET not configured"
            echo "Please add these secrets in repository settings"
            exit 1
          fi
          echo "Cloudflare Access credentials configured"

      - name: Test Traefik API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://traefik-api.jclee.me/api/http/routers)
          echo "Traefik API: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test Grafana
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://grafana.jclee.me/api/health)
          echo "Grafana: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test MCP Gateway
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://mcp.jclee.me/)
          echo "MCP Gateway: $response"
          # MCP may return various codes, just verify not 403
          [ "$response" != "403" ] || exit 1

      - name: Test Archon
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://archon.jclee.me/)
          echo "Archon: $response"
          [ "$response" = "200" ] || [ "$response" = "302" ] || exit 1

      - name: Test MinIO
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://minio.jclee.me/minio/health/live)
          echo "MinIO: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test n8n
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://n8n.jclee.me/healthz)
          echo "n8n: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test Swagger
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://swagger.jclee.me/)
          echo "Swagger: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test Kibana
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://kibana.jclee.me/api/status)
          echo "Kibana: $response"
          [ "$response" = "200" ] || exit 1

      - name: Verify Auth Required (Negative Test)
        run: |
          # Request WITHOUT headers should be blocked
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://grafana.jclee.me/api/health)
          echo "Unauthenticated request: $response"
          # Should get 403 or redirect to login
          if [ "$response" = "403" ] || [ "$response" = "302" ]; then
            echo "Auth correctly required"
          else
            echo "::warning::Expected 403 or 302, got $response - Access policy may not be enforced"
          fi

      - name: Verify ES NOT Accessible (Security Check)
        run: |
          # Elasticsearch should NOT be accessible via tunnel
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://es.jclee.me/ 2>/dev/null || echo "000")
          echo "Elasticsearch access attempt: $response"
          if [ "$response" = "200" ]; then
            echo "::error::Elasticsearch is exposed! This is a security issue."
            exit 1
          fi
          echo "Elasticsearch correctly NOT accessible"

      - name: Summary
        run: |
          echo "## Internal Service Access Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Subdomain | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Traefik API | traefik-api.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | grafana.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Gateway | mcp.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Archon | archon.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| MinIO | minio.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| n8n | n8n.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Swagger | swagger.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Kibana | kibana.jclee.me | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Auth required for unauthenticated requests" >> $GITHUB_STEP_SUMMARY
          echo "- Elasticsearch NOT accessible via tunnel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Tested at: $(date -u)*" >> $GITHUB_STEP_SUMMARY

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Service health check failed: ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `## Internal Service Access Test Failure`,
              ``,
              `**Workflow:** ${context.workflow}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Date:** ${new Date().toISOString()}`,
              ``,
              `One or more internal services failed their health check.`,
              `Please review the workflow run for details on which services are down.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'monitoring']
            });
