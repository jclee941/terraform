name: Internal Service Access Test

on:
  push:
    branches: [master]
    paths:
      - "102-traefik/**"
      - "104-grafana/**"
      - "105-elk/**"
      - "108-archon/**"
      - "112-mcphub/**"
      - ".github/workflows/internal-service-access.yml"
  pull_request:
    paths:
      - "102-traefik/**"
      - "104-grafana/**"
      - "105-elk/**"
      - "108-archon/**"
      - "112-mcphub/**"
      - ".github/workflows/internal-service-access.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: internal-service-access-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_internal-service-access.yml
    secrets: inherit  # pragma: allowlist secret
