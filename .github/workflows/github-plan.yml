name: GitHub Plan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '301-github/**'

concurrency:
  group: github-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      service-name: GitHub
      working-directory: 301-github
      enable-repository-imports: true
    secrets: inherit  # pragma: allowlist secret
