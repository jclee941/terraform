name: ELK Apply

on:
  push:
    branches:
      - master
    paths:
      - "105-elk/**"
permissions:
  contents: read
  issues: write

concurrency:
  group: elk-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: ELK
      working-directory: 105-elk/terraform
      needs-infra-state: true
      failure-title-prefix: "[ELK] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `105-elk/terraform`

        ### Checklist
        - [ ] Verify Elasticsearch connectivity
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
