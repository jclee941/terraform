name: ELK Apply

on:
  push:
    branches:
      - master
    paths:
      - '105-elk/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: elk-apply
  cancel-in-progress: false

env:
  TF_WORKING_DIR: 105-elk/terraform
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  apply:
    name: ELK Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-backend-config=../../backend.hcl -input=false'

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: '[ELK] Apply failed on master'
          extra-body: |
            **Workspace:** `105-elk/terraform`

            ### Checklist
            - [ ] Verify Elasticsearch connectivity
            - [ ] Run `terraform plan` locally to diagnose
            - [ ] Fix and re-apply, or revert the commit
          labels: 'terraform-drift,automated,infrastructure'
