name: Security Scan

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".tflint.hcl"
      - "modules/**"

concurrency:
  group: security-scan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    name: TFLint + Checkov
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install TFLint
        run: |
          if ! command -v tflint &>/dev/null; then
            curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          fi
          tflint --version

      - name: TFLint Init
        run: tflint --init

      - name: TFLint Scan
        id: tflint
        run: |
          set +e

          # Workspace directories (standalone TF roots)
          WORKSPACES=(
            100-pve
            102-traefik/terraform
            104-grafana/terraform
            105-elk/terraform
            108-archon/terraform
            300-cloudflare
            301-github
          )

          # Module directories
          MODULES=(
            modules/proxmox/lxc
            modules/proxmox/vm
            modules/proxmox/lxc-config
            modules/proxmox/vm-config
            modules/proxmox/config-renderer
            modules/shared/onepassword-secrets
          )

          overall_exit=0
          output=""

          for dir in "${WORKSPACES[@]}" "${MODULES[@]}"; do
            if [ ! -d "$dir" ]; then
              continue
            fi

            result=$(tflint --chdir="$dir" --format compact 2>&1)
            exit_code=$?

            if [ $exit_code -ne 0 ]; then
              overall_exit=1
              output+="### ❌ ${dir}
          ${result}

          "
            elif [ -n "$result" ]; then
              output+="### ⚠️ ${dir}
          ${result}

          "
            else
              output+="### ✅ ${dir} — no issues
          "
            fi
          done

          # Truncate if too large for PR comment
          if [ ${#output} -gt 60000 ]; then
            output="${output:0:60000}

          ... (truncated)"
          fi

          echo "output<<EOFTFLINT" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "EOFTFLINT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$overall_exit" >> "$GITHUB_OUTPUT"

          # Don't fail the step — report in PR comment
          exit 0

      - name: Setup Checkov
        run: |
          CHECKOV_VENV="${HOME}/.checkov-venv"
          if [ ! -f "${CHECKOV_VENV}/bin/checkov" ]; then
            python3 -m venv "${CHECKOV_VENV}"
            "${CHECKOV_VENV}/bin/pip" install --quiet 'checkov>=3.2,<4'
          fi
          "${CHECKOV_VENV}/bin/checkov" --version
          echo "${CHECKOV_VENV}/bin" >> "$GITHUB_PATH"

      - name: Checkov Scan
        id: checkov
        run: |
          set +e

          CHECKOV_BIN=$(command -v checkov || echo "${HOME}/.local/bin/checkov")
          result=$("$CHECKOV_BIN" \
            --directory . \
            --framework terraform \
            --quiet \
            --compact \
            --skip-path .archive \
            --skip-path data \
            --skip-path tests \
            --skip-path 100-pve/configs \
            --skip-check CKV_TF_1 \
            --output cli 2>&1)
          exit_code=$?

          # Extract summary line
          summary=$(echo "$result" | grep -E "^Passed|^Failed|passed.*failed" | tail -1)
          if [ -z "$summary" ]; then
            summary=$(echo "$result" | tail -5)
          fi

          # Truncate full output for PR comment
          if [ ${#result} -gt 60000 ]; then
            result="${result:0:60000}

          ... (truncated)"
          fi

          echo "output<<EOFCHECKOV" >> "$GITHUB_OUTPUT"
          echo "$result" >> "$GITHUB_OUTPUT"
          echo "EOFCHECKOV" >> "$GITHUB_OUTPUT"
          echo "summary<<EOFSUMMARY" >> "$GITHUB_OUTPUT"
          echo "$summary" >> "$GITHUB_OUTPUT"
          echo "EOFSUMMARY" >> "$GITHUB_OUTPUT"

          if [ $exit_code -eq 0 ]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          fi

          # Soft-fail: don't block PRs, report findings
          exit 0

      - name: Cleanup Checkov cache
        if: always()
        run: rm -rf /tmp/checkov-* 2>/dev/null || true

      - name: Comment Results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TFLINT_OUTPUT: ${{ steps.tflint.outputs.output }}
          TFLINT_EXIT: ${{ steps.tflint.outputs.exit_code }}
          CHECKOV_OUTPUT: ${{ steps.checkov.outputs.output }}
          CHECKOV_EXIT: ${{ steps.checkov.outputs.exit_code }}
          CHECKOV_SUMMARY: ${{ steps.checkov.outputs.summary }}
        with:
          script: |
            const tflintExit = process.env.TFLINT_EXIT || '1';
            const checkovExit = process.env.CHECKOV_EXIT || '1';
            const tflintOutput = process.env.TFLINT_OUTPUT || 'No output';
            const checkovOutput = process.env.CHECKOV_OUTPUT || 'No output';
            const checkovSummary = process.env.CHECKOV_SUMMARY || '';

            const tflintIcon = tflintExit === '0' ? '✅' : '⚠️';
            const checkovIcon = checkovExit === '0' ? '✅' : '⚠️';

            const body = [
              '## 🔒 Security Scan Results',
              '',
              `| Tool | Status |`,
              `|------|--------|`,
              `| TFLint | ${tflintIcon} ${tflintExit === '0' ? 'Passed' : 'Findings detected'} |`,
              `| Checkov | ${checkovIcon} ${checkovExit === '0' ? 'Passed' : 'Findings detected'} |`,
              '',
              '<details><summary>TFLint Output</summary>',
              '',
              tflintOutput,
              '',
              '</details>',
              '',
              '<details><summary>Checkov Output</summary>',
              '',
              '```',
              checkovOutput,
              '```',
              '',
              '</details>',
              '',
              `*Pusher: @${{ github.actor }}, Workflow: \`security-scan\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "Security Scan"
