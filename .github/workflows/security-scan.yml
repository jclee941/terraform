name: Security Scan

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".tflint.hcl"
      - "modules/**"

concurrency:
  group: security-scan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    uses: ./.github/workflows/_security-scan.yml
    secrets: inherit
