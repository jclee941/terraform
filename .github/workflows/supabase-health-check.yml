name: Supabase Health Check

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: supabase-health-check
  cancel-in-progress: false

jobs:
  health-check:
    name: Check Supabase Services
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Supabase Studio (Port 3000)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://192.168.50.107:3000 || echo "000")
          echo "Studio HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Supabase Studio is healthy"
          else
            echo "❌ Supabase Studio is not responding (status: $STATUS)"
            exit 1
          fi

      - name: Check Kong API Gateway (Port 8000)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://192.168.50.107:8000 || echo "000")
          echo "Kong API status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
            echo "✅ Kong API Gateway is responding"
          else
            echo "❌ Kong API Gateway is not responding (status: $STATUS)"
            exit 1
          fi

      - name: Check PostgreSQL (Port 5432)
        run: |
          if nc -z 192.168.50.107 5432 2>/dev/null; then
            echo "✅ PostgreSQL is listening on port 5432"
          else
            echo "❌ PostgreSQL is not responding on port 5432"
            exit 1
          fi

      - name: Check Realtime Service (Port 4000)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://192.168.50.107:4000/socket || echo "000")
          echo "Realtime status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ]; then
            echo "✅ Realtime service is responding"
          else
            echo "❌ Realtime service is not responding (status: $STATUS)"
            exit 1
          fi

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Supabase Health Check Failed"
          custom-body: |
            ## Supabase Service Health Check Failed

            **Host**: LXC 107 (192.168.50.107)
            **Checked at**: ${{ github.event.repository.updated_at }}

            ### Quick Diagnostic Commands

            ```bash
            # Check container status
            pct exec 107 -- docker compose ps

            # View logs
            pct exec 107 -- docker compose logs --tail=50

            # Check resource usage
            pct exec 107 -- df -h
            pct exec 107 -- free -h
            ```

            ### Runbook
            See `docs/runbooks/supabase-health-check.md` for troubleshooting steps.

            ### Recovery
            ```bash
            # Restart Supabase services
            pct exec 107 -- docker compose restart

            # Check individual services
            pct exec 107 -- docker compose ps
            ```
          labels: "infrastructure,supabase,health-check,automated"
