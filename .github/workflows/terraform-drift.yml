name: Terraform Drift Detection

on:
  schedule:
    # Run daily at 06:00 UTC (15:00 KST)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  drift-check:
    name: Drift - ${{ matrix.workspace.name }}
    runs-on: self-hosted
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - name: proxmox
            dir: 100-pve
            init_args: "-backend-config=../backend.hcl -input=false"
          - name: grafana
            dir: 104-grafana/terraform
            init_args: "-backend-config=../../backend.hcl -input=false"
          - name: elk
            dir: 105-elk/terraform
            init_args: "-backend-config=../../backend.hcl -input=false"
          - name: traefik
            dir: 102-traefik/terraform
            init_args: "-backend-config=../../backend.hcl -input=false"
          - name: archon
            dir: 108-archon/terraform
            init_args: "-backend-config=../../backend.hcl -input=false"
          - name: cloudflare
            dir: 300-cloudflare
            init_args: "-backend-config=../backend.hcl -input=false"
          - name: github
            dir: 301-github
            init_args: "-backend-config=../backend.hcl -input=false"

    defaults:
      run:
        working-directory: ${{ matrix.workspace.dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ matrix.workspace.dir }}
          init-args: ${{ matrix.workspace.init_args }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Exit codes: 0=no changes, 1=error, 2=changes detected
          if [ $EXIT_CODE -eq 2 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            SUMMARY=$(grep -E '(Plan:|No changes)' plan_output.txt | head -5)
            echo "plan_summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "drift_detected=error" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Create GitHub Issue on Drift
        if: steps.plan.outputs.drift_detected == 'true'
        uses: actions/github-script@v8
        env:
          PLAN_SUMMARY: ${{ steps.plan.outputs.plan_summary }}
          WORKSPACE_NAME: ${{ matrix.workspace.name }}
          WORKSPACE_DIR: ${{ matrix.workspace.dir }}
        with:
          script: |
            const planSummary = process.env.PLAN_SUMMARY;
            const workspaceName = process.env.WORKSPACE_NAME;
            const workspaceDir = process.env.WORKSPACE_DIR;
            const today = new Date().toISOString().split('T')[0];

            // Check for existing open drift issue for this workspace
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'terraform-drift,automated',
              per_page: 100
            });

            const existingIssue = existing.data.find(i =>
              i.title.includes(`[${workspaceName}]`)
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: [
                  `## Drift Still Detected (${today})`,
                  '',
                  '```',
                  planSummary,
                  '```',
                  '',
                  `Run \`terraform plan\` in \`${workspaceDir}\` to see full details.`
                ].join('\n')
              });
              console.log(`Updated existing drift issue #${existingIssue.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Drift] [${workspaceName}] Infrastructure drift detected (${today})`,
                body: [
                  '## Terraform Drift Detected',
                  '',
                  `**Detected:** ${today}`,
                  `**Workspace:** \`${workspaceDir}\``,
                  '',
                  '### Plan Summary',
                  '```',
                  planSummary,
                  '```',
                  '',
                  '### Action Required',
                  `- [ ] Review drift with \`terraform plan\` in \`${workspaceDir}\``,
                  '- [ ] Apply changes with `terraform apply` or revert manual changes',
                  '- [ ] Close this issue when resolved',
                  '',
                  '### Common Causes',
                  '- Manual changes via provider UI (Proxmox, Grafana, Cloudflare, etc.)',
                  '- Out-of-band configuration updates',
                  '- Provider version updates',
                  '',
                  '---',
                  `*Auto-generated by [Terraform Drift Detection](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/terraform-drift.yml)*`
                ].join('\n'),
                labels: ['terraform-drift', 'automated', 'infrastructure']
              });
              console.log(`Created drift issue #${issue.data.number}`);
            }

      - name: Create GitHub Issue on Error
        if: steps.plan.outputs.drift_detected == 'error'
        uses: actions/github-script@v8
        env:
          WORKSPACE_NAME: ${{ matrix.workspace.name }}
          WORKSPACE_DIR: ${{ matrix.workspace.dir }}
        with:
          script: |
            const workspaceName = process.env.WORKSPACE_NAME;
            const workspaceDir = process.env.WORKSPACE_DIR;
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] [${workspaceName}] Terraform plan failed (${today})`,
              body: [
                '## Terraform Plan Error',
                '',
                `**Date:** ${today}`,
                `**Workspace:** \`${workspaceDir}\``,
                '',
                `The scheduled drift detection failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/terraform-drift.yml) for details.`,
                '',
                '### Action Required',
                '- [ ] Check Terraform state and provider connectivity',
                '- [ ] Verify secrets (TF_API_TOKEN, provider credentials) are valid',
                '- [ ] Re-run the workflow manually',
                '',
                '---',
                '*Auto-generated by Terraform Drift Detection*'
              ].join('\n'),
              labels: ['terraform-drift', 'automated', 'bug']
            });
