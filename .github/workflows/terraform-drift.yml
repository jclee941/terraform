name: Terraform Drift Detection

on:
  push:
    branches:
      - master
    paths:
      - "100-pve/**"
      - "102-traefik/**"
      - "104-grafana/**"
      - "105-elk/**"
      - "108-archon/**"
      - "300-cloudflare/**"
      - "320-slack/**"
      - "modules/**"
      - ".github/workflows/terraform-drift.yml"
  schedule:
    - cron: "0 0 * * 1-5" # Weekday 00:00 UTC (09:00 KST)

permissions:
  contents: read
  issues: write

concurrency:
  group: terraform-drift
  cancel-in-progress: false

jobs:
  drift:
    uses: ./.github/workflows/_terraform-drift.yml
    with:
      workspaces: >-
        [
          {"name":"proxmox","dir":"100-pve","init_args":"-input=false"},
          {"name":"grafana","dir":"104-grafana/terraform","init_args":"-input=false"},
          {"name":"elk","dir":"105-elk/terraform","init_args":"-input=false"},
          {"name":"traefik","dir":"102-traefik/terraform","init_args":"-input=false"},
          {"name":"archon","dir":"108-archon/terraform","init_args":"-input=false"},
          {"name":"cloudflare","dir":"300-cloudflare","init_args":"-input=false"},
          {"name":"slack","dir":"320-slack","init_args":"-input=false"}
        ]
    secrets: inherit # pragma: allowlist secret
