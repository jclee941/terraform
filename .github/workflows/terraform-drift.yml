name: Terraform Drift Detection

on:
  schedule:
    # Run daily at 06:00 UTC (15:00 KST)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  TF_WORKING_DIR: 100-pve/envs/prod

jobs:
  drift-check:
    name: Check for Infrastructure Drift
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Exit codes: 0=no changes, 1=error, 2=changes detected
          if [ $EXIT_CODE -eq 2 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            # Extract resource changes summary
            SUMMARY=$(grep -E '(Plan:|No changes)' plan_output.txt | head -5)
            echo "plan_summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "drift_detected=error" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Create GitHub Issue on Drift
        if: steps.plan.outputs.drift_detected == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const planSummary = `${{ steps.plan.outputs.plan_summary }}`;
            const today = new Date().toISOString().split('T')[0];

            // Check for existing open drift issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'terraform-drift,automated',
              per_page: 1
            });

            if (existing.data.length > 0) {
              // Update existing issue with new drift info
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `## Drift Still Detected (${today})\n\n\`\`\`\n${planSummary}\n\`\`\`\n\nRun \`terraform plan\` in \`100-pve/envs/prod\` to see full details.`
              });
              console.log(`Updated existing drift issue #${existing.data[0].number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Drift] Infrastructure drift detected (${today})`,
                body: `## Terraform Drift Detected\n\n**Detected:** ${today}\n**Workspace:** \`100-pve/envs/prod\`\n\n### Plan Summary\n\`\`\`\n${planSummary}\n\`\`\`\n\n### Action Required\n- [ ] Review drift with \`terraform plan\` in \`100-pve/envs/prod\`\n- [ ] Apply changes with \`terraform apply\` or revert manual changes\n- [ ] Close this issue when resolved\n\n### Common Causes\n- Manual changes via Proxmox UI\n- Out-of-band configuration updates\n- Provider version updates\n\n---\n*Auto-generated by [Terraform Drift Detection](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/terraform-drift.yml)*`,
                labels: ['terraform-drift', 'automated', 'infrastructure']
              });
              console.log(`Created drift issue #${issue.data.number}`);
            }

      - name: Create GitHub Issue on Error
        if: steps.plan.outputs.drift_detected == 'error'
        uses: actions/github-script@v8
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] Terraform plan failed (${today})`,
              body: `## Terraform Plan Error\n\n**Date:** ${today}\n**Workspace:** \`100-pve/envs/prod\`\n\nThe scheduled drift detection failed to run \`terraform plan\`. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/terraform-drift.yml) for details.\n\n### Action Required\n- [ ] Check Terraform state and provider connectivity\n- [ ] Verify secrets (TF_API_TOKEN) are valid\n- [ ] Re-run the workflow manually\n\n---\n*Auto-generated by Terraform Drift Detection*`,
              labels: ['terraform-drift', 'automated', 'bug']
            });
