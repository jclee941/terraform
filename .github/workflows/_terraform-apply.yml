name: Terraform Apply (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Display name of the service (e.g. "Archon", "ELK")'
        type: string
        required: true
      working-directory:
        description: 'Terraform working directory relative to repo root (e.g. "108-archon/terraform")'
        type: string
        required: true
      terraform-version:
        description: "Terraform version to install"
        type: string
        default: "1.10.5"
      migrate-state:
        description: "Run state migration to remove orphaned resources. Values: none | lxc_config | lxc_and_lxc_config | safework2_cleanup"
        type: string
        default: "none"
      enable-repository-imports:
        description: "Set TF_VAR_enable_repository_imports=true (github workspace only)"
        type: boolean
        default: false
      needs-infra-state:
        description: "Create stub 100-pve state file for workspaces that read terraform_remote_state.infra"
        type: boolean
        default: false
      enable-proxmox-imports:
        description: 'Import Proxmox resources before apply (100-pve workspace only)'
        type: boolean
        default: false
      failure-title-prefix:
        description: 'Title prefix for failure issue (e.g. "[Archon] Apply failed on master")'
        type: string
        required: true
      failure-extra-body:
        description: "Service-specific checklist content for failure issue body"
        type: string
        default: ""
      failure-labels:
        description: "Comma-separated labels for failure issue"
        type: string
        default: "terraform-drift,automated,infrastructure"
    secrets:
      GH_PAT:
        required: false
      TF_API_TOKEN:
        required: false
      TF_VAR_GRAFANA_AUTH:
        required: false
      TF_VAR_N8N_WEBHOOK_URL:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      TF_VAR_CLOUDFLARE_ACCOUNT_ID:
        required: false
      TF_VAR_CLOUDFLARE_ZONE_ID:
        required: false
      TF_VAR_SYNOLOGY_DOMAIN:
        required: false
      TF_VAR_ACCESS_ALLOWED_EMAILS:
        required: false
      OP_CONNECT_HOST:
        required: false
      OP_CONNECT_TOKEN:
        required: false
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
      PROXMOX_VE_ENDPOINT:
        required: false
      PROXMOX_VE_API_TOKEN:
        required: false
      PROXMOX_VE_SSH_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  apply:
    name: ${{ inputs.service-name }} Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: false

      - name: Free disk space (Terraform caches)
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          WORKING_DIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          echo "Before cleanup:"
          df -h .
          rm -rf "$HOME/.terraform.d/plugin-cache" "$HOME/.terraform.d/plugins" "$WORKING_DIR/.terraform" || true
          rm -rf "$RUNNER_TEMP/terraform-plugin-cache" "$RUNNER_TEMP/terraform-data" || true
          mkdir -p "$RUNNER_TEMP/terraform-plugin-cache" "$RUNNER_TEMP/terraform-data"
          echo "TF_PLUGIN_CACHE_DIR=$RUNNER_TEMP/terraform-plugin-cache" >> "$GITHUB_ENV"
          echo "TF_DATA_DIR=$RUNNER_TEMP/terraform-data" >> "$GITHUB_ENV"
          echo "After cleanup:"
          df -h .

      - name: Restore persistent state
        run: |
          STATE_DIR="/home/runner/.terraform-state/${{ inputs.working-directory }}"
          if [ -f "$STATE_DIR/terraform.tfstate" ]; then
            cp "$STATE_DIR/terraform.tfstate" terraform.tfstate
            echo "✅ Restored state from $STATE_DIR ($(stat -c%s "$STATE_DIR/terraform.tfstate") bytes)"
          else
            echo "⚠️ No persistent state found at $STATE_DIR"
          fi

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: ${{ inputs.terraform-version }}
          working-directory: ${{ inputs.working-directory }}
          init-args: "-input=false"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Prune org-only state for user owners (GitHub workspace)
        if: inputs.working-directory == '301-github'
        env:
          TF_VAR_github_owner: ${{ env.TF_VAR_github_owner }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path
          from urllib.request import Request, urlopen

          owner = (os.getenv("TF_VAR_github_owner") or "").strip()
          if not owner:
            try:
              text = Path("301-github/variables.tf").read_text()
              match = re.search(r'variable "github_owner" {.*?default\s*=\s*"([^"]+)"', text, re.S)
              owner = match.group(1) if match else ""
            except OSError:
              owner = ""
          owner = owner or "qws941"

          token = os.getenv("TF_VAR_github_token", "").strip()
          headers = {
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
          }
          if token:
            headers["Authorization"] = f"Bearer {token}"

          owner_type = "Unknown"
          try:
            req = Request(f"https://api.github.com/users/{owner}", headers=headers)
            with urlopen(req, timeout=15) as resp:
              data = json.loads(resp.read().decode("utf-8"))
              owner_type = data.get("type", owner_type)
          except Exception as exc:  # pragma: no cover - best-effort guardrail
            print(f"warning: failed to detect owner type for {owner}: {exc}")

          print(f"GitHub owner '{owner}' detected as: {owner_type}")
          if owner_type == "Organization":
            print("Owner is an organization; no state pruning needed.")
            raise SystemExit(0)

          try:
            listed = subprocess.run(
              ["terraform", "state", "list"],
              check=False,
              capture_output=True,
              text=True,
            )
          except FileNotFoundError:
            print("terraform binary not found; skipping pruning.")
            raise SystemExit(0)

          resources = [line.strip() for line in (listed.stdout or "").splitlines() if line.strip()]
          prefixes = (
            "github_team.",
            "github_team_membership.",
            "github_team_repository.",
            "github_actions_organization_secret.",
            "github_actions_organization_variable.",
          )
          to_remove = [r for r in resources if r.startswith(prefixes)]

          if not to_remove:
            print("No org-only resources present in state; skipping prune.")
            raise SystemExit(0)

          print("Pruning org-only resources from state:")
          for addr in to_remove:
            print(f"- {addr}")

          result = subprocess.run(["terraform", "state", "rm", *to_remove])
          if result.returncode != 0:
            print("warning: terraform state rm exited with non-zero status; continue to apply.")
          PY

      - name: Migrate State — lxc_config only (Traefik)
        if: inputs.migrate-state == 'lxc_config'
        run: |
          terraform state rm module.lxc_config 2>/dev/null || true

      - name: Migrate State — lxc + lxc_config (Archon)
        if: inputs.migrate-state == 'lxc_and_lxc_config'
        run: |
          # Remove orphaned resources from previous config deployment era.
          terraform state rm module.lxc 2>/dev/null || true
          terraform state rm module.lxc_config 2>/dev/null || true

      - name: Migrate State — remove safework2 ghost resources (GitHub)
        if: inputs.migrate-state == 'safework2_cleanup'
        run: |
          # safework2 repo was deleted but resources remain in CI-persisted state.
          # Remove all safework2-related resources so refresh doesn't hit 404.
          terraform state list | grep 'safework2' | while read -r addr; do
            echo "Removing: $addr"
            terraform state rm "$addr" 2>/dev/null || true
          done
          echo '✅ safework2 state cleanup complete'
      - name: Create stub remote state for CI
        if: inputs.enable-repository-imports || inputs.needs-infra-state
        run: |
          # Workspaces that read data.terraform_remote_state.infra need
          # 100-pve/terraform.tfstate to exist. On CI this file doesn't exist.
          # Create an empty stub so terraform plan/apply can proceed.
          # Use $GITHUB_WORKSPACE for correct path regardless of working-directory depth.
          mkdir -p "$GITHUB_WORKSPACE/100-pve"
          echo '{"version":4,"terraform_version":"1.10.5","serial":0,"lineage":"","outputs":{},"resources":[]}' > "$GITHUB_WORKSPACE/100-pve/terraform.tfstate"


      - name: Import Proxmox resources
        if: inputs.enable-proxmox-imports
        uses: ./.github/actions/proxmox-import
        with:
          working-directory: ${{ inputs.working-directory }}
        env:
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
          PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_VE_API_TOKEN }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_VE_SSH_PRIVATE_KEY }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Import existing GitHub resources
        if: inputs.enable-repository-imports
        env:
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.request
          import time
          import urllib.error

          owner = "qws941"
          token = os.getenv("TF_VAR_github_token", "").strip()
          if not token:
            print("TF_VAR_github_token is required for GitHub imports")
            sys.exit(1)

          repos = [
            "terraform",
            "blacklist",
            "safetywallet",
            "opencode",
            "qws941",
            "tmux",
            "aimo3-prize",
            "march-mania",
            "kaggle-playground",
            "arc-prize",
            "agents-league",
            "propose",
            "resume",
            "hycu_fsds",
            "youtube",
            "splunk",
            "slack-opencode-bridge",
            ".github",

          ]

          def gh_get(path: str):
            req = urllib.request.Request(
              f"https://api.github.com{path}",
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as res:
                return json.loads(res.read().decode("utf-8"))
            except urllib.error.HTTPError as e:
              print(f"warning: {e.code} for {path} — skipping")
              return []

          # Pre-load state to skip already-managed resources (avoids 1P rate limits)
          state_proc = subprocess.run(
            ["terraform", "state", "list"],
            text=True, capture_output=True
          )
          managed_resources = set(
            line.strip() for line in (state_proc.stdout or "").splitlines() if line.strip()
          )
          print(f"state has {len(managed_resources)} managed resources")

          # Guard: skip imports if state appears lost (prevents 1P rate limit cascade)
          MIN_EXPECTED_RESOURCES = 10
          if len(managed_resources) < MIN_EXPECTED_RESOURCES:
            print(f"WARNING: state has only {len(managed_resources)} resources (expected >= {MIN_EXPECTED_RESOURCES}). Skipping imports to avoid rate limits — likely state file loss.")
            print("ACTION REQUIRED: restore terraform.tfstate from backup before re-running.")
            raise SystemExit(1)

          def tf_import(address: str, import_id: str):
            if address in managed_resources:
              print(f"already in state: {address}")
              return
            cmd = ["terraform", "import", "-input=false", address, import_id]
            max_retries = 3
            for attempt in range(max_retries + 1):
              proc = subprocess.run(cmd, text=True, capture_output=True)
              out = (proc.stdout or "") + (proc.stderr or "")
              if proc.returncode == 0:
                print(f"imported {address} <- {import_id}")
                managed_resources.add(address)
                return
              if "already managed by Terraform" in out:
                print(f"already managed: {address}")
                managed_resources.add(address)
                return
              if "Configuration for import target does not exist" in out:
                print(f"skipped (no config): {address}")
                return
              if "Cannot import non-existent remote object" in out:
                print(f"skipped (not found): {address}")
                return
              is_rate_limit = any(s in out for s in ["429", "Too Many Requests"]) or "rate limit" in out.lower()
              if is_rate_limit and attempt < max_retries:
                wait = 2 ** attempt * 5
                print(f"rate limited (attempt {attempt + 1}/{max_retries + 1}), retrying in {wait}s: {address}")
                time.sleep(wait)
                continue
              print(out)
              raise SystemExit(proc.returncode)
            print(f"failed after {max_retries + 1} attempts: {address}")
            raise SystemExit(1)

          for repo in repos:
            time.sleep(3)  # throttle between repos to avoid 1Password rate limits

            # Import the repository itself
            tf_import(f'github_repository.repos["{repo}"]', repo)
            time.sleep(1)

            # Import actions permissions
            tf_import(f'github_actions_repository_permissions.repositories["{repo}"]', repo)
            time.sleep(1)

            # Import dependabot security updates
            tf_import(f'github_repository_dependabot_security_updates.repositories["{repo}"]', repo)
            time.sleep(1)

            # Import rulesets for all repos (visibility-agnostic)
            rulesets = gh_get(f"/repos/{owner}/{repo}/rulesets?per_page=100")
            by_name = {r.get("name", ""): r.get("id") for r in rulesets if r.get("name") and r.get("id")}

            if by_name.get("default-branch-protection"):
              tf_import(
                f'github_repository_ruleset.branch["{repo}"]',
                f'{repo}:{by_name["default-branch-protection"]}',
              )
              time.sleep(1)
            if by_name.get("tag-protection"):
              tf_import(
                f'github_repository_ruleset.tags["{repo}"]',
                f'{repo}:{by_name["tag-protection"]}',
              )
              time.sleep(1)
            if by_name.get("code-scanning"):
              tf_import(
                f'github_repository_ruleset.code_scanning["{repo}"]',
                f'{repo}:{by_name["code-scanning"]}',
              )
              time.sleep(1)

            hooks = gh_get(f"/repos/{owner}/{repo}/hooks?per_page=100")
            for hook in hooks:
              hook_id = hook.get("id")
              hook_url = (hook.get("config") or {}).get("url", "")
              if not hook_id or "/webhook/" not in hook_url:
                continue
              hook_name = hook_url.rsplit("/webhook/", 1)[1].strip()
              if hook_name not in {
                "grafana-alert",
                "github-issue",
                "github-pr",
              }:
                continue
              tf_import(
                f'github_repository_webhook.webhooks["{repo}:{hook_name}"]',
                f"{repo}/{hook_id}",
              )
              time.sleep(1)
          PY

      - name: Backup State
        continue-on-error: true
        working-directory: ${{ inputs.working-directory }}
        run: |
          cp terraform.tfstate "terraform.tfstate.backup-$(date +%Y%m%d-%H%M%S)" 2>/dev/null || true
          echo 'State backup created (or no state file exists yet)'


      - name: Terraform Apply
        run: |
          set -o pipefail
          MAX_RETRIES=3
          BACKOFF=300
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "::group::Terraform Apply (attempt $attempt/$MAX_RETRIES)"
            if terraform apply -auto-approve -input=false -no-color 2>&1 | tee /tmp/tf-apply-out.txt; then
              echo '::endgroup::'
              echo '✅ Terraform apply succeeded'
              exit 0
            fi
            echo '::endgroup::'
            if grep -qi 'rate limit' /tmp/tf-apply-out.txt; then
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                echo "⏳ Rate limit hit — waiting ${BACKOFF}s before retry..."
                sleep "$BACKOFF"
                BACKOFF=$((BACKOFF * 2))
              else
                echo '❌ Rate limit persists after all retries'
                exit 1
              fi
            else
              echo '❌ Apply failed (not rate-limit related)'
              exit 1
            fi
          done
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_grafana_auth: ${{ secrets.TF_VAR_GRAFANA_AUTH }}
          TF_VAR_n8n_webhook_url: ${{ secrets.TF_VAR_N8N_WEBHOOK_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_synology_domain: ${{ secrets.TF_VAR_SYNOLOGY_DOMAIN }}
          TF_VAR_access_allowed_emails: ${{ secrets.TF_VAR_ACCESS_ALLOWED_EMAILS }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          # GitHub workspace only: set to 'true' when enable-repository-imports input is true
          TF_VAR_enable_repository_imports: ${{ inputs.enable-repository-imports && 'true' || 'false' }}
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
          PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_VE_API_TOKEN }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_VE_SSH_PRIVATE_KEY }}


      - name: Persist state
        if: always()
        run: |
          STATE_DIR="/home/runner/.terraform-state/${{ inputs.working-directory }}"
          STATE_SIZE=$(stat -c%s terraform.tfstate 2>/dev/null || echo 0)
          if [ "$STATE_SIZE" -gt 5000 ]; then
            mkdir -p "$STATE_DIR"
            cp terraform.tfstate "$STATE_DIR/terraform.tfstate"
            echo "✅ Persisted state to $STATE_DIR ($STATE_SIZE bytes)"
          else
            echo "⚠️ State file missing or too small (${STATE_SIZE} bytes) — skipping persist to avoid overwriting good state"
          fi

      - name: Post-Apply Verification
        if: success()
        run: |
          echo '=== Post-Apply Verification ==='
          terraform output -json > /dev/null 2>&1 && echo '✅ Terraform outputs valid' || echo '⚠️ No outputs defined'
          echo "Apply completed successfully for ${{ inputs.service-name }}"

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: ${{ inputs.failure-title-prefix }}
          extra-body: ${{ inputs.failure-extra-body }}
          labels: ${{ inputs.failure-labels }}
