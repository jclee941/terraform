name: Terraform Apply (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Display name of the service (e.g. "Archon", "ELK")'
        type: string
        required: true
      working-directory:
        description: 'Terraform working directory relative to repo root (e.g. "108-archon/terraform")'
        type: string
        required: true
      terraform-version:
        description: "Terraform version to install"
        type: string
        default: "1.10.5"
      migrate-state:
        description: "Run state migration to remove orphaned resources. Values: none | lxc_config | lxc_and_lxc_config"
        type: string
        default: "none"
      enable-repository-imports:
        description: "Set TF_VAR_enable_repository_imports=true (github workspace only)"
        type: boolean
        default: false
      needs-infra-state:
        description: "Create stub 100-pve state file for workspaces that read terraform_remote_state.infra"
        type: boolean
        default: false
      failure-title-prefix:
        description: 'Title prefix for failure issue (e.g. "[Archon] Apply failed on master")'
        type: string
        required: true
      failure-extra-body:
        description: "Service-specific checklist content for failure issue body"
        type: string
        default: ""
      failure-labels:
        description: "Comma-separated labels for failure issue"
        type: string
        default: "terraform-drift,automated,infrastructure"
    secrets:
      TF_API_TOKEN:
        required: false
      TF_VAR_GRAFANA_AUTH:
        required: false
      TF_VAR_N8N_WEBHOOK_URL:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      TF_VAR_CLOUDFLARE_ACCOUNT_ID:
        required: false
      TF_VAR_CLOUDFLARE_ZONE_ID:
        required: false
      TF_VAR_SYNOLOGY_DOMAIN:
        required: false
      TF_VAR_ACCESS_ALLOWED_EMAILS:
        required: false
      TF_VAR_GITHUB_TOKEN:
        required: false
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  apply:
    name: ${{ inputs.service-name }} Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: false

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: ${{ inputs.terraform-version }}
          working-directory: ${{ inputs.working-directory }}
          init-args: "-input=false"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Migrate State — lxc_config only (Traefik)
        if: inputs.migrate-state == 'lxc_config'
        run: |
          terraform state rm module.lxc_config 2>/dev/null || true

      - name: Migrate State — lxc + lxc_config (Archon)
        if: inputs.migrate-state == 'lxc_and_lxc_config'
        run: |
          # Remove orphaned resources from previous config deployment era.
          terraform state rm module.lxc 2>/dev/null || true
          terraform state rm module.lxc_config 2>/dev/null || true

      - name: Create stub remote state for CI
        if: inputs.enable-repository-imports || inputs.needs-infra-state
        run: |
          # Workspaces that read data.terraform_remote_state.infra need
          # 100-pve/terraform.tfstate to exist. On CI this file doesn't exist.
          # Create an empty stub so terraform plan/apply can proceed.
          # Use $GITHUB_WORKSPACE for correct path regardless of working-directory depth.
          mkdir -p "$GITHUB_WORKSPACE/100-pve"
          echo '{"version":4,"terraform_version":"1.10.5","serial":0,"lineage":"","outputs":{},"resources":[]}' > "$GITHUB_WORKSPACE/100-pve/terraform.tfstate"


      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Import existing GitHub resources
        if: inputs.enable-repository-imports
        env:
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.request
          import time
          import urllib.error

          owner = "qws941"
          token = os.getenv("TF_VAR_github_token", "").strip()
          if not token:
            print("TF_VAR_github_token is required for GitHub imports")
            sys.exit(1)

          repos = [
            "terraform",
            "blacklist",
            "safework2",
            "propose",
            "resume",
            "hycu_fsds",
            "youtube",
            "splunk",
            "tmux",
          ]

          def gh_get(path: str):
            req = urllib.request.Request(
              f"https://api.github.com{path}",
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as res:
                return json.loads(res.read().decode("utf-8"))
            except urllib.error.HTTPError as e:
              print(f"warning: {e.code} for {path} — skipping")
              return []

          # Pre-load state to skip already-managed resources (avoids 1P rate limits)
          state_proc = subprocess.run(
            ["terraform", "state", "list"],
            text=True, capture_output=True
          )
          managed_resources = set(
            line.strip() for line in (state_proc.stdout or "").splitlines() if line.strip()
          )
          print(f"state has {len(managed_resources)} managed resources")

          def tf_import(address: str, import_id: str):
            if address in managed_resources:
              print(f"already in state: {address}")
              return
            cmd = ["terraform", "import", "-input=false", address, import_id]
            max_retries = 3
            for attempt in range(max_retries + 1):
              proc = subprocess.run(cmd, text=True, capture_output=True)
              out = (proc.stdout or "") + (proc.stderr or "")
              if proc.returncode == 0:
                print(f"imported {address} <- {import_id}")
                managed_resources.add(address)
                return
              if "already managed by Terraform" in out:
                print(f"already managed: {address}")
                managed_resources.add(address)
                return
              if "Configuration for import target does not exist" in out:
                print(f"skipped (no config): {address}")
                return
              if "Cannot import non-existent remote object" in out:
                print(f"skipped (not found): {address}")
                return
              is_rate_limit = any(s in out for s in ["429", "Too Many Requests"]) or "rate limit" in out.lower()
              if is_rate_limit and attempt < max_retries:
                wait = 2 ** attempt * 5
                print(f"rate limited (attempt {attempt + 1}/{max_retries + 1}), retrying in {wait}s: {address}")
                time.sleep(wait)
                continue
              print(out)
              raise SystemExit(proc.returncode)
            print(f"failed after {max_retries + 1} attempts: {address}")
            raise SystemExit(1)

          for repo in repos:
            time.sleep(2)  # throttle imports to avoid 1Password rate limits
            rulesets = gh_get(f"/repos/{owner}/{repo}/rulesets?per_page=100")
            by_name = {r.get("name", ""): r.get("id") for r in rulesets if r.get("name") and r.get("id")}

            if by_name.get("default-branch-rules"):
              tf_import(
                f'github_repository_ruleset.branch["{repo}"]',
                f'{repo}:{by_name["default-branch-rules"]}',
              )
            if by_name.get("tag-protection"):
              tf_import(
                f'github_repository_ruleset.tags["{repo}"]',
                f'{repo}:{by_name["tag-protection"]}',
              )
            if by_name.get("required-code-scanning"):
              tf_import(
                f'github_repository_ruleset.code_scanning["{repo}"]',
                f'{repo}:{by_name["required-code-scanning"]}',
              )

            hooks = gh_get(f"/repos/{owner}/{repo}/hooks?per_page=100")
            for hook in hooks:
              hook_id = hook.get("id")
              hook_url = (hook.get("config") or {}).get("url", "")
              if not hook_id or "/webhook/" not in hook_url:
                continue
              hook_name = hook_url.rsplit("/webhook/", 1)[1].strip()
              if hook_name not in {
                "glitchtip-error",
                "grafana-alert",
                "github-issue",
                "github-pr",
              }:
                continue
              tf_import(
                f'github_repository_webhook.webhooks["{repo}:{hook_name}"]',
                f"{repo}/{hook_id}",
              )
          PY

      - name: Backup State
        continue-on-error: true
        working-directory: ${{ inputs.working-directory }}
        run: |
          cp terraform.tfstate "terraform.tfstate.backup-$(date +%Y%m%d-%H%M%S)" 2>/dev/null || true
          echo 'State backup created (or no state file exists yet)'

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_grafana_auth: ${{ secrets.TF_VAR_GRAFANA_AUTH }}
          TF_VAR_n8n_webhook_url: ${{ secrets.TF_VAR_N8N_WEBHOOK_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_synology_domain: ${{ secrets.TF_VAR_SYNOLOGY_DOMAIN }}
          TF_VAR_access_allowed_emails: ${{ secrets.TF_VAR_ACCESS_ALLOWED_EMAILS }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # GitHub workspace only: set to 'true' when enable-repository-imports input is true
          TF_VAR_enable_repository_imports: ${{ inputs.enable-repository-imports && 'true' || '' }}


      - name: Post-Apply Verification
        if: success()
        run: |
          echo '=== Post-Apply Verification ==='
          terraform output -json > /dev/null 2>&1 && echo '✅ Terraform outputs valid' || echo '⚠️ No outputs defined'
          echo "Apply completed successfully for ${{ inputs.service-name }}"

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: ${{ inputs.failure-title-prefix }}
          extra-body: ${{ inputs.failure-extra-body }}
          labels: ${{ inputs.failure-labels }}
