name: Terraform Drift Detection (Reusable)

on:
  workflow_call:
    inputs:
      workspaces:
        description: "JSON array of workspace objects: [{name, dir, init_args}]"
        type: string
        required: true
      terraform-version:
        description: "Terraform version to install"
        type: string
        default: "1.10.5"
    secrets:
      TF_API_TOKEN:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      OP_CONNECT_HOST:
        required: false
      OP_CONNECT_TOKEN:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  drift-check:
    name: Drift - ${{ matrix.workspace.name }}
    runs-on: self-hosted
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(inputs.workspaces) }}

    defaults:
      run:
        working-directory: ${{ matrix.workspace.dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: ${{ inputs.terraform-version }}
          working-directory: ${{ matrix.workspace.dir }}
          init-args: ${{ matrix.workspace.init_args }}
          install-tflint: "false"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=$?

          # Exit codes: 0=no changes, 1=error, 2=changes detected
          {
            echo "exit_code=$EXIT_CODE"
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "drift_detected=true"
              SUMMARY=$(grep -E '(Plan:|No changes)' plan_output.txt | head -5)
              echo "plan_summary<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            elif [ "$EXIT_CODE" -eq 1 ]; then
              echo "drift_detected=error"
            else
              echo "drift_detected=false"
            fi
          } >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Notify drift
        if: steps.plan.outputs.drift_detected == 'true'
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "[Drift] [${{ matrix.workspace.name }}] Infrastructure drift detected"
          title-match: contains
          custom-body: |
            ## Terraform Drift Detected

            **Workspace:** `${{ matrix.workspace.dir }}`

            ### Plan Summary
            ```
            ${{ steps.plan.outputs.plan_summary }}
            ```

            ### Action Required
            - [ ] Review drift with `terraform plan` in `${{ matrix.workspace.dir }}`
            - [ ] Merge IaC fix PR to trigger apply workflow automatically
            - [ ] Close this issue when resolved

            ### Common Causes
            - Out-of-band changes via provider UI (Proxmox, Grafana, Cloudflare, etc.)
            - Out-of-band configuration updates
            - Provider version updates

            ---
            *Auto-generated by [Terraform Drift Detection](${{ github.server_url }}/${{ github.repository }}/actions/workflows/terraform-drift.yml)*
          comment-body: |
            ## Drift Still Detected

            ```
            ${{ steps.plan.outputs.plan_summary }}
            ```

            Run `terraform plan` in `${{ matrix.workspace.dir }}` to see full details.
          labels: terraform-drift,automated,infrastructure

      - name: Notify error
        if: steps.plan.outputs.drift_detected == 'error'
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "[Drift] [${{ matrix.workspace.name }}] Terraform plan failed"
          custom-body: |
            ## Terraform Plan Error

            **Workspace:** `${{ matrix.workspace.dir }}`

            The drift detection workflow failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ### Action Required
            - [ ] Check Terraform state and provider connectivity
            - [ ] Verify secrets (TF_API_TOKEN, provider credentials) are valid
            - [ ] Push a scoped IaC fix commit to retrigger checks automatically

            ---
            *Auto-generated by Terraform Drift Detection*
          labels: terraform-drift,automated,bug
