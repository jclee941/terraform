name: Runner Health Check (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Self-hosted Runner Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Runner Status
        run: |
          set -euo pipefail

          DISK_THRESHOLD=${DISK_THRESHOLD:-90}
          MEM_THRESHOLD=${MEM_THRESHOLD:-95}

          disk_pct() {
            df -P / | awk 'NR==2 {gsub(/%/,"",$5); print $5}'
          }

          disk_human() {
            df -h / | awk 'NR==2{print $5}'
          }

          initial_disk_pct=$(disk_pct)
          initial_disk_usage=$(disk_human)
          cleanup_performed=false

          if [ "$initial_disk_pct" -gt "$DISK_THRESHOLD" ]; then
            cleanup_performed=true
            echo "Disk usage ${initial_disk_pct}% exceeds ${DISK_THRESHOLD}%; performing cleanup..."

            if command -v docker >/dev/null 2>&1; then
              docker system prune -af --volumes || echo "docker system prune failed; continuing"
              docker builder prune -af || echo "docker builder prune failed; continuing"
            else
              echo "Docker not available; skipping docker prune"
            fi

            if [ -n "${RUNNER_WORKSPACE:-}" ] && [ -d "$RUNNER_WORKSPACE" ]; then
              current_repo_parent=$(dirname "$GITHUB_WORKSPACE")
              find "$RUNNER_WORKSPACE" -mindepth 1 -maxdepth 1 -type d \
                ! -path "$current_repo_parent" \
                ! -path "$GITHUB_WORKSPACE" \
                -exec rm -rf {} +
            fi

            if [ -n "${RUNNER_WORKSPACE:-}" ]; then
              workspace_root=$(dirname "$RUNNER_WORKSPACE")
              if [ -d "$workspace_root" ] && [ "$workspace_root" != "$RUNNER_WORKSPACE" ]; then
                current_workspace_name=$(basename "$RUNNER_WORKSPACE")
                find "$workspace_root" -mindepth 1 -maxdepth 1 -type d ! -name "$current_workspace_name" -exec rm -rf {} +
              fi
            fi

            if [ -n "${RUNNER_TEMP:-}" ] && [ -d "$RUNNER_TEMP" ]; then
              find "$RUNNER_TEMP" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +
            fi
          fi

          # System info
          UPTIME=$(uptime -p)
          DISK_USAGE=$(disk_human)
          DISK_NUM=$(disk_pct)
          MEM_TOTAL=$(free -m | awk 'NR==2{printf "%.0f", $2}')
          MEM_USED=$(free -m | awk 'NR==2{printf "%.0f", $3}')
          MEM_PCT=$(free -m | awk 'NR==2{printf "%.0f", $3/$2*100}')
          LOAD=$(awk '{print $1, $2, $3}' /proc/loadavg)

          {
            echo "## Runner Health Check"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Uptime | $UPTIME |"
            echo "| Disk Usage | $DISK_USAGE |"
            echo "| Memory | ${MEM_USED}MB / ${MEM_TOTAL}MB (${MEM_PCT}%) |"
            echo "| Load Average | $LOAD |"
            if [ "$cleanup_performed" = true ]; then
              echo "| Cleanup | attempted (was ${initial_disk_usage}) |"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Check disk critical threshold
          if [ "$DISK_NUM" -gt "$DISK_THRESHOLD" ]; then
            echo "::error::Runner disk usage critical after cleanup: ${DISK_USAGE}"
            exit 1
          fi

          # Check memory critical threshold
          if [ "$MEM_PCT" -gt "$MEM_THRESHOLD" ]; then
            echo "::error::Runner memory critical: ${MEM_PCT}%"
            exit 1
          fi

          echo "✅ Runner healthy" >> "$GITHUB_STEP_SUMMARY"

      - name: Check Docker
        run: |
          if ! docker info > /dev/null 2>&1; then
            echo "::error::Docker daemon is not running"
            exit 1
          fi
          CONTAINERS=$(docker ps --format '{{.Names}}' | wc -l)
          echo "Docker: $CONTAINERS container(s) running" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Runner Health Check"
          labels: "bug,automation,infrastructure"
