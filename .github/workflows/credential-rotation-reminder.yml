# Credential Rotation Reminder

on:
  schedule:
    - cron: "0 9 * * 1"  # Weekly on Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8f4b7f84864484a7bf964b5666e891c49b5eabba # v4

      - name: Check credential expiry
        id: check
        run: |
          # Known credentials with fixed expiry dates or rotation cycles
          # Format: "name,expiry_date_in_YYYY-MM-DD,rotation_days"

          # n8n MCP API Key - fixed expiry (2026-05-11)
          N8N_EXPIRY="2026-05-11"

          # Calculate days until expiry
          EXPIRY_EPOCH=$(date -d "$N8N_EXPIRY" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$N8N_EXPIRY" +%s)
          TODAY_EPOCH=$(date +%s)
          DAYS_UNTIL=$(( (EXPIRY_EPOCH - TODAY_EPOCH) / 86400 ))

          echo "Days until n8n MCP API Key expiry: $DAYS_UNTIL"

          # Cloudflare Access service token - 60-day rotation cycle
          # This is managed via terraform time_rotating in access.tf
          # The token rotates every 60 days - we check if it's due for rotation
          # CF Access service token has a 60-day rotation cycle (managed via terraform time_rotating)

          # Build issue body if any credential is within 14 days of expiry
          ISSUE_BODY=""

          if [ "$DAYS_UNTIL" -le 14 ] && [ "$DAYS_UNTIL" -ge 0 ]; then
            ISSUE_BODY="## Credentials Requiring Rotation\n\n"
            ISSUE_BODY+="| Credential | Days Until Expiry | Action Required |\n"
            ISSUE_BODY+="| ---------- | ----------------- | --------------- |\n"
            ISSUE_BODY+="| n8n MCP API Key | $DAYS_UNTIL | Rotate before expiry |\n"
          elif [ "$DAYS_UNTIL" -lt 0 ]; then
            ISSUE_BODY="## ⚠️ Credentials Expired\n\n"
            ISSUE_BODY+="| Credential | Days Since Expiry | Action Required |\n"
            ISSUE_BODY+="| ---------- | ------------------ | --------------- |\n"
            ISSUE_BODY+="| n8n MCP API Key | $(( DAYS_UNTIL * -1 )) | Rotate immediately |\n"
          fi

          # Cloudflare Access service token - check if due for rotation
          # This is informational since it's automated via terraform
          ISSUE_BODY+="\n## Cloudflare Access Service Token\n"
          ISSUE_BODY+="- Rotation: 60-day cycle via terraform time_rotating\n"
          ISSUE_BODY+="- Next rotation: Check terraform state for next rotation date\n"

          # Set output for next step
          echo "body=$ISSUE_BODY" >> "$GITHUB_OUTPUT"

          # Set flag for whether to create issue
          if [ -n "$ISSUE_BODY" ] && [ "$ISSUE_BODY" != "$(echo -e "\n## Cloudflare Access Service Token")" ]; then
            echo "needs_issue=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_issue=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if credentials near expiry
        if: steps.check.outputs.needs_issue == 'true'
        uses: actions/github-script@60a0d30d7973f9c8a5d30ff3f6d6d1dc40e9f0ed # v7
        with:
          script: |
            const body = `${{ steps.check.outputs.body }}

            Created by: credential-rotation-reminder workflow`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 Credential Rotation Required - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['security', 'credential-rotation']
            });

            console.log(`Created issue #${issue.data.number}`);

      - name: No action needed
        if: steps.check.outputs.needs_issue == 'false'
        run: echo "No credentials require immediate rotation"
