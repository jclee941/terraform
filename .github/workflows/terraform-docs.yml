name: Terraform Docs

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "modules/**"
      - ".github/workflows/terraform-docs.yml"
      - ".github/workflows/_terraform-docs.yml"

permissions:
  contents: write

jobs:
  docs:
    uses: ./.github/workflows/_terraform-docs.yml
    secrets: inherit  # pragma: allowlist secret
