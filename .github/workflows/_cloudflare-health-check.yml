name: Cloudflare Health Check (Reusable)

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_API_KEY:
        required: false
      CLOUDFLARE_EMAIL:
        required: false
      TF_VAR_CLOUDFLARE_ACCOUNT_ID:
        required: false
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Cloudflare Tunnel & Worker Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load Cloudflare credentials
        id: cf-creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID:-}"
          API_TOKEN="${CLOUDFLARE_API_TOKEN:-}"
          API_KEY="${CLOUDFLARE_API_KEY:-}"
          API_EMAIL="${CLOUDFLARE_EMAIL:-}"

          # Optional fallback to 1Password (only if key/email are missing).
          if { [ -z "$API_KEY" ] || [ -z "$API_EMAIL" ] || [ -z "$ACCOUNT_ID" ]; } && [ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            if ! command -v op >/dev/null 2>&1; then
              OP_VERSION="2.32.1"
              curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
              unzip -o /tmp/op.zip -d /tmp/op-bin
              sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
              rm -rf /tmp/op.zip /tmp/op-bin
            fi

            API_KEY="${API_KEY:-$(op read op://homelab/cloudflare/secrets/api_key 2>/dev/null || true)}"
            API_EMAIL="${API_EMAIL:-$(op read op://homelab/cloudflare/secrets/email 2>/dev/null || true)}"
            ACCOUNT_ID="${ACCOUNT_ID:-$(op read op://homelab/cloudflare/secrets/account_id 2>/dev/null || true)}"
          fi

          if [ -z "$ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not configured"
            exit 1
          fi

          # Mask secrets before writing outputs
          [ -n "$API_TOKEN" ] && echo "::add-mask::$API_TOKEN"
          [ -n "$API_KEY" ] && echo "::add-mask::$API_KEY"
          [ -n "$API_EMAIL" ] && echo "::add-mask::$API_EMAIL"

          RESOLVED_MODE=""
          if [ -n "$API_TOKEN" ]; then
            RESOLVED_MODE="token"
            echo "token=$API_TOKEN" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$API_KEY" ] && [ -n "$API_EMAIL" ]; then
            [ -z "$RESOLVED_MODE" ] && RESOLVED_MODE="apikey"
            echo "api_key=$API_KEY" >> "$GITHUB_OUTPUT"
            echo "email=$API_EMAIL" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$RESOLVED_MODE" ]; then
            echo "::error::No Cloudflare API credentials available (token or api key/email)"
            exit 1
          fi

          echo "mode=$RESOLVED_MODE" >> "$GITHUB_OUTPUT"
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Check Tunnel Status
        env:
          CLOUDFLARE_AUTH_MODE: ${{ steps.cf-creds.outputs.mode }}
          CLOUDFLARE_API_TOKEN: ${{ steps.cf-creds.outputs.token }}
          CLOUDFLARE_API_KEY: ${{ steps.cf-creds.outputs.api_key }}
          CLOUDFLARE_EMAIL: ${{ steps.cf-creds.outputs.email }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-creds.outputs.account_id }}
        run: |
          set -euo pipefail

          if [ -z "$CLOUDFLARE_AUTH_MODE" ]; then
            echo "::error::Cloudflare auth mode not resolved"
            exit 1
          fi

          declare -a TOKEN_ARGS APIKEY_ARGS
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && TOKEN_ARGS=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          if [ -n "${CLOUDFLARE_API_KEY:-}" ] && [ -n "${CLOUDFLARE_EMAIL:-}" ]; then
            APIKEY_ARGS=(-H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}")
          fi

          fetch_tunnels() {
            curl -sk \
              "$@" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel"
          }

          ACTIVE_MODE="$CLOUDFLARE_AUTH_MODE"
          AUTH_ARGS=("${TOKEN_ARGS[@]}")
          if [ "$ACTIVE_MODE" = "apikey" ]; then
            AUTH_ARGS=("${APIKEY_ARGS[@]}")
          fi

          TUNNELS="$(fetch_tunnels "${AUTH_ARGS[@]}")"

          # Retry with API key if token auth is rejected
          if ! echo "$TUNNELS" | jq -e '.result' > /dev/null 2>&1; then
            if [ "$ACTIVE_MODE" = "token" ] && [ "${#APIKEY_ARGS[@]}" -gt 0 ]; then
              ACTIVE_MODE="apikey"
              TUNNELS="$(fetch_tunnels "${APIKEY_ARGS[@]}")"
              echo "Token auth failed; retried with API key" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          # Parse tunnel statuses (null-safe: API may return null result)
          if ! echo "$TUNNELS" | jq -e '.result' > /dev/null 2>&1; then
            echo "::error::Cloudflare API returned no tunnel data (check credentials)"
            echo "Response: $(echo "$TUNNELS" | jq -c '.errors // .messages // empty')"
            exit 1
          fi

          TOTAL=$(echo "$TUNNELS" | jq '.result | length')
          HEALTHY=$(echo "$TUNNELS" | jq '[.result[] | select(.status == "healthy")] | length')
          UNHEALTHY=$(echo "$TUNNELS" | jq '[.result[] | select(.status != "healthy")] | length')

          {
            echo "## Cloudflare Tunnel Status"
            echo ""
            echo "| Tunnel | Status |"
            echo "|--------|--------|"
            echo "$TUNNELS" | jq -r '.result[] | "| \(.name) | \(.status) |"'
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total tunnels | $TOTAL |"
            echo "| Healthy | $HEALTHY |"
            echo "| Unhealthy | $UNHEALTHY |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$UNHEALTHY" -gt 0 ]; then
            {
              echo ""
              echo "### Unhealthy Tunnels"
              echo "$TUNNELS" | jq -r '.result[] | select(.status != "healthy") | "- \(.name): \(.status)"'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::$UNHEALTHY tunnel(s) unhealthy"
            exit 1
          fi

          {
            echo ""
            echo "✅ All $HEALTHY tunnels healthy"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check Worker Errors
        env:
          CLOUDFLARE_AUTH_MODE: ${{ steps.cf-creds.outputs.mode }}
          CLOUDFLARE_API_TOKEN: ${{ steps.cf-creds.outputs.token }}
          CLOUDFLARE_API_KEY: ${{ steps.cf-creds.outputs.api_key }}
          CLOUDFLARE_EMAIL: ${{ steps.cf-creds.outputs.email }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-creds.outputs.account_id }}
        run: |
          set -euo pipefail

          declare -a TOKEN_ARGS APIKEY_ARGS
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && TOKEN_ARGS=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          if [ -n "${CLOUDFLARE_API_KEY:-}" ] && [ -n "${CLOUDFLARE_EMAIL:-}" ]; then
            APIKEY_ARGS=(-H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}")
          fi

          fetch_workers() {
            curl -sk \
              "$@" \
              -H "Content-Type: application/json" \
              -X POST \
              "https://api.cloudflare.com/client/v4/graphql" \
              -d '{
                "query": "query { viewer { accounts(filter: { accountTag: \"'"${CLOUDFLARE_ACCOUNT_ID}"'\" }) { workersInvocationsAdaptive(filter: { datetime_geq: \"24h\" }) { sum { errors success } } } } }"
              }'
          }

          ACTIVE_MODE="$CLOUDFLARE_AUTH_MODE"
          AUTH_ARGS=("${TOKEN_ARGS[@]}")
          if [ "$ACTIVE_MODE" = "apikey" ]; then
            AUTH_ARGS=("${APIKEY_ARGS[@]}")
          fi

          # Query worker invocations from GraphQL Analytics API for last 24 hours
          RESPONSE="$(fetch_workers "${AUTH_ARGS[@]}")"

          # Retry with API key if token auth is rejected
          if ! echo "$RESPONSE" | jq -e '.data.viewer.accounts[0].workersInvocationsAdaptive.sum' > /dev/null 2>&1; then
            if [ "$ACTIVE_MODE" = "token" ] && [ "${#APIKEY_ARGS[@]}" -gt 0 ]; then
              ACTIVE_MODE="apikey"
              RESPONSE="$(fetch_workers "${APIKEY_ARGS[@]}")"
              echo "Token auth failed; retried worker query with API key" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          # Parse error count (fallback to 0 if query returns no data)
          if ! echo "$RESPONSE" | jq -e '.data.viewer.accounts[0].workersInvocationsAdaptive.sum' > /dev/null 2>&1; then
            echo "::error::Cloudflare GraphQL response missing worker data (check credentials)"
            echo "Response: $(echo "$RESPONSE" | jq -c '.errors // .messages // empty')"
            exit 1
          fi

          ERRORS=$(echo "$RESPONSE" | jq -r '.data.viewer.accounts[0].workersInvocationsAdaptive.sum.errors // 0')
          SUCCESS=$(echo "$RESPONSE" | jq -r '.data.viewer.accounts[0].workersInvocationsAdaptive.sum.success // 0')

          {
            echo ""
            echo "## Worker Errors (24h)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Errors | $ERRORS |"
            echo "| Successful | $SUCCESS |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Threshold: fail if > 100 errors in last 24 hours
          if [ "$ERRORS" -gt 100 ]; then
            echo "::error::Worker errors ($ERRORS) exceed threshold of 100"
            exit 1
          fi

          {
            echo ""
            echo "✅ Worker errors within threshold (≤100)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Cloudflare Health Check"
          labels: "bug,automation,infrastructure"

      - name: Summary
        if: always()
        run: |
          echo "Cloudflare health check completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
