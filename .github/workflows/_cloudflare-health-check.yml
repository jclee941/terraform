name: Cloudflare Health Check (Reusable)

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      TF_VAR_CLOUDFLARE_ACCOUNT_ID:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Cloudflare Tunnel & Worker Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Tunnel Status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Query all tunnels from Cloudflare API v4
          TUNNELS=$(curl -sk \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel")

          # Parse tunnel statuses (null-safe: API may return null result)
          if ! echo "$TUNNELS" | jq -e '.result' > /dev/null 2>&1; then
            echo "::error::Cloudflare API returned no tunnel data (check token permissions)"
            echo "Response: $(echo "$TUNNELS" | jq -c '.errors // .messages // empty')"
            exit 1
          fi

          TOTAL=$(echo "$TUNNELS" | jq '.result | length')
          HEALTHY=$(echo "$TUNNELS" | jq '[.result[] | select(.status == "healthy")] | length')
          UNHEALTHY=$(echo "$TUNNELS" | jq '[.result[] | select(.status != "healthy")] | length')

          {
            echo "## Cloudflare Tunnel Status"
            echo ""
            echo "| Tunnel | Status |"
            echo "|--------|--------|"
            echo "$TUNNELS" | jq -r '.result[] | "| \(.name) | \(.status) |"'
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total tunnels | $TOTAL |"
            echo "| Healthy | $HEALTHY |"
            echo "| Unhealthy | $UNHEALTHY |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$UNHEALTHY" -gt 0 ]; then
            {
              echo ""
              echo "### Unhealthy Tunnels"
              echo "$TUNNELS" | jq -r '.result[] | select(.status != "healthy") | "- \(.name): \(.status)"'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::$UNHEALTHY tunnel(s) unhealthy"
            exit 1
          fi

          {
            echo ""
            echo "✅ All $HEALTHY tunnels healthy"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check Worker Errors
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Query worker invocations from GraphQL Analytics API for last 24 hours
          RESPONSE=$(curl -sk \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://api.cloudflare.com/client/v4/graphql" \
            -d '{
              "query": "query { viewer { accounts(filter: { accountTag: \"'"${CLOUDFLARE_ACCOUNT_ID}"'\" }) { workersInvocationsAdaptive(filter: { datetime_geq: \"24h\" }) { sum { errors success } } } } }"
            }')

          # Parse error count (fallback to 0 if query returns no data)
          ERRORS=$(echo "$RESPONSE" | jq -r '.data.viewer.accounts[0].workersInvocationsAdaptive.sum.errors // 0')
          SUCCESS=$(echo "$RESPONSE" | jq -r '.data.viewer.accounts[0].workersInvocationsAdaptive.sum.success // 0')

          {
            echo ""
            echo "## Worker Errors (24h)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Errors | $ERRORS |"
            echo "| Successful | $SUCCESS |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Threshold: fail if > 100 errors in last 24 hours
          if [ "$ERRORS" -gt 100 ]; then
            echo "::error::Worker errors ($ERRORS) exceed threshold of 100"
            exit 1
          fi

          {
            echo ""
            echo "✅ Worker errors within threshold (≤100)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Cloudflare Health Check"
          labels: "bug,automation,infrastructure"

      - name: Summary
        if: always()
        run: |
          echo "Cloudflare health check completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
