name: Terraform Test (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (Modules)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        suite:
          - {name: proxmox, path: tests/modules/proxmox}
          - {name: shared, path: tests/modules/shared}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: ${{ matrix.suite.path }}

      - name: Run ${{ matrix.suite.name }} tests
        working-directory: ${{ matrix.suite.path }}
        run: terraform test

  workspace-tests:
    name: Workspace Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pve
            path: tests/workspaces/pve
            use_chdir: false
            test_dir: ""
          - name: cloudflare
            path: tests/workspaces/cloudflare
            use_chdir: false
            test_dir: ""
          - name: grafana
            path: tests/workspaces/grafana
            use_chdir: false
            test_dir: ""
          - name: elk
            path: tests/workspaces/elk
            use_chdir: false
            test_dir: ""
          - name: slack
            path: tests/workspaces/slack
            use_chdir: false
            test_dir: ""

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: ${{ matrix.path }}

      - name: Run ${{ matrix.name }} workspace tests
        if: ${{ !matrix.use_chdir }}
        working-directory: ${{ matrix.path }}
        run: terraform test

      - name: Run ${{ matrix.name }} workspace tests (chdir)
        if: ${{ matrix.use_chdir }}
        run: terraform -chdir=${{ matrix.path }} test -test-directory=${{ matrix.test_dir }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: tests/integration

      - name: Run integration tests
        working-directory: tests/integration
        run: terraform test
