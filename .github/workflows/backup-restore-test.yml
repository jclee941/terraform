name: Backup Restore Test

on:
  schedule:
    - cron: '0 8 * * 0'  # Weekly Sunday 08:00 UTC (after weekend backups)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: backup-restore-test
  cancel-in-progress: false

jobs:
  restore-test:
    uses: ./.github/workflows/_backup-restore-test.yml
    secrets: inherit  # pragma: allowlist secret
