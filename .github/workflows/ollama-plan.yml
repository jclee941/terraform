name: Ollama Plan

on:
  pull_request:
    paths:
      - "109-ollama/**"

concurrency:
  group: ollama-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      service-name: Ollama
      working-directory: 109-ollama/terraform
      needs-infra-state: true
    secrets: inherit # pragma: allowlist secret
