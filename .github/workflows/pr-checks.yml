name: PR Checks
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  pr-checks:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    uses: jclee941/.github/.github/workflows/reusable-pr-checks.yml@master
    secrets: inherit
