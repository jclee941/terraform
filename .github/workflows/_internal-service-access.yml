name: Internal Service Access Test (Reusable)

on:
  workflow_call:
    inputs:
      domain:
        description: "Base domain for service endpoints (e.g., jclee.me)"
        type: string
        default: "jclee.me"
    secrets:
      CF_ACCESS_CLIENT_ID:
        required: false
      CF_ACCESS_CLIENT_SECRET:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  test-internal-services:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify Secrets Configured
        id: secrets_check
        run: |
          if [ -z "$CF_ACCESS_CLIENT_ID" ] || [ -z "$CF_ACCESS_CLIENT_SECRET" ]; then
            echo "::warning::CF_ACCESS_CLIENT_ID or CF_ACCESS_CLIENT_SECRET not configured. Skipping service tests."
            echo "Please add these secrets in repository settings."
            echo "creds_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "Cloudflare Access credentials configured"
            echo "creds_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Test Traefik API
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://traefik-api.${{ inputs.domain }}/api/http/routers)
          echo "Traefik API: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test Grafana
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://grafana.${{ inputs.domain }}/api/health)
          echo "Grafana: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test MCP Gateway
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://mcp.${{ inputs.domain }}/)
          echo "MCP Gateway: $response"
          # MCP may return various codes, just verify not 403
          [ "$response" != "403" ] || exit 1

      - name: Test Archon
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://archon.${{ inputs.domain }}/)
          echo "Archon: $response"
          [ "$response" = "200" ] || [ "$response" = "302" ] || exit 1

      - name: Test n8n
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://n8n.${{ inputs.domain }}/healthz)
          echo "n8n: $response"
          [ "$response" = "200" ] || exit 1

      - name: Test Kibana
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://kibana.${{ inputs.domain }}/api/status)
          echo "Kibana: $response"
          [ "$response" = "200" ] || exit 1

      - name: Verify Auth Required (Negative Test)
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          # Request WITHOUT headers should be blocked
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://grafana.${{ inputs.domain }}/api/health)
          echo "Unauthenticated request: $response"
          # Should get 403 or redirect to login
          if [ "$response" = "403" ] || [ "$response" = "302" ]; then
            echo "Auth correctly required"
          else
            echo "::warning::Expected 403 or 302, got $response - Access policy may not be enforced"
          fi

      - name: Verify ES NOT Accessible (Security Check)
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          # Elasticsearch should NOT be accessible via tunnel
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://es.${{ inputs.domain }}/ 2>/dev/null || echo "000")
          echo "Elasticsearch access attempt: $response"
          if [ "$response" = "200" ]; then
            echo "::error::Elasticsearch is exposed! This is a security issue."
            exit 1
          fi
          echo "Elasticsearch correctly NOT accessible"

      - name: Summary
        if: steps.secrets_check.outputs.creds_ok == 'true'
        run: |
          {
            echo "## Internal Service Access Test Results"
            echo ""
            echo "| Service | Subdomain | Status |"
            echo "|---------|-----------|--------|"
            echo "| Traefik API | traefik-api.${{ inputs.domain }} | Passed |"
            echo "| Grafana | grafana.${{ inputs.domain }} | Passed |"
            echo "| MCP Gateway | mcp.${{ inputs.domain }} | Passed |"
            echo "| Archon | archon.${{ inputs.domain }} | Passed |"
            echo "| n8n | n8n.${{ inputs.domain }} | Passed |"
            echo "| Kibana | kibana.${{ inputs.domain }} | Passed |"
            echo ""
            echo "### Security Checks"
            echo "- Auth required for unauthenticated requests"
            echo "- Elasticsearch NOT accessible via tunnel"
            echo ""
            echo "*Tested at: $(date -u)*"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip Notice
        if: steps.secrets_check.outputs.creds_ok != 'true'
        run: |
          {
            echo "## Internal Service Access Test - Skipped"
            echo ""
            echo "CF_ACCESS_CLIENT_ID or CF_ACCESS_CLIENT_SECRET not configured."
            echo "Service tests were skipped. Configure secrets to enable."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Issue on Failure
        if: failure() && steps.secrets_check.outputs.creds_ok == 'true'
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "Service health check failed"
          extra-body: |
            One or more internal services failed their health check.
            Please review the workflow run for details on which services are down.
          labels: "bug,monitoring"
