name: Production Verify (Reusable)

on:
  workflow_call:
    inputs:
      prom_host:
        description: 'Prometheus Host IP'
        type: string
        default: '192.168.50.104'
      grafana_host:
        description: 'Grafana Host IP'
        type: string
        default: '192.168.50.104'
      elk_host:
        description: 'ELK Host IP'
        type: string
        default: '192.168.50.105'
      n8n_host:
        description: 'N8N Host IP'
        type: string
        default: '192.168.50.112'
      psql_host:
        description: 'PostgreSQL Host IP'
        type: string
        default: '192.168.50.100'
    secrets:
      GH_PAT:
        required: false
      GRAFANA_TOKEN:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  verify:
    name: Production Verification
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run verification script
        id: verify
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          PROM_HOST: ${{ inputs.prom_host }}
          GRAFANA_HOST: ${{ inputs.grafana_host }}
          ELK_HOST: ${{ inputs.elk_host }}
          N8N_HOST: ${{ inputs.n8n_host }}
          PSQL_HOST: ${{ inputs.psql_host }}
        run: |
          chmod +x scripts/production_verification_v2.sh
          ./scripts/production_verification_v2.sh

      - name: Create or update issue on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Production Verification Failed"
          custom-title: "🔴 Production Verification Failed"
          title-match: prefix
          update-title: "true"
          labels: bug,verification
          custom-body: |
            ## Production Verification Failed

            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the workflow logs for details on which tests failed.
