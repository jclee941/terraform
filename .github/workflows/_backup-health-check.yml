name: Backup Health Check (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Proxmox Backup Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Proxmox Backup Tasks
        env:
          PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          # Query recent backup tasks from last 24 hours
          TASKS=$(curl -sk \
            -H "Authorization: PVEAPIToken=${PROXMOX_API_TOKEN}" \
            "${PROXMOX_ENDPOINT}/api2/json/nodes/pve3/tasks" \
            --data-urlencode "typefilter=vzdump" \
            --data-urlencode "limit=50" \
            --data-urlencode "since=$(date -d '24 hours ago' +%s)" \
            -G)

          # Parse task results
          TOTAL=$(echo "$TASKS" | jq '.data | length')
          FAILED=$(echo "$TASKS" | jq '[.data[] | select(.status != "OK")] | length')
          OK=$(echo "$TASKS" | jq '[.data[] | select(.status == "OK")] | length')

          {
            echo "## Proxmox Backup Status"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total tasks (24h) | $TOTAL |"
            echo "| Successful | $OK |"
            echo "| Failed | $FAILED |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No backup tasks found in last 24 hours"
            exit 1
          fi

          if [ "$FAILED" -gt 0 ]; then
            {
              echo ""
              echo "### Failed Tasks"
              echo "$TASKS" | jq -r '.data[] | select(.status != "OK") | "- VMID \(.id // "unknown"): \(.status) (started: \(.starttime | todate))"'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::$FAILED backup task(s) failed"
            exit 1
          fi

          {
            echo ""
            echo "✅ All $OK backup tasks completed successfully"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Backup Health Check"
          labels: "bug,automation,infrastructure"

      - name: Summary
        if: always()
        run: |
          echo "Backup health check completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
