name: Synology Health Check (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Synology NAS Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve Synology credentials
        id: synology_creds
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SYNOLOGY_USER_SECRET: ${{ secrets.SYNOLOGY_USER }}
          SYNOLOGY_PASSWORD_SECRET: ${{ secrets.SYNOLOGY_PASSWORD }}
        run: |
          USERNAME="${SYNOLOGY_USER_SECRET:-}"
          PASSWORD="${SYNOLOGY_PASSWORD_SECRET:-}"

          if [ -n "$USERNAME" ] && [ -n "$PASSWORD" ]; then
            echo "source=github-secrets" >> "$GITHUB_OUTPUT"
            echo "synology_user=$USERNAME" >> "$GITHUB_OUTPUT"
            echo "synology_password=$PASSWORD" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "source=missing" >> "$GITHUB_OUTPUT"
            echo "reason=SYNOLOGY_USER/SYNOLOGY_PASSWORD not configured and OP_SERVICE_ACCOUNT_TOKEN missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! command -v op >/dev/null 2>&1; then
            OP_VERSION="2.32.1"
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          fi

          if ! op --version >/dev/null 2>&1; then
            echo "source=error" >> "$GITHUB_OUTPUT"
            echo "reason=1Password CLI unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! op whoami --format json >/dev/null 2>&1; then
            echo "source=error" >> "$GITHUB_OUTPUT"
            echo "reason=1Password authentication failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          USERNAME=$(op read "op://homelab/synology/username" 2>/dev/null || true)
          PASSWORD=$(op read "op://homelab/synology/password" 2>/dev/null || true)

          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "source=error" >> "$GITHUB_OUTPUT"
            echo "reason=Synology credentials missing in 1Password" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"
          {
            echo "source=1password"
            echo "synology_user=$USERNAME"
            echo "synology_password=$PASSWORD"
            echo "reason="
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate with DSM
        id: auth
        env:
          SYNOLOGY_HOST: "192.168.50.215"
          SYNOLOGY_PORT: "5000"
          SYNOLOGY_USER: ${{ steps.synology_creds.outputs.synology_user }}
          SYNOLOGY_PASSWORD: ${{ steps.synology_creds.outputs.synology_password }}
          CREDS_SOURCE: ${{ steps.synology_creds.outputs.source }}
          CREDS_REASON: ${{ steps.synology_creds.outputs.reason }}
        run: |
          CREDS_SOURCE="${CREDS_SOURCE:-missing}"
          CREDS_REASON="${CREDS_REASON:-Synology credentials unavailable}"

          if [ "$CREDS_SOURCE" != "github-secrets" ] && [ "$CREDS_SOURCE" != "1password" ]; then
            echo "::error::$CREDS_REASON"
            exit 1
          fi

          if [ -z "$SYNOLOGY_USER" ] || [ -z "$SYNOLOGY_PASSWORD" ]; then
            echo "::error::Synology credentials missing (${CREDS_SOURCE})"
            exit 1
          fi

          # Login to DSM API
          AUTH=$(curl -sk \
            "http://${SYNOLOGY_HOST}:${SYNOLOGY_PORT}/webapi/auth.cgi?api=SYNO.API.Auth&version=3&method=login&account=${SYNOLOGY_USER}&passwd=${SYNOLOGY_PASSWORD}&format=sid")

          SID=$(echo "$AUTH" | jq -r '.data.sid // empty')

          if [ -z "$SID" ]; then
            echo "::error::Failed to authenticate with Synology DSM"
            exit 1
          fi

          echo "::add-mask::$SID"
          echo "sid=$SID" >> "$GITHUB_OUTPUT"
          echo "base_url=http://${SYNOLOGY_HOST}:${SYNOLOGY_PORT}" >> "$GITHUB_OUTPUT"

      - name: Check System Health
        env:
          SID: ${{ steps.auth.outputs.sid }}
          BASE_URL: ${{ steps.auth.outputs.base_url }}
        run: |
          # Get system info
          SYSTEM=$(curl -sk \
            "${BASE_URL}/webapi/entry.cgi?api=SYNO.DSM.Info&version=2&method=getinfo&_sid=${SID}")

          MODEL=$(echo "$SYSTEM" | jq -r '.data.model // "unknown"')
          RAM=$(echo "$SYSTEM" | jq -r '.data.ram // 0')
          UPTIME=$(echo "$SYSTEM" | jq -r '.data.uptime // 0')
          TEMP=$(echo "$SYSTEM" | jq -r '.data.temperature // 0')

          UPTIME_DAYS=$((UPTIME / 86400))
          UPTIME_HOURS=$(( (UPTIME % 86400) / 3600 ))

          {
            echo "## Synology NAS Health"
            echo ""
            echo "### System Info"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Model | $MODEL |"
            echo "| RAM | ${RAM} MB |"
            echo "| Uptime | ${UPTIME_DAYS}d ${UPTIME_HOURS}h |"
            echo "| Temperature | ${TEMP}Â°C |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Alert if temperature is high
          if [ "$TEMP" -gt 60 ]; then
            echo "::warning::System temperature is ${TEMP}Â°C (threshold: 60Â°C)"
          fi

      - name: Check Storage Health
        env:
          SID: ${{ steps.auth.outputs.sid }}
          BASE_URL: ${{ steps.auth.outputs.base_url }}
        run: |
          FAILED=0

          # Get storage pool/volume info
          STORAGE=$(curl -sk \
            "${BASE_URL}/webapi/entry.cgi?api=SYNO.Storage.CGI.Storage&version=1&method=load_info&_sid=${SID}")

          # Check disks
          {
            echo ""
            echo "### Disk Health"
            echo "| Disk | Status | Temperature | S.M.A.R.T. |"
            echo "|------|--------|-------------|------------|"
          } >> "$GITHUB_STEP_SUMMARY"

          DISK_COUNT=$(echo "$STORAGE" | jq '.data.disks | length')

          for i in $(seq 0 $((DISK_COUNT - 1))); do
            DISK=$(echo "$STORAGE" | jq ".data.disks[$i]")
            NAME=$(echo "$DISK" | jq -r '.name // "unknown"')
            STATUS=$(echo "$DISK" | jq -r '.status // "unknown"')
            DISK_TEMP=$(echo "$DISK" | jq -r '.temp // 0')
            SMART=$(echo "$DISK" | jq -r '.smart_status // "unknown"')

            SMART_ICON="âś…"
            if [ "$SMART" != "normal" ]; then
              SMART_ICON="âťŚ"
              FAILED=$((FAILED + 1))
            fi

            STATUS_DISPLAY="$STATUS"
            if [ "$STATUS" != "normal" ]; then
              STATUS_DISPLAY="âš ď¸Ź $STATUS"
              FAILED=$((FAILED + 1))
            fi

            echo "| $NAME | $STATUS_DISPLAY | ${DISK_TEMP}Â°C | $SMART_ICON $SMART |" >> "$GITHUB_STEP_SUMMARY"

            # Alert if disk temp is high
            if [ "$DISK_TEMP" -gt 50 ]; then
              echo "::warning::Disk $NAME temperature is ${DISK_TEMP}Â°C (threshold: 50Â°C)"
            fi
          done

          # Check RAID/volumes
          {
            echo ""
            echo "### Volume Status"
            echo "| Volume | Status | Used |"
            echo "|--------|--------|------|"
          } >> "$GITHUB_STEP_SUMMARY"

          VOL_COUNT=$(echo "$STORAGE" | jq '.data.volumes | length')

          for i in $(seq 0 $((VOL_COUNT - 1))); do
            VOL=$(echo "$STORAGE" | jq ".data.volumes[$i]")
            VOL_ID=$(echo "$VOL" | jq -r '.id // "unknown"')
            VOL_STATUS=$(echo "$VOL" | jq -r '.status // "unknown"')
            TOTAL=$(echo "$VOL" | jq -r '.size.total // 0')
            USED=$(echo "$VOL" | jq -r '.size.used // 0')

            if [ "$TOTAL" -gt 0 ]; then
              USED_PCT=$((USED * 100 / TOTAL))
            else
              USED_PCT=0
            fi

            STATUS_DISPLAY="âś… $VOL_STATUS"
            if [ "$VOL_STATUS" != "normal" ]; then
              STATUS_DISPLAY="âťŚ $VOL_STATUS"
              FAILED=$((FAILED + 1))
            fi

            echo "| $VOL_ID | $STATUS_DISPLAY | ${USED_PCT}% |" >> "$GITHUB_STEP_SUMMARY"

            # Alert if volume usage is high
            if [ "$USED_PCT" -gt 90 ]; then
              echo "::warning::Volume $VOL_ID usage is ${USED_PCT}% (threshold: 90%)"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED storage health issue(s) detected"
            exit 1
          fi

          {
            echo ""
            echo "âś… All disks and volumes healthy"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Logout
        if: always()
        env:
          SID: ${{ steps.auth.outputs.sid }}
          BASE_URL: ${{ steps.auth.outputs.base_url }}
        run: |
          if [ -n "$SID" ]; then
            curl -sk "${BASE_URL}/webapi/auth.cgi?api=SYNO.API.Auth&version=3&method=logout&_sid=${SID}" > /dev/null 2>&1 || true
          fi

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "đź”´ Synology Health Check"
          labels: "bug,automation,infrastructure"

      - name: Summary
        if: always()
        run: |
          echo "Synology health check completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
