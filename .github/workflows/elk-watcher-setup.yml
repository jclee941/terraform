name: ELK Watcher Setup

on:
  workflow_dispatch:
    inputs:
      es_host:
        description: "Elasticsearch host URL"
        required: false
        default: "http://192.168.50.105:9200"
        type: string
      webhook_url:
        description: "Worker webhook URL for ELK alerts"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: elk-watcher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-watcher:
    runs-on: [self-hosted, homelab]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fetch Elasticsearch credentials from 1Password
        id: elk_creds
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "::error::OP_SERVICE_ACCOUNT_TOKEN not configured"
            exit 1
          fi

          if ! command -v op >/dev/null 2>&1; then
            OP_VERSION="2.32.1"
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          fi

          op whoami --format json >/dev/null 2>&1
          ES_PASSWORD=$(op read "op://homelab/elk/secrets/elastic_password")

          if [ -z "$ES_PASSWORD" ]; then
            echo "::error::elastic_password missing in 1Password"
            exit 1
          fi

          echo "::add-mask::$ES_PASSWORD"
          echo "elastic_password=$ES_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Setup watcher
        env:
          ES_PASSWORD: ${{ steps.elk_creds.outputs.elastic_password }}
        run: |
          export ES_PASSWORD
          go run 105-elk/scripts/setup-watcher.go "${{ inputs.es_host }}" "${{ inputs.webhook_url }}" "${{ secrets.ELK_WEBHOOK_SECRET }}"

      - name: Verify watcher
        env:
          ES_PASSWORD: ${{ steps.elk_creds.outputs.elastic_password }}
        run: |
          curl -sf -u "elastic:$ES_PASSWORD" "${{ inputs.es_host }}/_watcher/watch/elk-error-alerts" | jq '.found, .watch.trigger'
