name: Secret Audit
on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions:
  contents: read

jobs:
  audit:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate required secrets
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_API_TOKEN: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_PROXMOX_INSECURE: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          TF_VAR_GRAFANA_AUTH: ${{ secrets.TF_VAR_GRAFANA_AUTH }}
          TF_VAR_N8N_WEBHOOK_URL: ${{ secrets.TF_VAR_N8N_WEBHOOK_URL }}
          TF_VAR_SUPABASE_URL: ${{ secrets.TF_VAR_SUPABASE_URL }}
          TF_VAR_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_CLOUDFLARE_ZONE_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_SYNOLOGY_DOMAIN: ${{ secrets.TF_VAR_SYNOLOGY_DOMAIN }}
          TF_VAR_ACCESS_ALLOWED_EMAILS: ${{ secrets.TF_VAR_ACCESS_ALLOWED_EMAILS }}
          TF_VAR_GITHUB_TOKEN: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          p0_missing=0
          p1_missing=0
          p2_missing=0
          total=0

          check_secret() {
            local name="$1"
            local priority="$2"
            total=$((total + 1))
            if [ -z "${!name:-}" ]; then
              if [ "$priority" = "P0" ]; then
                echo "::error::Missing secret: ${name} (${priority})"
                p0_missing=$((p0_missing + 1))
              else
                echo "::warning::Missing secret: ${name} (${priority})"
                if [ "$priority" = "P1" ]; then
                  p1_missing=$((p1_missing + 1))
                else
                  p2_missing=$((p2_missing + 1))
                fi
              fi
            else
              echo "OK: ${name} (${priority})"
            fi
          }

          echo "=== P0: Blocks all Terraform workflows ==="
          check_secret TF_VAR_PROXMOX_ENDPOINT P0
          check_secret TF_VAR_PROXMOX_API_TOKEN P0
          check_secret TF_VAR_PROXMOX_INSECURE P0

          echo ""
          echo "=== P1: Individual workspace secrets ==="
          check_secret TF_API_TOKEN P1
          check_secret TF_VAR_GRAFANA_AUTH P1
          check_secret TF_VAR_N8N_WEBHOOK_URL P1
          check_secret TF_VAR_SUPABASE_URL P1
          check_secret TF_VAR_CLOUDFLARE_ACCOUNT_ID P1
          check_secret TF_VAR_CLOUDFLARE_ZONE_ID P1
          check_secret TF_VAR_SYNOLOGY_DOMAIN P1
          check_secret TF_VAR_ACCESS_ALLOWED_EMAILS P1
          check_secret TF_VAR_GITHUB_TOKEN P1
          check_secret OP_SERVICE_ACCOUNT_TOKEN P0

          echo ""
          echo "=== P2: Non-Terraform workflows ==="
          check_secret CLOUDFLARE_API_TOKEN P2
          check_secret CLOUDFLARE_ACCOUNT_ID P2
          check_secret GH_PAT P2
          check_secret CF_ACCESS_CLIENT_ID P2
          check_secret CF_ACCESS_CLIENT_SECRET P2

          missing=$((p0_missing + p1_missing + p2_missing))
          echo ""
          echo "Result: ${total} checked, $((total - missing)) configured, ${missing} missing (P0:${p0_missing} P1:${p1_missing} P2:${p2_missing})"

          # Only fail on P0 (critical) secrets. P1/P2 are warnings only.
          if [ "$p0_missing" -gt 0 ]; then
            echo "::error::${p0_missing} critical (P0) secrets missing. Terraform workflows will fail."
            exit 1
          elif [ "$missing" -gt 0 ]; then
            echo "::warning::${missing} non-critical secrets missing. Run: scripts/setup-github-secrets.sh"
          fi
