name: Secret Audit
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_API_TOKEN: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_PROXMOX_INSECURE: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          TF_VAR_GRAFANA_AUTH: ${{ secrets.TF_VAR_GRAFANA_AUTH }}
          TF_VAR_N8N_WEBHOOK_URL: ${{ secrets.TF_VAR_N8N_WEBHOOK_URL }}
          TF_VAR_SUPABASE_URL: ${{ secrets.TF_VAR_SUPABASE_URL }}
          TF_VAR_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_CLOUDFLARE_ZONE_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_SYNOLOGY_DOMAIN: ${{ secrets.TF_VAR_SYNOLOGY_DOMAIN }}
          TF_VAR_ACCESS_ALLOWED_EMAILS: ${{ secrets.TF_VAR_ACCESS_ALLOWED_EMAILS }}
          TF_VAR_GITHUB_TOKEN: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          TF_VAR_VAULT_TOKEN: ${{ secrets.TF_VAR_VAULT_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          missing=0
          total=0

          check_secret() {
            local name="$1"
            local priority="$2"
            total=$((total + 1))
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing secret: ${name} (${priority})"
              missing=$((missing + 1))
            else
              echo "OK: ${name} (${priority})"
            fi
          }

          echo "=== P0: Blocks all Terraform workflows ==="
          check_secret AWS_ACCESS_KEY_ID P0
          check_secret AWS_SECRET_ACCESS_KEY P0
          check_secret TF_API_TOKEN P0
          check_secret TF_VAR_PROXMOX_ENDPOINT P0
          check_secret TF_VAR_PROXMOX_API_TOKEN P0
          check_secret TF_VAR_PROXMOX_INSECURE P0

          echo ""
          echo "=== P1: Individual workspace secrets ==="
          check_secret TF_VAR_GRAFANA_AUTH P1
          check_secret TF_VAR_N8N_WEBHOOK_URL P1
          check_secret TF_VAR_SUPABASE_URL P1
          check_secret TF_VAR_CLOUDFLARE_ACCOUNT_ID P1
          check_secret TF_VAR_CLOUDFLARE_ZONE_ID P1
          check_secret TF_VAR_SYNOLOGY_DOMAIN P1
          check_secret TF_VAR_ACCESS_ALLOWED_EMAILS P1
          check_secret TF_VAR_GITHUB_TOKEN P1
          check_secret TF_VAR_VAULT_TOKEN P1

          echo ""
          echo "=== P2: Non-Terraform workflows ==="
          check_secret CLOUDFLARE_API_TOKEN P2
          check_secret CLOUDFLARE_ACCOUNT_ID P2
          check_secret GH_PAT P2
          check_secret CF_ACCESS_CLIENT_ID P2
          check_secret CF_ACCESS_CLIENT_SECRET P2

          echo ""
          echo "Result: ${total} checked, $((total - missing)) configured, ${missing} missing"

          if [ "$missing" -gt 0 ]; then
            echo "::warning::${missing} secrets are not configured. Run: scripts/setup-github-secrets.sh"
            exit 1
          fi
