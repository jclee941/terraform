name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows:
      - "Terraform Plan"
      - "Terraform Test"
      - "PR Review & Validation"
      - "Security Scan"
      - "ELK Health Check"
      - "Internal Service Access Test"
      - "Archon Plan"
      - "Cloudflare Plan"
      - "ELK Plan"
      - "GitHub Plan"
      - "Grafana Plan"
      - "Ollama Plan"
      - "Slack Plan"
      - "Traefik Plan"
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write

jobs:
  auto-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      !startsWith(github.event.workflow_run.head_branch, 'opencode/auto-fix-')
    uses: qws941/.github/.github/workflows/_auto-fix-ci.yml@master
    with:
      run-id: ${{ github.event.workflow_run.id }}
      head-branch: ${{ github.event.workflow_run.head_branch }}
      head-sha: ${{ github.event.workflow_run.head_sha }}
      pr-number: ${{ github.event.workflow_run.pull_requests[0].number || 0 }}
      workflow-name: ${{ github.event.workflow_run.name }}
    secrets: inherit  # pragma: allowlist secret
