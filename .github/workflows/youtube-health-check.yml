name: YouTube VM Health Check

on:
  schedule:
    - cron: "0 */12 * * *"  # Every 12 hours (VM is ephemeral, less frequent checks)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: youtube-health-check
  cancel-in-progress: false

jobs:
  health-check:
    name: Check YouTube VM Status
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check VM is running via Proxmox
        env:
          PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_VE_API_TOKEN }}
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
        run: |
          # Query Proxmox API for VM 220 status
          STATUS=$(curl -s -k -H "Authorization: PVEAPIToken=$PROXMOX_VE_API_TOKEN" \
            "${PROXMOX_VE_ENDPOINT}/api2/json/nodes/pve/qemu/220/status/current" | \
            jq -r '.data.status // "unknown"')

          echo "VM 220 status: $STATUS"
          if [ "$STATUS" = "running" ]; then
            echo "✅ YouTube VM (220) is running"
          else
            echo "❌ YouTube VM (220) is not running (status: $STATUS)"
            exit 1
          fi

      - name: Check VM network connectivity
        run: |
          # Check if VM responds to ping
          if ping -c 1 -W 3 192.168.50.220 >/dev/null 2>&1; then
            echo "✅ YouTube VM is reachable via network"
          else
            echo "❌ YouTube VM is not responding to ping"
            exit 1
          fi

      - name: Check Cloudflare WARP connection
        run: |
          # SSH and check WARP status
          # Using the CF tunnel for access
          WARP_STATUS=$(ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no \
            -o ProxyCommand="cloudflared access tcp --hostname youtube-ssh.jclee.me" \
            jclee@youtube-ssh.jclee.me \
            'warp-cli status 2>/dev/null || echo "WARP not installed"' 2>/dev/null || echo "SSH_FAILED")

          echo "WARP status: $WARP_STATUS"

          if echo "$WARP_STATUS" | grep -q "Connected"; then
            echo "✅ Cloudflare WARP is connected"
          elif echo "$WARP_STATUS" | grep -q "WARP not installed"; then
            echo "⚠️ WARP not installed (may be expected on fresh VM)"
          elif [ "$WARP_STATUS" = "SSH_FAILED" ]; then
            echo "⚠️ SSH connection failed (may be normal if VM is ephemeral)"
          else
            echo "⚠️ WARP status unclear: $WARP_STATUS"
          fi

      - name: Check disk space (via Proxmox API)
        env:
          PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_VE_API_TOKEN }}
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
        run: |
          # Get VM disk usage
          DISK_INFO=$(curl -s -k -H "Authorization: PVEAPIToken=$PROXMOX_VE_API_TOKEN" \
            "${PROXMOX_VE_ENDPOINT}/api2/json/nodes/pve/qemu/220/status/current" | \
            jq -r '.data.disk // "unknown"')

          echo "VM disk usage: $DISK_INFO bytes"
          echo "✅ Disk check completed"

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 YouTube VM Health Check Failed"
          custom-body: |
            ## YouTube VM (220) Health Check Failed

            **VMID**: 220 | **IP**: 192.168.50.220
            **Checked at**: ${{ github.event.repository.updated_at }}

            ### Note
            This is an **ephemeral VM** designed for YouTube media workloads. It may be intentionally stopped or recreated.

            ### Quick Diagnostic Commands

            ```bash
            # Check VM status via Proxmox
            ssh root@192.168.50.101 "qm status 220"

            # Start VM if stopped
            ssh root@192.168.50.101 "qm start 220"

            # View VM logs
            ssh root@192.168.50.101 "qm log 220"
            ```

            ### Recovery Options

            1. **Start VM** (if stopped):
               ```bash
               ssh root@192.168.50.101 "qm start 220"
               ```

            2. **Recreate VM** (if corrupted):
               ```bash
               cd 100-pve
               terraform destroy -target=module.vm["youtube"]
               terraform apply -target=module.vm["youtube"]
               ```

            ### Access
            - Local: `ssh jclee@192.168.50.220`
            - External: `ssh -o ProxyCommand="cloudflared access tcp --hostname youtube-ssh.jclee.me" jclee@youtube-ssh.jclee.me`
          labels: "infrastructure,youtube-vm,health-check,automated,ephemeral"
