---
name: 1Password Integration Test

on:
  pull_request:
    paths:
      - "modules/shared/onepassword-secrets/**"
      - ".github/workflows/onepassword-test.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["MCP Health Check"]
    types: [completed]

permissions:
  contents: read
  issues: write

concurrency:
  group: onepassword-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_onepassword-test.yml
    secrets: inherit
