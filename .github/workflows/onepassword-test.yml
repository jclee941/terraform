name: 1Password Connectivity Test

on:
  pull_request:
    paths:
      - "modules/shared/onepassword-secrets/**"
      - ".github/workflows/onepassword-test.yml"

permissions:
  contents: read

jobs:
  test-onepassword:
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install 1Password CLI
        run: |
          if command -v op &>/dev/null; then
            echo "1Password CLI already installed: $(op --version)"
          else
            echo "Installing 1Password CLI..."
            curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
              sudo gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" | \
              sudo tee /etc/apt/sources.list.d/1password.list
            sudo apt-get update -qq && sudo apt-get install -y -qq 1password-cli
            echo "Installed: $(op --version)"
          fi

      - name: Authenticate and verify connectivity
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "::error::OP_SERVICE_ACCOUNT_TOKEN secret is not configured"
            exit 1
          fi

          echo "=== 1Password Service Account Identity ==="
          if ! op whoami 2>&1; then
            echo "::error::Failed to authenticate with 1Password service account"
            exit 1
          fi

          echo ""
          echo "=== Vault Access Test ==="
          if ! op vault get Homelab --format=json 2>&1 | jq -r '{id, name}'; then
            echo "::error::Cannot access 'Homelab' vault"
            exit 1
          fi

          echo ""
          echo "=== Item Count ==="
          item_count=$(op item list --vault Homelab --format=json 2>/dev/null | jq length)
          echo "Items in Homelab vault: ${item_count}"

          if [ "$item_count" -eq 0 ]; then
            echo "::warning::Homelab vault has 0 items — expected 12+"
          else
            echo "Vault access verified (${item_count} items)"
          fi

      - name: Verify Terraform-consumed items exist
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          echo "=== Checking required 1Password items ==="
          missing=0
          expected_items=(
            grafana glitchtip proxmox github exa
            splunk supabase archon cloudflare n8n
            mcphub elk
          )

          for item in "${expected_items[@]}"; do
            if op item get "$item" --vault Homelab --format=json &>/dev/null; then
              echo "OK: $item"
            else
              echo "::warning::Missing item: $item"
              missing=$((missing + 1))
            fi
          done

          echo ""
          echo "Result: ${#expected_items[@]} checked, $((${#expected_items[@]} - missing)) found, ${missing} missing"

          if [ "$missing" -gt 0 ]; then
            echo "::warning::${missing} expected 1Password items are missing from the Homelab vault"
          else
            echo "All expected items present"
          fi

      - name: Detect placeholder secret values
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          echo "=== Scanning for placeholder values in secrets section ==="
          placeholders=0
          checked=0
          expected_items=(
            grafana glitchtip proxmox github exa
            splunk supabase archon cloudflare n8n
            mcphub elk
          )

          for item in "${expected_items[@]}"; do
            fields=$(op item get "$item" --vault Homelab --format=json 2>/dev/null \
              | jq -r '.fields[]? | select(.section_id != null) | select(.value != null) | "\(.label)=\(.value)"' 2>/dev/null) || continue

            while IFS='=' read -r label value; do
              [ -z "$label" ] && continue
              (( ++checked ))
              if echo "$value" | grep -qiE '^placeholder|^PLACEHOLDER_NEEDS_REAL'; then
                echo "::warning::${item}/${label} contains placeholder value"
                (( ++placeholders ))
              fi
            done <<< "$fields"
          done

          echo ""
          echo "Fields checked: ${checked}, Placeholders found: ${placeholders}"
          if [ "$placeholders" -gt 0 ]; then
            echo "::warning::${placeholders} fields still contain placeholder values that must be replaced"
          else
            echo "No placeholder values detected"
          fi
