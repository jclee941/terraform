name: Archon Plan

on:
  pull_request:
    paths:
      - "108-archon/**"

concurrency:
  group: archon-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      service-name: Archon
      working-directory: 108-archon/terraform
      needs-infra-state: true
      migrate-state: lxc_and_lxc_config
    secrets: inherit # pragma: allowlist secret
