name: Archon Plan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '108-archon/**'

concurrency:
  group: archon-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: 108-archon/terraform

jobs:
  plan:
    name: Archon Plan
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-input=false'

      - name: Migrate State (one-time)
        run: |
          # Remove orphaned resources from previous config deployment era.
          terraform state rm module.lxc 2>/dev/null || true
          terraform state rm module.lxc_config 2>/dev/null || true

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          PLAN=$(cat plan_output.txt)
          if [ ${#PLAN} -gt 65000 ]; then
            PLAN="${PLAN:0:65000}

            ... (truncated, see workflow run for full output)"
          fi
          echo "plan<<EOFPLAN" >> "$GITHUB_OUTPUT"
          echo "$PLAN" >> "$GITHUB_OUTPUT"
          echo "EOFPLAN" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE

      - name: Comment Plan on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.plan }}
          PLAN_RESULT: ${{ steps.plan.outputs.result }}
        with:
          script: |
            const result = process.env.PLAN_RESULT || 'failure';
            const plan = process.env.PLAN_OUTPUT || 'No plan output captured';
            const icon = result === 'success' ? '✅' : '❌';
            const status = result === 'success' ? 'Success' : 'Failed';

            const body = [
              `## ${icon} Archon Plan ${status}`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```',
              plan,
              '```',
              '',
              '</details>',
              '',
              `*Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`,
              `*Working Directory: \`${{ env.TF_WORKING_DIR }}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Archon Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
