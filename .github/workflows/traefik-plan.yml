name: Traefik Plan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '102-traefik/terraform/**'

concurrency:
  group: traefik-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      service-name: Traefik
      working-directory: 102-traefik/terraform
      needs-infra-state: true
      migrate-state: lxc_config
    secrets: inherit  # pragma: allowlist secret
