name: Secret Sync (1Password → GitHub)

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    uses: ./.github/workflows/_secret-sync.yml
    secrets: inherit  # pragma: allowlist secret
