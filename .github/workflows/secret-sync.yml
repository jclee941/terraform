name: Secret Sync (1Password → GitHub)

on:
  schedule:
    - cron: "0 2 * * 1" # Weekly Mon 02:00 UTC (11:00 KST)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync 1Password → GitHub Secrets
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
      OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - name: Install 1Password CLI
        run: |
          if command -v op &>/dev/null; then
            echo "op CLI found: $(op --version)"
          else
            OP_VERSION="2.32.1"
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
            echo "Installed op CLI: $(op --version)"
          fi

      - name: Install GitHub CLI
        run: |
          if command -v gh &>/dev/null; then
            echo "gh CLI found: $(gh --version | head -1)"
          else
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq && sudo apt-get install -y -qq gh
            echo "Installed gh CLI: $(gh --version | head -1)"
          fi

      - name: Verify 1Password connectivity
        run: |
          VAULTS=$(op vault list --format json 2>&1) || { echo "::error::Cannot connect to 1Password"; exit 1; }
          echo "$VAULTS" | jq -r '.[] | "  vault: \(.name) (\(.id))"'

      - name: Verify GitHub PAT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_PAT secret is not set"
            exit 1
          fi
          gh auth status 2>&1 || { echo "::error::GH_PAT authentication failed"; exit 1; }
          echo "GitHub PAT verified"

      - name: Sync secrets
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          REPO="${{ github.repository }}"
          SYNCED=0
          FAILED=0
          SKIPPED=0
          RESULTS=""

          sync_secret() {
            local gh_name="$1"
            local op_ref="$2"
            local value

            if ! value=$(op read "$op_ref" 2>&1); then
              echo "::warning::Cannot read $op_ref — $value"
              FAILED=$((FAILED+1))
              RESULTS="${RESULTS}| \`${gh_name}\` | ❌ read failed | \`${op_ref}\` |\n"
              return 1
            fi

            if [ -z "$value" ] || [ "$value" = "placeholder" ] || [ "$value" = "PLACEHOLDER" ]; then
              echo "  ⊘ $gh_name (placeholder/empty, skipped)"
              SKIPPED=$((SKIPPED+1))
              RESULTS="${RESULTS}| \`${gh_name}\` | ⊘ skipped | placeholder value |\n"
              return 0
            fi

            if printf '%s' "$value" | gh secret set "$gh_name" --repo "$REPO"; then
              echo "  ✓ $gh_name"
              SYNCED=$((SYNCED+1))
              RESULTS="${RESULTS}| \`${gh_name}\` | ✅ synced | \`${op_ref}\` |\n"
            else
              echo "::warning::Failed to set $gh_name"
              FAILED=$((FAILED+1))
              RESULTS="${RESULTS}| \`${gh_name}\` | ❌ set failed | \`${op_ref}\` |\n"
              return 1
            fi
          }

          echo "## Syncing secrets from 1Password → GitHub"
          echo ""

          # --- Proxmox (P0: critical) ---
          sync_secret "TF_VAR_PROXMOX_API_TOKEN"      "op://homelab/proxmox/secrets/api_token_value"

          # --- Cloudflare ---
          sync_secret "CLOUDFLARE_API_TOKEN"           "op://homelab/cloudflare/secrets/api_key"
          sync_secret "CLOUDFLARE_ACCOUNT_ID"          "op://homelab/cloudflare/secrets/account_id"
          sync_secret "TF_VAR_CLOUDFLARE_ACCOUNT_ID"   "op://homelab/cloudflare/secrets/account_id"
          sync_secret "TF_VAR_CLOUDFLARE_ZONE_ID"      "op://homelab/cloudflare/secrets/zone_id"

          # --- GitHub ---
          sync_secret "TF_VAR_GITHUB_TOKEN"            "op://homelab/github/secrets/personal_access_token"
          sync_secret "GH_PAT"                         "op://homelab/github/secrets/personal_access_token"

          # --- Grafana ---
          sync_secret "TF_VAR_GRAFANA_AUTH"            "op://homelab/grafana/secrets/service_account_token"

          # --- Supabase ---
          sync_secret "TF_VAR_SUPABASE_URL"            "op://homelab/supabase/secrets/url"

          # --- Slack / MCPHub ---
          sync_secret "SLACK_MCP_XOXB_TOKEN"           "op://homelab/mcphub/secrets/slack_mcp_xoxb_token"
          sync_secret "SLACK_MCP_XOXP_TOKEN"           "op://homelab/mcphub/secrets/slack_mcp_xoxp_token"

          echo ""
          echo "---"
          echo "Results: $SYNCED synced, $SKIPPED skipped, $FAILED failed"

          {
            echo "synced=$SYNCED"
            echo "skipped=$SKIPPED"
            echo "failed=$FAILED"
            echo "results<<RESULTS_EOF"
            echo -e "$RESULTS"
            echo "RESULTS_EOF"
          } >> "$GITHUB_OUTPUT"

          [ "$FAILED" -gt 0 ] && exit 1
          exit 0

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const title = '[Secret Sync] 1Password → GitHub sync failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,secrets',
              per_page: 10,
            });
            const existing = issues.find(i => i.title === title);
            const body = [
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              '| Secret | Status | Source |',
              '|--------|--------|--------|',
              `${{ steps.sync.outputs.results }}`,
              '',
              `**Summary:** ${{ steps.sync.outputs.synced }} synced, ${{ steps.sync.outputs.skipped }} skipped, ${{ steps.sync.outputs.failed }} failed`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'secrets'],
              });
            }
