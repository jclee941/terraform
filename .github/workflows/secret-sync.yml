name: Secret Sync (1Password → GitHub)

on:
  workflow_run:
    workflows:
      - "Terraform Apply"
      - "Archon Apply"
      - "Traefik Apply"
      - "ELK Apply"
      - "Grafana Apply"
      - "Cloudflare Apply"
      - "Slack Apply"
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    uses: ./.github/workflows/_secret-sync.yml
    secrets: inherit  # pragma: allowlist secret
