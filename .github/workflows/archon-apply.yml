name: Archon Apply

on:
  push:
    branches:
      - master
    paths:
      - '108-archon/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: archon-apply
  cancel-in-progress: false

env:
  TF_WORKING_DIR: 108-archon/terraform
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  apply:
    name: Archon Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-backend-config=../../backend.hcl -input=false'

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color
        env:
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_supabase_url: ${{ secrets.TF_VAR_SUPABASE_URL }}

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: '[Archon] Apply failed on master'
          extra-body: |
            **Workspace:** `108-archon/terraform`

            ### Checklist
            - [ ] Verify Proxmox API connectivity and credentials
            - [ ] Verify Supabase URL is accessible
            - [ ] Run `terraform plan` locally to diagnose
            - [ ] Fix and re-apply, or revert the commit
          labels: 'terraform-drift,automated,infrastructure'
