name: Archon Apply

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "108-archon/**"
permissions:
  contents: read
  issues: write

concurrency:
  group: archon-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Archon
      working-directory: 108-archon/terraform
      needs-infra-state: true
      migrate-state: lxc_and_lxc_config
      failure-title-prefix: "[Archon] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `108-archon/terraform`

        ### Checklist
        - [ ] Verify Archon container is accessible
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
