name: Deploy Synology Proxy Worker

on:
  push:
    branches:
      - master
    paths:
      - '300-cloudflare/workers/synology-proxy/**'

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: 300-cloudflare/workers/synology-proxy
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: '300-cloudflare/workers/synology-proxy'

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: '[Worker] Deploy failed'
          extra-body: |
            **Worker:** `synology-proxy`

            Please investigate the deployment logs.
          labels: 'bug,ci'
