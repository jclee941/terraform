name: Deploy Synology Proxy Worker

on:
  push:
    branches:
      - master
    paths:
      - '300-cloudflare/workers/synology-proxy/**'

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    defaults:
      run:
        working-directory: 300-cloudflare/workers/synology-proxy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: '300-cloudflare/workers/synology-proxy'
