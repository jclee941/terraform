name: Deploy Synology Proxy Worker

on:
  push:
    branches:
      - master
    paths:
      - '300-cloudflare/workers/synology-proxy/**'

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: 300-cloudflare/workers/synology-proxy
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: '300-cloudflare/workers/synology-proxy'

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Worker deploy failed: ${context.sha.substring(0, 7)}`;
            const body = [
              `## Worker Deployment Failure`,
              ``,
              `**Workflow:** ${context.workflow}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** ${context.sha}`,
              `**Triggered by:** ${context.actor}`,
              ``,
              `Please investigate the deployment logs.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci']
            });
