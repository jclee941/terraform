name: ELK Plan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '105-elk/**'

concurrency:
  group: elk-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      service-name: ELK
      working-directory: 105-elk/terraform
      needs-infra-state: true
    secrets: inherit  # pragma: allowlist secret
