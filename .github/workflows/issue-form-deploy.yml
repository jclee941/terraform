name: Deploy Issue Form Worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "300-cloudflare/workers/issue-form/**"

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-form-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_worker-deploy.yml
    with:
      working-directory: 300-cloudflare/workers/issue-form
      worker-name: issue-form
    secrets: inherit # pragma: allowlist secret
