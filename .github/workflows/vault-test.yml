name: Vault OIDC Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC (15:00 KST)

env:
  VAULT_ADDR: ${{ secrets.VAULT_ADDR || 'http://192.168.50.112:8200' }}

jobs:
  test-vault-oidc:
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Vault Connectivity
        id: vault_check
        run: |
          VAULT_URL="${VAULT_ADDR:-http://192.168.50.112:8200}"
          echo "Checking Vault at: $VAULT_URL"
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$VAULT_URL/v1/sys/health" 2>/dev/null || echo "000")
          echo "vault_status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "000" ]; then
            echo "::warning::Vault unreachable at $VAULT_URL. Skipping OIDC test."
          elif [ "$status" = "200" ] || [ "$status" = "429" ] || [ "$status" = "472" ] || [ "$status" = "473" ]; then
            echo "Vault reachable (HTTP $status)"
          else
            echo "::warning::Vault returned unexpected status $status"
          fi

      - name: Fetch Secrets from Vault
        if: steps.vault_check.outputs.vault_status != '000'
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          jwtGithubAudience: "https://github.com/qws941"
          secrets: |
            secret/data/mcp/test api_key | MCP_API_KEY ;
            secret/data/mcp/test service_name | MCP_SERVICE ;
            secret/data/infra/test db_password | INFRA_PASSWORD ;
            secret/data/infra/test environment | INFRA_ENV

      - name: Verify Secrets
        if: steps.vault_check.outputs.vault_status != '000'
        run: |
          echo "=== Vault OIDC Test Results ==="
          echo "MCP_API_KEY is set: ${MCP_API_KEY:+YES}"
          echo "MCP_SERVICE: $MCP_SERVICE"
          echo "INFRA_PASSWORD is set: ${INFRA_PASSWORD:+YES}"
          echo "INFRA_ENV: $INFRA_ENV"

          if [ -n "$MCP_API_KEY" ] && [ -n "$INFRA_PASSWORD" ]; then
            echo "All secrets fetched successfully!"
            exit 0
          else
            echo "Some secrets are missing"
            exit 1
          fi

      - name: Skip Notice
        if: steps.vault_check.outputs.vault_status == '000'
        run: |
          echo "::warning::Vault OIDC test skipped — Vault is unreachable from this runner."
          echo "Ensure Vault is running on 192.168.50.112:8200 and accessible from the self-hosted runner."
