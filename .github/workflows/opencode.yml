name: OpenCode AI

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Only trigger when /oc or /opencode is mentioned by repo members.
# Prevents external contributors from running AI on infrastructure code.
jobs:
  opencode:
    name: OpenCode AI Assistant
    if: |
      (
        startsWith(github.event.comment.body, '/opencode') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        contains(github.event.comment.body, ' /oc')
      ) &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Antigravity credentials
        # Decodes the base64-encoded antigravity-accounts.json stored as a GitHub secret.
        # To regenerate the secret value locally:
        #   base64 -w 0 ~/.config/opencode/antigravity-accounts.json
        # Google OAuth refresh tokens do not expire unless revoked or unused for 6+ months.
        run: |
          mkdir -p "$HOME/.config/opencode"
          echo "${{ secrets.ANTIGRAVITY_ACCOUNTS_JSON }}" | base64 -d > "$HOME/.config/opencode/antigravity-accounts.json"
          chmod 600 "$HOME/.config/opencode/antigravity-accounts.json"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@444178e079fb41ba2149a1cdfdd3040593715d70 # v1.2.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth is via opencode-antigravity-auth plugin (no ANTHROPIC_API_KEY needed).
          # The plugin reads ~/.config/opencode/antigravity-accounts.json (written above)
          # and exchanges the stored Google OAuth refresh token for API access.
        with:
          model: anthropic/claude-sonnet-4-5
          use_github_token: "true"
          share: "false"
          prompt: |
            You are an AI assistant for a Terraform infrastructure monorepo managing a Proxmox homelab
            (jclee.me). The repo uses Google3/Bazel conventions, bpg/proxmox provider (~>0.94), and
            1Password for secret management via 1Password Connect Server on LXC 112. # pragma: allowlist secret

            ARCHITECTURE:
            - 100-pve/main.tf: Central orchestration (~810 lines). NO hardcoded IPs — use module.hosts.
            - 100-pve/envs/prod/hosts.tf: SSoT for ALL IPs/ports (192.168.50.0/24, GW .1).
            - modules/proxmox/{lxc,vm,lxc-config,vm-config,config-renderer}: Reusable TF modules.
            - modules/shared/onepassword-secrets/: Cross-stack 1Password secret retrieval.
            - 300-cloudflare/: DNS, tunnels, access, R2, Workers (cloudflare/cloudflare ~>5.0).
            - 301-github/: GitHub org/repos/teams (integrations/github ~>6.6).
            - Per-service dirs: {NNN}-{svc}/ (101-runner through 220-youtube).

            CONVENTIONS TO ENFORCE:
            - Every directory with code MUST have BUILD.bazel and OWNERS files.
            - Use relative module paths: ../modules/{provider}/{module}.
            - No hardcoded IPs in main.tf — reference module.hosts outputs.
            - State backend is local (no -backend-config needed for terraform init).
            - Terraform format: run terraform fmt -recursive before pushing.
            - Pin all GitHub Actions to full commit SHA (not version tags).
            - Secrets: never commit .env files; use 1Password service account pattern.

            SECURITY FOCUS:
            - Flag exposed ports, overly permissive firewall rules in Proxmox LXC/VM configs.
            - Flag any hardcoded credentials or tokens in .tf, .tfvars, or template files.
            - Highlight any changes to 100-pve/, modules/, 300-cloudflare/, or 102-traefik/ as CRITICAL.
            - Identify missing persist-credentials: false in workflow checkouts.

            INFRASTRUCTURE (VMIDs to IPs):
            101=runner(.101), 102=traefik(.102), 104=grafana(.104), 105=elk(.105),
            106=glitchtip(.106), 107=supabase(.107), 108=archon(.108), 112=mcphub(.112),
            220=youtube(.220).

            DEFAULT BEHAVIOR: Prefer reviewing and commenting over pushing changes.
            Only modify files if the user explicitly requests it (e.g., /oc fix this).
            When creating PRs for issues, follow existing naming: branch opencode/issueNNN-TIMESTAMP.
