name: Security Scan (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    name: TFLint + Checkov + Trivy
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install TFLint
        run: |
          if ! command -v tflint &>/dev/null; then
            mkdir -p "${HOME}/.local/bin"
            curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | TFLINT_INSTALL_PATH="${HOME}/.local/bin" bash
            echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          fi
          tflint --version

      - name: TFLint Init
        run: tflint --init

      - name: TFLint Scan
        id: tflint
        run: |
          set +e

          # Workspace directories (standalone TF roots)
          WORKSPACES=(
            100-pve
            102-traefik/terraform
            104-grafana/terraform
            105-elk/terraform
            108-archon/terraform
            300-cloudflare
            320-slack/terraform
          )

          # Module directories
          MODULES=(
            modules/proxmox/lxc
            modules/proxmox/vm
            modules/proxmox/lxc-config
            modules/proxmox/vm-config
            modules/proxmox/config-renderer
            modules/shared/onepassword-secrets
          )

          overall_exit=0
          output=""

          for dir in "${WORKSPACES[@]}" "${MODULES[@]}"; do
            if [ ! -d "$dir" ]; then
              continue
            fi

            result=$(tflint --chdir="$dir" --format compact 2>&1)
            exit_code=$?

            if [ $exit_code -ne 0 ]; then
              overall_exit=1
              output+="### ❌ ${dir}
          ${result}

          "
            elif [ -n "$result" ]; then
              output+="### ⚠️ ${dir}
          ${result}

          "
            else
              output+="### ✅ ${dir} — no issues
          "
            fi
          done

          # Truncate if too large for PR comment
          if [ ${#output} -gt 60000 ]; then
            output="${output:0:60000}

          ... (truncated)"
          fi

          {
            echo "output<<EOFTFLINT"
            echo "$output"
            echo "EOFTFLINT"
            echo "exit_code=$overall_exit"
          } >> "$GITHUB_OUTPUT"

          # Don't fail the step — report in PR comment
          exit 0

      - name: Setup Checkov
        run: |
          CHECKOV_VENV="${HOME}/.checkov-venv"
          if [ ! -f "${CHECKOV_VENV}/bin/checkov" ]; then
            python3 -m venv "${CHECKOV_VENV}"
            "${CHECKOV_VENV}/bin/pip" install --quiet 'checkov>=3.2,<4'
          fi
          "${CHECKOV_VENV}/bin/checkov" --version
          echo "${CHECKOV_VENV}/bin" >> "$GITHUB_PATH"

      - name: Checkov Scan
        id: checkov
        run: |
          set +e

          CHECKOV_BIN=$(command -v checkov || echo "${HOME}/.local/bin/checkov")
          result=$("$CHECKOV_BIN" \
            --directory . \
            --framework terraform \
            --quiet \
            --compact \
            --skip-path .archive \
            --skip-path data \
            --skip-path tests \
            --skip-path 100-pve/configs \
            --skip-check CKV_TF_1 \
            --output cli 2>&1)
          exit_code=$?

          # Extract summary line
          summary=$(echo "$result" | grep -E "^Passed|^Failed|passed.*failed" | tail -1)
          if [ -z "$summary" ]; then
            summary=$(echo "$result" | tail -5)
          fi

          # Truncate full output for PR comment
          if [ ${#result} -gt 60000 ]; then
            result="${result:0:60000}

          ... (truncated)"
          fi

          {
            echo "output<<EOFCHECKOV"
            echo "$result"
            echo "EOFCHECKOV"
            echo "summary<<EOFSUMMARY"
            echo "$summary"
            echo "EOFSUMMARY"
          } >> "$GITHUB_OUTPUT"

          if [ $exit_code -eq 0 ]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          fi

          # Soft-fail: don't block PRs, report findings
          exit 0

      - name: Cleanup Checkov cache
        if: always()
        run: rm -rf /tmp/checkov-* 2>/dev/null || true


      - name: Install Trivy
        run: |
          if ! command -v trivy &>/dev/null; then
            mkdir -p "${HOME}/.local/bin"
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sh -s -- -b "${HOME}/.local/bin"
            echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          fi
          trivy --version

      - name: Trivy Config Scan
        id: trivy
        run: |
          set +e

          result=$(trivy config . \
            --severity HIGH,CRITICAL \
            --skip-dirs .archive \
            --skip-dirs data \
            --skip-dirs tests \
            --skip-dirs 100-pve/configs \
            --exit-code 0 2>&1)
          exit_code=$?

          if [ ${#result} -gt 60000 ]; then
            result="${result:0:60000}

          ... (truncated)"
          fi

          {
            echo "output<<EOFTRIVY"
            echo "$result"
            echo "EOFTRIVY"
          } >> "$GITHUB_OUTPUT"

          if [ $exit_code -eq 0 ]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Comment Results on PR
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TFLINT_OUTPUT: ${{ steps.tflint.outputs.output }}
          TFLINT_EXIT: ${{ steps.tflint.outputs.exit_code }}
          CHECKOV_OUTPUT: ${{ steps.checkov.outputs.output }}
          CHECKOV_EXIT: ${{ steps.checkov.outputs.exit_code }}
          CHECKOV_SUMMARY: ${{ steps.checkov.outputs.summary }}
          TRIVY_OUTPUT: ${{ steps.trivy.outputs.output }}
          TRIVY_EXIT: ${{ steps.trivy.outputs.exit_code }}
        with:
          script: |
            const tflintExit = process.env.TFLINT_EXIT || '1';
            const checkovExit = process.env.CHECKOV_EXIT || '1';
            const trivyExit = process.env.TRIVY_EXIT || '1';
            const tflintOutput = process.env.TFLINT_OUTPUT || 'No output';
            const checkovOutput = process.env.CHECKOV_OUTPUT || 'No output';
            const checkovSummary = process.env.CHECKOV_SUMMARY || '';
            const trivyOutput = process.env.TRIVY_OUTPUT || 'No output';

            const tflintIcon = tflintExit === '0' ? '✅' : '⚠️';
            const checkovIcon = checkovExit === '0' ? '✅' : '⚠️';
            const trivyIcon = trivyExit === '0' ? '✅' : '⚠️';

            const body = [
              '## 🔒 Security Scan Results',
              '',
              `| Tool | Status |`,
              `|------|--------|`,
              `| TFLint | ${tflintIcon} ${tflintExit === '0' ? 'Passed' : 'Findings detected'} |`,
              `| Checkov | ${checkovIcon} ${checkovExit === '0' ? 'Passed' : 'Findings detected'} |`,
              `| Trivy | ${trivyIcon} ${trivyExit === '0' ? 'Passed' : 'Findings detected'} |`,
              '',
              '<details><summary>TFLint Output</summary>',
              '',
              tflintOutput,
              '',
              '</details>',
              '',
              '<details><summary>Checkov Output</summary>',
              '',
              '```',
              checkovOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Trivy Output</summary>',
              '',
              '```',
              trivyOutput,
              '```',
              '',
              '</details>',
              '',
              `*Pusher: @${{ github.actor }}, Workflow: \`security-scan\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "Security Scan"
