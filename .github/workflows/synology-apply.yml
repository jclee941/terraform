name: Synology Apply

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "215-synology/**"

permissions:
  contents: read
  issues: write

concurrency:
  group: synology-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Synology
      working-directory: 215-synology
      needs-infra-state: true
      failure-title-prefix: "[Synology] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `215-synology`

        ### Checklist
        - [ ] Verify Synology NAS is reachable at 192.168.50.215:5001
        - [ ] Verify DSM admin credentials are valid in 1Password
        - [ ] Run `make plan SVC=synology` locally to diagnose
        - [ ] Check ContainerManager package status in DSM
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
