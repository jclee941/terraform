name: Terraform State Backup

on:
  schedule:
    - cron: "0 18 * * 0" # Weekly Sunday 03:00 KST (18:00 UTC Saturday)
  workflow_dispatch:

concurrency:
  group: tfstate-backup
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  backup:
    uses: ./.github/workflows/_tfstate-backup.yml
    secrets: inherit  # pragma: allowlist secret
