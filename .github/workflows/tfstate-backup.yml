name: Terraform State Backup

on:
  workflow_run:
    workflows:
      - "Terraform Apply"
      - "Archon Apply"
      - "Traefik Apply"
      - "ELK Apply"
      - "Grafana Apply"
      - "Cloudflare Apply"
      - "Slack Apply"
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tfstate-backup
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  backup:
    uses: ./.github/workflows/_tfstate-backup.yml
    secrets: inherit  # pragma: allowlist secret
