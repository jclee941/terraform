name: Stale Issue/PR Cleanup (Reusable)

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: "Days before marking as stale"
        type: number
        default: 14
      days-before-close:
        description: "Days after stale before closing"
        type: number
        default: 5
      exempt-labels:
        description: "Comma-separated list of exempt labels"
        type: string
        default: "keep-open,pinned,security"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because
            it has had no activity for ${{ inputs.days-before-stale }} days.

            It will be closed in ${{ inputs.days-before-close }} days if no further activity occurs.
            Remove the `stale` label or comment to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because
            it has had no activity for ${{ inputs.days-before-stale }} days.

            It will be closed in ${{ inputs.days-before-close }} days if no further activity occurs.
            Remove the `stale` label, comment, or merge to keep it open.
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          exempt-issue-labels: ${{ inputs.exempt-labels }}
          exempt-pr-labels: ${{ inputs.exempt-labels }}
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          remove-stale-when-updated: true
