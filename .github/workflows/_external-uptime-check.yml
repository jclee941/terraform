name: External Uptime Check (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  uptime-check:
    name: External Endpoint Health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Public Endpoints
        run: |
          ENDPOINTS=(
            "https://grafana.jclee.me"
            "https://archon.jclee.me"
            "https://supabase.jclee.me"
            "https://nas.jclee.me"
            "https://mcphub.jclee.me"
            "https://n8n.jclee.me"
            "https://opencode.jclee.me"
          )

          FAILED=0
          TOTAL=${#ENDPOINTS[@]}
          RESULTS=""

          for url in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 --connect-timeout 5 "$url" || echo "000")
            # 2xx/3xx = healthy, 4xx = CF Access auth wall (infrastructure alive), 5xx/000 = down
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              RESULTS+="| $url | $STATUS | ✅ |\n"
            else
              RESULTS+="| $url | $STATUS | ❌ |\n"
              FAILED=$((FAILED + 1))
            fi
          done

          {
            echo "## External Uptime Check"
            echo ""
            echo "| Endpoint | Status | Result |"
            echo "|----------|--------|--------|"
            echo -e "$RESULTS"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total endpoints | $TOTAL |"
            echo "| Healthy | $((TOTAL - FAILED)) |"
            echo "| Failed | $FAILED |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED endpoint(s) unreachable"
            exit 1
          fi

          {
            echo ""
            echo "✅ All $TOTAL endpoints responding"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 External Uptime Check"
          labels: "bug,automation,infrastructure"

      - name: Summary
        if: always()
        run: |
          echo "External uptime check completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
