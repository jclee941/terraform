# One-shot workflow to restore lost tfstate to self-hosted runner.
# DELETE THIS FILE after successful restoration.
name: Restore Terraform State

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "Workspace path (e.g. 104-grafana/terraform)"
        required: true
        default: "104-grafana/terraform"
        type: string

jobs:
  restore:
    runs-on: [self-hosted, Linux, X64, homelab]
    timeout-minutes: 5
    steps:
      - name: Restore state file
        env:
          STATE_B64: ${{ secrets.TFSTATE_RESTORE_GRAFANA }}
        run: |
          STATE_DIR="/home/runner/.terraform-state/${{ inputs.workspace }}"
          mkdir -p "${STATE_DIR}"

          if [ -z "${STATE_B64}" ]; then
            echo "::error::TFSTATE_RESTORE_GRAFANA secret is empty"
            exit 1
          fi

          echo "${STATE_B64}" | base64 -d | gunzip > "${STATE_DIR}/terraform.tfstate"

          SIZE=$(stat -c%s "${STATE_DIR}/terraform.tfstate")
          echo "Restored ${SIZE} bytes to ${STATE_DIR}/terraform.tfstate"

          if [ "${SIZE}" -lt 5000 ]; then
            echo "::error::State file too small (${SIZE} bytes), likely corrupt"
            exit 1
          fi

          echo "✅ State file restored successfully"
