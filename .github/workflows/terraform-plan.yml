name: Terraform Plan

on:
  pull_request:
    paths:
      - "100-pve/**"
      - "modules/**"
      # Service template dirs consumed by 100-pve/main.tf _svc_tpl
      - "101-runner/templates/**"
      - "102-traefik/templates/**"
      - "102-traefik/config/**"
      - "103-coredns/templates/**"
      - "104-grafana/templates/**"
      - "105-elk/templates/**"
      - "106-glitchtip/templates/**"
      - "107-supabase/templates/**"
      - "108-archon/templates/**"
      - "112-mcphub/templates/**"
      # Direct file refs from 100-pve/main.tf
      - "112-mcphub/mcp_servers.json"
      - "112-mcphub/Dockerfile.proxmox"
      - "112-mcphub/Dockerfile.playwright"

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: 100-pve

jobs:
  plan:
    name: Terraform Plan
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: "1.10.5"
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: "-input=false"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}


      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Import existing Proxmox resources
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
        run: |
          python3 - <<'PY'
          import subprocess
          import sys

          resources = [
            ('module.lxc["runner"].proxmox_virtual_environment_container.this', 'pve3/101'),
            ('module.lxc["traefik"].proxmox_virtual_environment_container.this', 'pve3/102'),
            ('module.lxc["coredns"].proxmox_virtual_environment_container.this', 'pve3/103'),
            ('module.lxc["grafana"].proxmox_virtual_environment_container.this', 'pve3/104'),
            ('module.lxc["elk"].proxmox_virtual_environment_container.this', 'pve3/105'),
            ('module.lxc["glitchtip"].proxmox_virtual_environment_container.this', 'pve3/106'),
            ('module.lxc["supabase"].proxmox_virtual_environment_container.this', 'pve3/107'),
            ('module.lxc["archon"].proxmox_virtual_environment_container.this', 'pve3/108'),
            ('module.vm["mcphub"].proxmox_virtual_environment_vm.this', 'pve3/112'),
            ('module.vm["youtube"].proxmox_virtual_environment_vm.this', 'pve3/220'),
            ('module.vm["ollama"].proxmox_virtual_environment_vm.this', 'pve3/109'),
            ('proxmox_virtual_environment_firewall_rules.container["runner"]', 'container/pve3/101'),
            ('proxmox_virtual_environment_firewall_rules.container["traefik"]', 'container/pve3/102'),
            ('proxmox_virtual_environment_firewall_rules.container["coredns"]', 'container/pve3/103'),
            ('proxmox_virtual_environment_firewall_rules.container["grafana"]', 'container/pve3/104'),
            ('proxmox_virtual_environment_firewall_rules.container["elk"]', 'container/pve3/105'),
            ('proxmox_virtual_environment_firewall_rules.container["glitchtip"]', 'container/pve3/106'),
            ('proxmox_virtual_environment_firewall_rules.container["supabase"]', 'container/pve3/107'),
            ('proxmox_virtual_environment_firewall_rules.container["archon"]', 'container/pve3/108'),
            ('proxmox_virtual_environment_firewall_rules.vm["mcphub"]', 'vm/pve3/112'),
            ('proxmox_virtual_environment_firewall_rules.vm["jclee_dev"]', 'vm/pve3/200'),
          ]

          def run(cmd):
            return subprocess.run(cmd, text=True, capture_output=True)

          for address, import_id in resources:
            show = run(["terraform", "state", "show", address])
            if show.returncode == 0:
              print(f"already managed: {address}")
              continue

            imp = run(["terraform", "import", "-input=false", address, import_id])
            output = (imp.stdout or "") + (imp.stderr or "")
            if imp.returncode == 0:
              print(f"imported {address} <- {import_id}")
              continue
            if "already managed by Terraform" in output:
              print(f"already managed: {address}")
              continue
            if any(p in output.lower() for p in ["non-existent", "not found", "does not exist", "unable to find", "unable to read", "404"]):
              print(f"not yet provisioned, will be created: {address}")
              continue
            print(output)
            sys.exit(imp.returncode)
          PY

      - name: Terraform Format Check
        run: |
          if ! terraform fmt -check -recursive . > /dev/null 2>&1; then
            echo '::error::Terraform formatting check failed. Run: terraform fmt -recursive'
            terraform fmt -check -recursive .
            exit 1
          fi

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          # Capture plan output for PR comment (truncate if too large)
          PLAN=$(cat plan_output.txt)
          if [ ${#PLAN} -gt 65000 ]; then
            PLAN="${PLAN:0:65000}

            ... (truncated, see workflow run for full output)"
          fi
          {
            echo "plan<<EOFPLAN"
            echo "$PLAN"
            echo "EOFPLAN"
          } >> "$GITHUB_OUTPUT"

          exit "$EXIT_CODE"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfplan-100-pve-${{ github.event.pull_request.number || github.run_id }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment Plan on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.plan }}
          PLAN_RESULT: ${{ steps.plan.outputs.result }}
        with:
          script: |
            const result = process.env.PLAN_RESULT || 'failure';
            const plan = process.env.PLAN_OUTPUT || 'No plan output captured';
            const icon = result === 'success' ? '✅' : '❌';
            const status = result === 'success' ? 'Success' : 'Failed';

            const body = [
              `## ${icon} Terraform Plan ${status}`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```',
              plan,
              '```',
              '',
              '</details>',
              '',
              `*Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`,
              `*Working Directory: \`${{ env.TF_WORKING_DIR }}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
