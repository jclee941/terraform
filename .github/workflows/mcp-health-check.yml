name: MCP Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1-5" # Mon-Fri 01:00 UTC (10:00 KST), after drift check

permissions:
  contents: read
  issues: write

concurrency:
  group: mcp-health-check
  cancel-in-progress: true

jobs:
  health-check:
    uses: ./.github/workflows/_mcp-health-check.yml
    secrets: inherit
