name: MCP Health Check

on:
  workflow_run:
    workflows:
      - "Terraform Apply"
      - "Archon Apply"
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: mcp-health-check
  cancel-in-progress: true

jobs:
  health-check:
    uses: ./.github/workflows/_mcp-health-check.yml
    secrets: inherit
