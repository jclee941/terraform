name: MCP Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1-5" # Mon-Fri 01:00 UTC (10:00 KST), after drift check

permissions:
  contents: read
  issues: write

concurrency:
  group: mcp-health-check
  cancel-in-progress: true

jobs:
  health-check:
    name: MCP Service Health
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e7592db471057e0ee48b3049224e37e95 # v4

      - name: Validate MCP catalog
        run: python3 112-mcphub/validate_mcps.py

      - name: Check MCP service ports
        id: health
        run: |  # pragma: allowlist secret
          declare -A SERVICES=(
            [elk]=8065
            [kratos]=8060
            [terraform]=8071
            [github]=8058
            [git]=8059
            [onepassword]=8077
            [supabase]=8076
            [glitchtip]=8075
            [archon]=8078
            [slack]=8079
          )

          MCPHUB_HOST="192.168.50.112"
          FAILED=""
          REPORT="| Service | Port | Status |\n|---------|------|--------|\n"

          for svc in $(echo "${!SERVICES[@]}" | tr ' ' '\n' | sort); do
            port=${SERVICES[$svc]}
            if curl -sf -o /dev/null -w "" --connect-timeout 5 "http://${MCPHUB_HOST}:${port}" 2>/dev/null; then
              REPORT+="| ${svc} | ${port} | ✅ Reachable |\n"
            else
              REPORT+="| **${svc}** | **${port}** | **🔴 Unreachable** |\n"
              FAILED="${FAILED}${svc} (${port}), "
            fi
          done

          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -n "$FAILED" ]; then
            echo "failed=${FAILED%, }" >> "$GITHUB_OUTPUT"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue on failure
        if: steps.health.outputs.has_failures == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const title = `🔴 MCP Health Check: ${process.env.FAILED_SERVICES}`;
            const body = `## MCP Health Check Failed

            **Date:** ${new Date().toISOString()}
            **Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}

            ### Service Status

            ${process.env.REPORT}

            ### Failed Services
            ${process.env.FAILED_SERVICES}

            ### Action Required
            - [ ] Check \`docs/runbooks/mcp-health-check.md\` for fix procedures
            - [ ] Verify MCPHub host (192.168.50.112) is accessible
            - [ ] Check individual service containers: \`docker ps | grep mcp\`
            - [ ] Review service logs: \`docker logs mcphub-<service>\`
            `;

            // Dedup: find existing open issue with MCP Health Check prefix
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,mcp',
              per_page: 10,
            });

            const existing = issues.find(i => i.title.startsWith('🔴 MCP Health Check:'));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: title,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'mcp'],
              });
            }
          env:
            FAILED_SERVICES: ${{ steps.health.outputs.failed }}
            REPORT: ${{ steps.health.outputs.report }}

      - name: Summary
        if: always()
        run: |
          echo "## MCP Health Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo -e "${{ steps.health.outputs.report }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.health.outputs.has_failures }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**⚠️ Failed:** ${{ steps.health.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**✅ All services healthy**" >> "$GITHUB_STEP_SUMMARY"
          fi
