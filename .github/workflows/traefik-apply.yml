name: Traefik Apply

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "102-traefik/terraform/**"
permissions:
  contents: read
  issues: write

concurrency:
  group: traefik-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Traefik
      working-directory: 102-traefik/terraform
      needs-infra-state: true
      migrate-state: lxc_config
      failure-title-prefix: "[Traefik] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `102-traefik/terraform`

        ### Checklist
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
