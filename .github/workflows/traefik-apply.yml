name: Traefik Apply

on:
  push:
    branches:
      - master
    paths:
      - '102-traefik/terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: traefik-apply
  cancel-in-progress: false

env:
  TF_WORKING_DIR: 102-traefik/terraform

jobs:
  apply:
    name: Traefik Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-input=false'

      - name: Migrate State (one-time)
        run: |
          terraform state rm module.lxc_config 2>/dev/null || true

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: '[Traefik] Apply failed on master'
          extra-body: |
            **Workspace:** `102-traefik/terraform`

            ### Checklist
            - [ ] Run `terraform plan` locally to diagnose
            - [ ] Fix and re-apply, or revert the commit
          labels: 'terraform-drift,automated,infrastructure'
