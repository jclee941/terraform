name: CodeQL

# Static analysis security testing for Python sources.
# Complements the AI-driven pr-review.yml by catching deterministic
# security patterns (CWE Top 25) that LLMs can miss.

on:
  pull_request:
    branches: [master, main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/codeql.yml'
  push:
    branches: [master, main]
    paths:
      - '**.py'
      - 'pyproject.toml'
  schedule:
    - cron: '23 4 * * 1'  # Mondays 04:23 UTC (off-peak)
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:python'
