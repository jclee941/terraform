name: Terraform Docs (Reusable)

on:
  workflow_call:
    inputs:
      find-dir:
        description: "Directory to search for Terraform files"
        type: string
        default: "."
      output-file:
        description: "Output file name"
        type: string
        default: "README.md"
      commit-message:
        description: "Commit message for auto-generated docs"
        type: string
        default: "docs: auto-update terraform-docs"

permissions:
  contents: write

jobs:
  docs:
    name: Auto-generate Terraform Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Render terraform docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          find-dir: ${{ inputs.find-dir }}
          output-file: ${{ inputs.output-file }}
          output-method: inject
          git-push: true
          git-commit-message: ${{ inputs.commit-message }}
