name: Milestone Automation

on:
  issues:
    types: [closed]
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: milestone-automation-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  milestone-automation:
    uses: ./.github/workflows/_milestone-automation.yml
    secrets: inherit
