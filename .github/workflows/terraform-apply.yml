name: Terraform Apply

on:
  push:
    branches:
      - master
    paths:
      - '100-pve/**'
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TF_WORKING_DIR: 100-pve/envs/prod

jobs:
  apply:
    name: Terraform Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Terraform Init
        run: terraform init -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commit = context.sha.substring(0, 7);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Terraform] Apply failed on master (${today})`,
              body: `## Terraform Apply Failure

            **Date:** ${today}
            **Commit:** [\`${commit}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})
            **Triggered by:** @${context.actor}
            **Workflow Run:** [View logs](${runUrl})
            **Workspace:** \`100-pve/envs/prod\`

            ### Action Required
            - [ ] Check the [workflow run](${runUrl}) for error details
            - [ ] Verify Proxmox API connectivity and credentials
            - [ ] Run \`terraform plan\` locally to diagnose
            - [ ] Fix and re-apply, or revert the commit
            - [ ] Close this issue when resolved

            ---
            *Auto-generated by [Terraform Apply](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/terraform-apply.yml)*`,
              labels: ['terraform-drift', 'automated', 'infrastructure']
            });
