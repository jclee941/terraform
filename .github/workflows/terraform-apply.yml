name: Terraform Apply

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "100-pve/**"
      - "modules/**"
      # Service template dirs consumed by 100-pve/main.tf _svc_tpl
      - "101-runner/templates/**"
      - "102-traefik/templates/**"
      - "102-traefik/config/**"
      - "103-coredns/templates/**"
      - "104-grafana/templates/**"
      - "105-elk/templates/**"
      - "106-glitchtip/templates/**"
      - "107-supabase/templates/**"
      - "108-archon/templates/**"
      - "112-mcphub/templates/**"
      # Direct file refs from 100-pve/main.tf
      - "112-mcphub/mcp_servers.json"
      - "112-mcphub/Dockerfile.proxmox"
      - "112-mcphub/Dockerfile.playwright"

permissions:
  contents: read
  issues: write

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Terraform
      working-directory: 100-pve
      enable-proxmox-imports: true
      failure-title-prefix: "[Terraform] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `100-pve`

        ### Checklist
        - [ ] Verify Proxmox API connectivity and credentials
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit  # pragma: allowlist secret
