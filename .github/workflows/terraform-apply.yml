name: Terraform Apply

on:
  push:
    branches:
      - master
    paths:
      - '100-pve/**'
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  TF_WORKING_DIR: 100-pve
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-backend-config=../backend.hcl -input=false'
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          TF_VAR_vault_token: ${{ secrets.TF_VAR_VAULT_TOKEN }}

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: '[Terraform] Apply failed on master'
          extra-body: |
            **Workspace:** `100-pve/envs/prod`

            ### Checklist
            - [ ] Verify Proxmox API connectivity and credentials
            - [ ] Run `terraform plan` locally to diagnose
            - [ ] Fix and re-apply, or revert the commit
          labels: 'terraform-drift,automated,infrastructure'
