name: Terraform Apply

on:
  push:
    branches:
      - master
    paths:
      - "100-pve/**"
      - "modules/**"
      # Service template dirs consumed by 100-pve/main.tf _svc_tpl
      - "101-runner/templates/**"
      - "102-traefik/templates/**"
      - "102-traefik/config/**"
      - "104-grafana/templates/**"
      - "105-elk/templates/**"
      - "106-glitchtip/templates/**"
      - "107-supabase/templates/**"
      - "108-archon/templates/**"
      - "112-mcphub/templates/**"
      # Direct file refs from 100-pve/main.tf
      - "112-mcphub/mcp_servers.json"
      - "112-mcphub/Dockerfile.proxmox"
      - "112-mcphub/Dockerfile.playwright"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  TF_WORKING_DIR: 100-pve

jobs:
  apply:
    name: Terraform Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: false

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: "1.10.5"
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: "-input=false"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Terraform Apply
        run: terraform apply -input=false -no-color tfplan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_insecure: ${{ secrets.TF_VAR_PROXMOX_INSECURE }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "[Terraform] Apply failed on master"
          extra-body: |
            **Workspace:** `100-pve/envs/prod`

            ### Checklist
            - [ ] Verify Proxmox API connectivity and credentials
            - [ ] Run `terraform plan` locally to diagnose
            - [ ] Fix and re-apply, or revert the commit
          labels: "terraform-drift,automated,infrastructure"
