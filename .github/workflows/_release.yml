name: Release (Reusable)

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0). Falls back to github.ref tag."
        type: string
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine tag
        id: determine-tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        id: previous-tag
        run: |
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          result-encoding: string
          script: |
            const currentTag = '${{ steps.determine-tag.outputs.tag }}';
            const previousTag = '${{ steps.previous-tag.outputs.previous_tag }}';

            let commitMessages = [];
            try {
              if (previousTag) {
                const { data } = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${previousTag}...${currentTag}`,
                });
                commitMessages = data.commits.map(c => c.commit.message);
              } else {
                const { data } = await github.rest.repos.listCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha: currentTag,
                  per_page: 100,
                });
                commitMessages = data.map(c => c.commit.message);
              }
            } catch (e) {
              return `Failed to generate changelog: ${e.message}`;
            }

            const groups = {
              Features: [],
              Fixes: [],
              CI: [],
              Docs: [],
              Other: []
            };

            for (const message of commitMessages) {
              const firstLine = message.split(String.fromCharCode(10))[0];
              const match = firstLine.match(/^(\w+)(\(.+?\))?:\s*(.+)/);
              if (match) {
                const type = match[1].toLowerCase();
                const scope = match[2] || '';
                const subject = match[3];
                const entry = `- ${scope ? scope + ': ' : ''}${subject}`;
                if (type === 'feat') {
                  groups.Features.push(entry);
                } else if (type === 'fix') {
                  groups.Fixes.push(entry);
                } else if (type === 'ci') {
                  groups.CI.push(entry);
                } else if (type === 'docs') {
                  groups.Docs.push(entry);
                } else {
                  groups.Other.push(entry);
                }
              } else {
                groups.Other.push(`- ${firstLine}`);
              }
            }

            let changelog = '';
            const NL = String.fromCharCode(10);
            for (const [section, entries] of Object.entries(groups)) {
              if (entries.length > 0) {
                changelog += '## ' + section + NL + NL + entries.join(NL) + NL + NL;
              }
            }

            return changelog.trim() || 'No changes';

      - name: Check if pre-release
        id: prerelease
        run: |
          tag="${{ steps.determine-tag.outputs.tag }}"
          if [[ "$tag" == *"-rc"* ]] || [[ "$tag" == *"-alpha"* ]] || [[ "$tag" == *"-beta"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        run: |
          tag="${{ steps.determine-tag.outputs.tag }}"
          title="Release ${tag}"
          prerelease="${{ steps.prerelease.outputs.prerelease }}"
          flags=""
          if [ "$prerelease" = "true" ]; then
            flags="--prerelease"
          fi
          gh release create "$tag" \
            --title "$title" \
            --notes "${{ steps.changelog.outputs.result }}" \
            $flags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ secrets.GH_PAT }}
          title-prefix: "🔴 Release"
