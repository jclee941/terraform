name: Cloudflare Plan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '300-cloudflare/**'

concurrency:
  group: cloudflare-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: 300-cloudflare
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  plan:
    name: Cloudflare Plan
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-backend-config=../backend.hcl -input=false'

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          # Capture plan output for PR comment (truncate if too large)
          PLAN=$(cat plan_output.txt)
          if [ ${#PLAN} -gt 65000 ]; then
            PLAN="${PLAN:0:65000}

            ... (truncated, see workflow run for full output)"
          fi
          echo "plan<<EOFPLAN" >> "$GITHUB_OUTPUT"
          echo "$PLAN" >> "$GITHUB_OUTPUT"
          echo "EOFPLAN" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_synology_domain: ${{ secrets.TF_VAR_SYNOLOGY_DOMAIN }}
          TF_VAR_access_allowed_emails: ${{ secrets.TF_VAR_ACCESS_ALLOWED_EMAILS }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          TF_VAR_vault_token: ${{ secrets.TF_VAR_VAULT_TOKEN }}

      - name: Comment Plan on PR
        if: always() && github.event_name == 'pull_request' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const result = '${{ steps.plan.outputs.result }}';
            const plan = `${{ steps.plan.outputs.plan }}`;
            const icon = result === 'success' ? '\u2705' : '\u274c';
            const status = result === 'success' ? 'Success' : 'Failed';

            const body = `## ${icon} Cloudflare Plan ${status}

            <details><summary>Show Plan Output</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*
            *Working Directory: \`${{ env.TF_WORKING_DIR }}\`*`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cloudflare Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
