name: Grafana Apply

on:
  push:
    branches:
      - master
    paths:
      - '104-grafana/terraform/**'
      - '104-grafana/dashboards/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: terraform-apply-grafana
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Grafana
      working-directory: 104-grafana/terraform
      failure-title-prefix: '[Grafana] Apply failed on master'
      failure-extra-body: |
        **Workspace:** `104-grafana/terraform`

        ### Checklist
        - [ ] Verify Grafana API connectivity and auth token
        - [ ] Run `make plan SVC=104-grafana/terraform` locally to diagnose
        - [ ] Check if dashboard JSON files are valid
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: 'terraform-drift,automated,infrastructure'
    secrets: inherit  # pragma: allowlist secret
