name: Grafana Apply

on:
  push:
    branches:
      - master
    paths:
      - '104-grafana/terraform/**'
      - '104-grafana/dashboards/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: terraform-apply-grafana
  cancel-in-progress: false

env:
  TF_WORKING_DIR: 104-grafana/terraform

jobs:
  apply:
    name: Grafana Apply
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform & Init
        uses: ./.github/actions/terraform-setup
        with:
          terraform-version: '1.10.5'
          working-directory: ${{ env.TF_WORKING_DIR }}
          init-args: '-input=false -backend-config=../../backend.hcl'
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_grafana_auth: ${{ secrets.TF_VAR_GRAFANA_AUTH }}
          TF_VAR_n8n_webhook_url: ${{ secrets.TF_VAR_N8N_WEBHOOK_URL }}

      - name: Create Issue on Failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: '[Grafana] Apply failed on master'
          extra-body: |
            **Workspace:** `104-grafana/terraform`

            ### Checklist
            - [ ] Verify Grafana API connectivity and auth token
            - [ ] Run `make plan SVC=104-grafana/terraform` locally to diagnose
            - [ ] Check if dashboard JSON files are valid
            - [ ] Fix and re-apply, or revert the commit
          labels: 'terraform-drift,automated,infrastructure'
