name: PR Review (CLIProxyAPI)

# Posts an automated AI code review against any non-draft PR.
# Skips dependabot[bot] (handled by dependabot-auto-merge.yml).
#
# This workflow is downstream-portable: it does NOT require the host repo
# to contain pr-agent source. It clones jclee941/.github at a separate
# path and installs pr-agent from there, then runs the review against
# the host repo's PR via the GitHub API.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr_review:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: PR review via CLIProxyAPI
    timeout-minutes: 15

    steps:
      - name: Check out pr-agent source from jclee941/.github
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          ref: master
          path: pr-agent-src
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pr-review-${{ hashFiles('pr-agent-src/pyproject.toml', 'pr-agent-src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pr-review-

      - name: Install pr-agent
        working-directory: pr-agent-src
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .

      - name: Verify cli_proxy connectivity
        env:
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
        run: |
          set -e
          if [ -z "$CLIPROXY_API_KEY" ]; then
            echo "ERROR: CLIPROXY_API_KEY secret is not set on this repo."
            echo "Add the secret via: gh secret set CLIPROXY_API_KEY --repo $GITHUB_REPOSITORY"
            exit 1
          fi
          HTTP_CODE=$(curl -sS -o /tmp/cli_proxy_test.json -w '%{http_code}' \
            --max-time 15 \
            https://cliproxy.jclee.me/v1/models \
            -H "Authorization: Bearer $CLIPROXY_API_KEY")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: cli_proxy returned HTTP $HTTP_CODE"
            cat /tmp/cli_proxy_test.json
            exit 1
          fi
          MODEL_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/cli_proxy_test.json'))['data']))")
          echo "cli_proxy OK - $MODEL_COUNT models available"

      - name: Run PR review
        working-directory: pr-agent-src
        env:
          OPENAI.KEY: ${{ secrets.CLIPROXY_API_KEY }}
          OPENAI.API_BASE: https://cliproxy.jclee.me/v1
          CONFIG.MODEL: kimi-k2.6
          CONFIG.FALLBACK_MODELS: '["kimi-k2.5", "claude-sonnet-4-6"]'
          CONFIG.RESPONSE_LANGUAGE: ko
          CONFIG.AI_TIMEOUT: "180"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"
          # Quality knobs — produce richer review output even on small diffs.
          # See pr_agent/tools/pr_reviewer.py:85-94 for toggle->prompt mapping.
          PR_REVIEWER.REQUIRE_SCORE_REVIEW: "true"
          PR_REVIEWER.REQUIRE_TESTS_REVIEW: "true"
          PR_REVIEWER.REQUIRE_ESTIMATE_EFFORT_TO_REVIEW: "true"
          PR_REVIEWER.REQUIRE_ESTIMATE_CONTRIBUTION_TIME_COST: "true"
          PR_REVIEWER.REQUIRE_CAN_BE_SPLIT_REVIEW: "true"
          PR_REVIEWER.REQUIRE_SECURITY_REVIEW: "true"
          PR_REVIEWER.REQUIRE_TODO_SCAN: "true"
          PR_REVIEWER.REQUIRE_TICKET_ANALYSIS_REVIEW: "true"
          PR_REVIEWER.NUM_MAX_FINDINGS: "5"
          PR_REVIEWER.PUBLISH_OUTPUT_NO_SUGGESTIONS: "false"
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: Dynaconf maps `GITHUB__USER_TOKEN` (double underscore) to the nested setting
          # `settings.github.user_token` because pr-agent's config_loader uses `envvar_prefix=False`
          # with the standard env_loader. Dot-notation names (e.g. `GITHUB.USER_TOKEN`) are NOT
          # POSIX-valid identifiers; bash cannot `export` them. GitHub Actions can sometimes inject
          # them anyway, but rely on the documented dynaconf double-underscore convention to keep
          # the workflow portable to any runner.
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            이 리뷰는 표준 코드 리뷰 모드입니다.
            다음 관점에서 체계적으로 점검하십시오.

            1. 보안: SQL Injection, XSS, 인증/인가, secrets 노출
            2. 정확성: 논리 오류, 경쟁조건, edge case 미처리
            3. 성능: 불필요한 쿼리, 메모리 누수, 비효율 알고리즘
            4. 유지보수성: 코드 중복, 과도한 복잡성, 테스트 부재
            5. 문서화: README.md, API 문서, 주석/독스트링, PR 설명

            각 이슈에 번호를 부여하고, 심각도([CRITICAL] [WARNING] [INFO])와
            파일명+라인 번호를 명시하십시오. 개선 제안에는 구체적인 코드 예시를 포함하십시오.

          PR_DESCRIPTION.EXTRA_INSTRUCTIONS: |
            PR 설명은 한국어로 작성하십시오.
        run: |
          set -eo pipefail

          # Preflight: confirm dynaconf actually loaded the GitHub token
          .venv/bin/python - <<'PY'
          from pr_agent.config_loader import get_settings
          tok = get_settings().get("github.user_token")
          if not tok:
              raise SystemExit("ERROR: settings.github.user_token is empty. "
                               "Confirm GITHUB__USER_TOKEN env var is exported.")
          print("preflight ok: github.user_token configured")
          PY

          # Dynamic command selection based on PR characteristics.
          # Decision order (first match wins):
          #   1. Dependabot/bot author     -> review
          #   2. Docs-only diff            -> describe
          #   3. feat:/fix:/refactor: title-> describe review improve agentic_review
          #   4. < 50 LOC                  -> review
          #   5. > 1000 LOC                -> describe review
          #   6. default                   -> describe review improve agentic_review
          PR_NUM=${{ github.event.pull_request.number }}
          PR_DATA=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" \
            --json additions,deletions,files,title,author 2>/dev/null || echo '{}')
          ADDS=$(echo "$PR_DATA" | jq -r '.additions // 0')
          DELS=$(echo "$PR_DATA" | jq -r '.deletions // 0')
          LOC=$((ADDS + DELS))
          AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login // ""')
          TITLE=$(echo "$PR_DATA" | jq -r '.title // ""')
          # Treat the diff as docs-only when EVERY changed file matches the docs allowlist.
          NON_DOCS=$(echo "$PR_DATA" | jq -r '.files[]?.path // empty' \
            | grep -vE '\.(md|rst|txt|adoc)$|^docs/|^README|^LICENSE|^NOTICE|^CONTRIBUTING|^\.github/(ISSUE|PULL_REQUEST)' || true)
          DOCS_ONLY=false
          if [ -n "$(echo "$PR_DATA" | jq -r '.files[]?.path' 2>/dev/null)" ] && [ -z "$NON_DOCS" ]; then
            DOCS_ONLY=true
          fi
          if echo "$AUTHOR" | grep -qE '\[bot\]$'; then
            CMDS="review"
            REASON="bot author"
          elif [ "$DOCS_ONLY" = "true" ]; then
            CMDS="describe"
            REASON="docs-only diff"
          elif echo "$TITLE" | grep -qE '^(feat|fix|refactor)(\([a-z0-9_/-]+\))?!?:'; then
            CMDS="describe review improve agentic_review"
            REASON="feat/fix/refactor PR"
          elif [ "$LOC" -lt 50 ]; then
            CMDS="review"
            REASON="small PR (<50 LOC)"
          elif [ "$LOC" -gt 1000 ]; then
            CMDS="describe review"
            REASON="large PR (>1000 LOC)"
          else
            CMDS="describe review improve agentic_review"
            REASON="default"
          fi
          echo "::notice::PR #$PR_NUM (LOC=$LOC, author=$AUTHOR, title=$TITLE)"
          echo "::notice::Selected commands: $CMDS  ($REASON)"

          # Run the selected commands and capture pr-agent's combined output.
          # pr-agent's CLI exits 0 even on fatal provider errors (silent-success),
          # so we additionally grep the captured log for known fatal patterns.
          : > /tmp/pr-agent.log
          status=0
          for cmd in $CMDS; do
            echo "--- running pr-agent $cmd ---" | tee -a /tmp/pr-agent.log
            set +e
            .venv/bin/python -m pr_agent.cli --pr_url "$PR_URL" "$cmd" 2>&1 | tee -a /tmp/pr-agent.log
            cmd_status=${PIPESTATUS[0]}
            set -e
            if [ "$cmd_status" -ne 0 ]; then
              status=$cmd_status
              echo "::error::pr-agent $cmd exited with status $cmd_status"
              break
            fi
          done

          if [ "$status" -ne 0 ]; then
            echo "::error::pr-agent CLI exited with status $status"
            exit "$status"
          fi

          # Silent-failure guard — pr_agent CLI returns exit 0 on most logical
          # failures (caught Exception at pr_reviewer.py:184). Patterns below are
          # confirmed in source (file:line in commit message).
          if grep -E "Failed to generate prediction with any model|Failed to review PR|Rate limit error during LLM inference|Unknown error during LLM inference|Error during LLM inference|Failed to publish (code suggestion|inline code comments fallback|diffview file summary|labels)|Cannot publish a comment if missing PR|Failed to get (diff files|merge base commit)|Failed to add AI metadata|Empty prediction|ai handler not set|Unable to decode JSON response|Failed to parse AI prediction|Rate limit exceeded for git provider|BoxKeyError|GitHub token is required|Failed to get git provider|AuthenticationError" /tmp/pr-agent.log | grep -vE "(Empty diff for PR:|PR has no files:|Incremental review is enabled.*but there are no new (files|commits)|Review output is not published|Incremental review is not supported)"; then
            echo "::error::pr-agent reported a fatal error but exited 0 (silent failure)"
            exit 1
          fi
