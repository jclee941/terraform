name: Credential Rotation

on:
  workflow_dispatch:
    inputs:
      credential-type:
        description: "Credential family to rotate or reconcile"
        type: choice
        options:
          - all
          - 1password
          - cloudflare
          - github
          - n8n
          - runner
          - synology
          - slack
          - youtube
        default: all
  schedule:
    - cron: "17 4 * * *"
  workflow_call:
    inputs:
      credential-type:
        description: "Credential family to rotate or reconcile"
        type: string
        default: all
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
      GH_PAT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      PROXMOX_VE_API_TOKEN:
        required: false
      PROXMOX_VE_ENDPOINT:
        required: false
      PROXMOX_VE_SSH_PRIVATE_KEY:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_APP_TOKEN:
        required: false

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: credential-rotation
  cancel-in-progress: false

env:
  ROTATION_RUNBOOK: docs/runbooks/credential-rotation.md
  OP_VERSION: "2.32.1"

jobs:
  prepare:
    name: Rotation Planner
    runs-on: ubuntu-latest
    outputs:
      selected: ${{ steps.plan.outputs.selected }}
      mode: ${{ steps.plan.outputs.mode }}
      run_1password: ${{ steps.plan.outputs.run_1password }}
      run_cloudflare: ${{ steps.plan.outputs.run_cloudflare }}
      run_github: ${{ steps.plan.outputs.run_github }}
      run_n8n: ${{ steps.plan.outputs.run_n8n }}
      run_runner: ${{ steps.plan.outputs.run_runner }}
      run_synology: ${{ steps.plan.outputs.run_synology }}
      run_slack: ${{ steps.plan.outputs.run_slack }}
      run_youtube: ${{ steps.plan.outputs.run_youtube }}
    steps:
      - name: Compute run plan
        id: plan
        env:
          DISPATCH_SELECTION: ${{ github.event.inputs['credential-type'] }}
          CALL_SELECTION: ${{ inputs['credential-type'] }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import time
          from datetime import date

          selected = os.environ.get("DISPATCH_SELECTION") or os.environ.get("CALL_SELECTION") or "all"
          mode = "scheduled" if os.environ.get("EVENT_NAME") == "schedule" else "manual"
          days_since_epoch = int(time.time() // 86400)
          quarterly_due = days_since_epoch % 90 == 0
          runner_due = days_since_epoch % 30 == 0
          n8n_due = (date(2026, 5, 11) - date.today()).days <= 14

          def run_flag(name: str, scheduled_default: bool) -> bool:
            if mode == "scheduled":
              return scheduled_default
            return selected in ("all", name)

          outputs = {
            "selected": selected,
            "mode": mode,
            "run_1password": str(run_flag("1password", quarterly_due)).lower(),
            "run_cloudflare": str(run_flag("cloudflare", quarterly_due)).lower(),
            "run_github": str(run_flag("github", quarterly_due)).lower(),
            "run_n8n": str(run_flag("n8n", n8n_due)).lower(),
            "run_runner": str(run_flag("runner", runner_due)).lower(),
            "run_synology": str(run_flag("synology", False)).lower(),
            "run_slack": str(run_flag("slack", False)).lower(),
            "run_youtube": str(run_flag("youtube", False)).lower(),
          }

          for key, value in outputs.items():
            print(f"{key}={value}")
          PY

      - name: Summarize plan
        run: |
          {
            echo "## Credential Rotation Plan"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- Mode: \`${{ steps.plan.outputs.mode }}\`"
            echo "- Selection: \`${{ steps.plan.outputs.selected }}\`"
            echo ""
            echo "| Credential | Scheduled / Selected |"
            echo "|------------|----------------------|"
            echo "| 1Password service account | ${{ steps.plan.outputs.run_1password }} |"
            echo "| Cloudflare API token | ${{ steps.plan.outputs.run_cloudflare }} |"
            echo "| GitHub PAT | ${{ steps.plan.outputs.run_github }} |"
            echo "| n8n MCP API key | ${{ steps.plan.outputs.run_n8n }} |"
            echo "| GitHub runner token | ${{ steps.plan.outputs.run_runner }} |"
            echo "| Synology credentials | ${{ steps.plan.outputs.run_synology }} |"
            echo "| Slack tokens | ${{ steps.plan.outputs.run_slack }} |"
            echo "| YouTube OAuth | ${{ steps.plan.outputs.run_youtube }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  rotate_1password:
    name: Rotate 1Password Service Account Token
    runs-on: [self-hosted, homelab]
    timeout-minutes: 20
    needs: [prepare]
    if: needs.prepare.outputs.run_1password == 'true'
    steps:
      - name: Rotate, distribute, and verify
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_VE_SSH_PRIVATE_KEY }}
          ONEPASSWORD_SERVICE_ACCOUNT_NAME: ${{ vars.ONEPASSWORD_SERVICE_ACCOUNT_NAME }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
          OP_VERSION: ${{ env.OP_VERSION }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § 1Password Service Account Token
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/1password"
          BACKUP_DIR="$AUDIT_DIR/private"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$BACKUP_DIR" "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          ensure_gh() {
            if command -v gh >/dev/null 2>&1; then
              return
            fi
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh jq
          }

          ensure_op() {
            if command -v op >/dev/null 2>&1; then
              return
            fi
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          }

          pve_host() {
            python3 - <<'PY'
            from urllib.parse import urlparse
            import os
            endpoint = os.environ["PROXMOX_VE_ENDPOINT"]
            parsed = urlparse(endpoint)
            print(parsed.hostname or endpoint)
          PY
          }

          ensure_gh
          ensure_op

          if [ -z "${GH_TOKEN:-}" ] || [ -z "${PROXMOX_VE_ENDPOINT:-}" ] || [ -z "${PROXMOX_VE_SSH_PRIVATE_KEY:-}" ]; then
            log "Missing GH_PAT or Proxmox SSH configuration"
            exit 1
          fi

          printf '%s\n' "$PROXMOX_VE_SSH_PRIVATE_KEY" > "$BACKUP_DIR/pve.key"
          chmod 600 "$BACKUP_DIR/pve.key"
          PVE_HOST="$(pve_host)"

          ssh_pve() {
            ssh -i "$BACKUP_DIR/pve.key" -o BatchMode=yes -o StrictHostKeyChecking=no "root@${PVE_HOST}" "$@"
          }

          pct_exec() {
            local vmid="$1"
            local script="$2"
            ssh_pve "pct exec ${vmid} -- bash -lc $(printf '%q' "$script")"
          }

          remote_replace_env() {
            local vmid="$1"
            local path="$2"
            local key="$3"
            local value="$4"
            local value_b64
            value_b64=$(printf '%s' "$value" | base64 -w0)
            pct_exec "$vmid" "ENV_PATH='${path}' ENV_KEY='${key}' ENV_VALUE_B64='${value_b64}' python3 - <<'PY'
            from pathlib import Path
            import base64
            import os

            path = Path(os.environ['ENV_PATH'])
            key = os.environ['ENV_KEY']
            value = base64.b64decode(os.environ['ENV_VALUE_B64']).decode()
            lines = []
            found = False
            for line in path.read_text().splitlines():
                if line.startswith(f'{key}='):
                    lines.append(f'{key}={value}')
                    found = True
                else:
                    lines.append(line)
            if not found:
                lines.append(f'{key}={value}')
            path.write_text('\\n'.join(lines) + '\\n')
          PY"
          }

          dispatch_and_wait() {
            local workflow="$1"
            local since run_id
            since=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref master >/dev/null
            sleep 15
            run_id=""
            for _ in $(seq 1 24); do
              run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --limit 20 --json databaseId,createdAt --jq ".[] | select(.createdAt >= \"${since}\") | .databaseId" | sed -n '1p')
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 10
            done
            if [ -z "$run_id" ]; then
              log "Timed out locating downstream workflow run for $workflow"
              return 1
            fi
            gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          }

          rollback() {
            set +e
            log "Rollback started for 1Password token distribution"
            if [ -s "$BACKUP_DIR/previous-token.txt" ]; then
              gh secret set OP_SERVICE_ACCOUNT_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/previous-token.txt" >/dev/null 2>&1 || true
              remote_replace_env 112 /opt/mcphub/.env OP_SERVICE_ACCOUNT_TOKEN "$(cat "$BACKUP_DIR/previous-token.txt")" >/dev/null 2>&1 || true
              pct_exec 112 "docker compose -f /opt/mcphub/docker-compose.yml restart" >/dev/null 2>&1 || true
            fi
          }

          trap rollback ERR

          if [ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            printf '%s' "$OP_SERVICE_ACCOUNT_TOKEN" > "$BACKUP_DIR/previous-token.txt"
          else
            pct_exec 112 "python3 - <<'PY'
            from pathlib import Path
            for line in Path('/opt/mcphub/.env').read_text().splitlines():
                if line.startswith('OP_SERVICE_ACCOUNT_TOKEN='):
                    print(line.split('=', 1)[1])
                    break
            PY" > "$BACKUP_DIR/previous-token.txt"
          fi
          pct_exec 112 "grep '^OP_SERVICE_ACCOUNT_TOKEN=' /opt/mcphub/.env || true" | sed -E 's/(OP_SERVICE_ACCOUNT_TOKEN=).+/\1[REDACTED]/' > "$REPORT_DIR/mcphub-env-before.txt"
          log "Captured pre-rotation backup for GitHub secret and MCPHub runtime env"

          NEW_TOKEN=""
          if [ -n "${ONEPASSWORD_SERVICE_ACCOUNT_NAME:-}" ] && op whoami --format json >/dev/null 2>&1; then
            NEW_TOKEN=$(op service-account rotate "$ONEPASSWORD_SERVICE_ACCOUNT_NAME" --format json 2>/dev/null | jq -r '.token // empty' || true)
            if [ -n "$NEW_TOKEN" ]; then
              log "Rotated 1Password service account token via op CLI"
            fi
          fi
          if [ -z "$NEW_TOKEN" ]; then
            NEW_TOKEN=$(op read "op://homelab/mcphub/Credentials/op_service_account_token" 2>/dev/null || true)
            log "Fell back to the token already stored in 1Password"
          fi
          if [ -z "$NEW_TOKEN" ]; then
            log "Unable to resolve replacement 1Password service account token"
            exit 1
          fi

          printf '%s' "$NEW_TOKEN" > "$BACKUP_DIR/new-token.txt"
          gh secret set OP_SERVICE_ACCOUNT_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/new-token.txt"
          remote_replace_env 112 /opt/mcphub/.env OP_SERVICE_ACCOUNT_TOKEN "$NEW_TOKEN"
          pct_exec 112 "docker compose -f /opt/mcphub/docker-compose.yml restart"
          dispatch_and_wait onepassword-test.yml

          log "1Password token rotated, synced to GitHub, updated on LXC 112, and verified with onepassword-test.yml"
          {
            echo "## 1Password Rotation"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- GitHub secret updated: \`OP_SERVICE_ACCOUNT_TOKEN\`"
            echo "- Runtime updated: \`/opt/mcphub/.env\` on LXC 112"
            echo "- Verification: \`onepassword-test.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-1password
          path: ${{ runner.temp }}/credential-rotation/1password/report
          if-no-files-found: ignore

  rotate_cloudflare:
    name: Rotate Cloudflare API Token
    runs-on: [self-hosted, homelab]
    timeout-minutes: 20
    needs: [prepare]
    if: needs.prepare.outputs.run_cloudflare == 'true'
    steps:
      - name: Rotate, sync, and verify
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_ID: ${{ vars.CLOUDFLARE_API_TOKEN_ID }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
          OP_VERSION: ${{ env.OP_VERSION }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § Cloudflare API Token
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/cloudflare"
          BACKUP_DIR="$AUDIT_DIR/private"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$BACKUP_DIR" "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          ensure_gh() {
            if command -v gh >/dev/null 2>&1; then
              return
            fi
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh jq
          }

          ensure_op() {
            if command -v op >/dev/null 2>&1; then
              return
            fi
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          }

          op_read_first() {
            local ref
            for ref in "$@"; do
              if value=$(op read "$ref" 2>/dev/null); then
                if [ -n "$value" ]; then
                  printf '%s' "$value"
                  return 0
                fi
              fi
            done
            return 1
          }

          dispatch_and_wait() {
            local workflow="$1"
            local since run_id
            since=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref master >/dev/null
            sleep 15
            run_id=""
            for _ in $(seq 1 24); do
              run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --limit 20 --json databaseId,createdAt --jq ".[] | select(.createdAt >= \"${since}\") | .databaseId" | sed -n '1p')
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 10
            done
            if [ -z "$run_id" ]; then
              log "Timed out locating downstream workflow run for $workflow"
              return 1
            fi
            gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          }

          rollback() {
            set +e
            log "Rollback started for Cloudflare GitHub secret distribution"
            if [ -s "$BACKUP_DIR/previous-token.txt" ]; then
              gh secret set CLOUDFLARE_API_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/previous-token.txt" >/dev/null 2>&1 || true
            fi
          }

          trap rollback ERR

          ensure_gh
          ensure_op

          if [ -z "${GH_TOKEN:-}" ]; then
            log "Missing GH_PAT for GitHub secret sync and workflow dispatch"
            exit 1
          fi
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            printf '%s' "$CLOUDFLARE_API_TOKEN" > "$BACKUP_DIR/previous-token.txt"
          else
            op_read_first \
              "op://homelab/cloudflare/API Keys/api_token" \
              "op://homelab/cloudflare/API Keys/api_key" \
              "op://homelab/cloudflare/APIKeys/api_token" \
              "op://homelab/cloudflare/APIKeys/api_key" > "$BACKUP_DIR/previous-token.txt"
          fi
          log "Captured current Cloudflare token before rotation"

          NEW_TOKEN=""
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && [ -n "${CLOUDFLARE_TOKEN_ID:-}" ]; then
            RESPONSE=$(curl -fsSL -X PUT \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/user/tokens/${CLOUDFLARE_TOKEN_ID}/value" || true)
            NEW_TOKEN=$(printf '%s' "$RESPONSE" | jq -r '.result.value // empty')
            if [ -n "$NEW_TOKEN" ]; then
              log "Rotated Cloudflare API token via Cloudflare API"
            fi
          fi
          if [ -z "$NEW_TOKEN" ]; then
            NEW_TOKEN=$(op_read_first \
              "op://homelab/cloudflare/API Keys/api_token" \
              "op://homelab/cloudflare/API Keys/api_key" \
              "op://homelab/cloudflare/APIKeys/api_token" \
              "op://homelab/cloudflare/APIKeys/api_key" || true)
            log "Fell back to the Cloudflare token already stored in 1Password"
          fi
          if [ -z "$NEW_TOKEN" ]; then
            log "Unable to resolve replacement Cloudflare token"
            exit 1
          fi

          printf '%s' "$NEW_TOKEN" > "$BACKUP_DIR/new-token.txt"
          gh secret set CLOUDFLARE_API_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/new-token.txt"
          dispatch_and_wait cloudflare-apply.yml
          log "Cloudflare token synced to GitHub and verified with cloudflare-apply.yml"

          {
            echo "## Cloudflare Rotation"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- GitHub secret updated: \`CLOUDFLARE_API_TOKEN\`"
            echo "- Verification: \`cloudflare-apply.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-cloudflare
          path: ${{ runner.temp }}/credential-rotation/cloudflare/report
          if-no-files-found: ignore

  rotate_github:
    name: Rotate GitHub PAT
    runs-on: [self-hosted, homelab]
    timeout-minutes: 20
    needs: [prepare]
    if: needs.prepare.outputs.run_github == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: false

      - name: Rotate, sync, and verify
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          PAT_ROTATION_ID: ${{ vars.PAT_ROTATION_ID }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
          OP_VERSION: ${{ env.OP_VERSION }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § GitHub PAT
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/github"
          BACKUP_DIR="$AUDIT_DIR/private"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$BACKUP_DIR" "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          ensure_op() {
            if command -v op >/dev/null 2>&1; then
              return
            fi
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          }

          op_read_first() {
            local ref
            for ref in "$@"; do
              if value=$(op read "$ref" 2>/dev/null); then
                if [ -n "$value" ]; then
                  printf '%s' "$value"
                  return 0
                fi
              fi
            done
            return 1
          }

          rollback() {
            set +e
            log "Rollback started for GitHub PAT distribution"
            if [ -s "$BACKUP_DIR/previous-item-token.txt" ]; then
              op item edit "github" "APIKeys.personal_access_token=$(cat "$BACKUP_DIR/previous-item-token.txt")" --vault homelab >/dev/null 2>&1 || true
            fi
            if [ -s "$BACKUP_DIR/rollback-auth-token.txt" ]; then
              GH_TOKEN="$(cat "$BACKUP_DIR/rollback-auth-token.txt")" OP_SERVICE_ACCOUNT_TOKEN="$OP_SERVICE_ACCOUNT_TOKEN" go run scripts/sync-vault-secrets.go --force >/dev/null 2>&1 || true
            fi
          }

          trap rollback ERR

          ensure_op
          if [ -z "${GH_TOKEN:-}" ]; then
            log "Missing GH_PAT for PAT regeneration and secret sync"
            exit 1
          fi
          if ! command -v go >/dev/null 2>&1; then
            log "Go toolchain is required for scripts/sync-vault-secrets.go"
            exit 1
          fi

          printf '%s' "$GH_TOKEN" > "$BACKUP_DIR/rollback-auth-token.txt"
          op_read_first \
            "op://homelab/github/API Keys/personal_access_token" \
            "op://homelab/github/APIKeys/personal_access_token" \
            "op://homelab/github/credential" > "$BACKUP_DIR/previous-item-token.txt"
          log "Captured current GitHub PAT from 1Password before rotation"

          NEW_PAT=""
          if [ -n "${PAT_ROTATION_ID:-}" ]; then
            NEW_PAT=$(gh api -X POST "/user/personal_access_tokens/${PAT_ROTATION_ID}/regenerate" --jq '.token // empty' 2>/dev/null || true)
            if [ -n "$NEW_PAT" ]; then
              log "Regenerated GitHub PAT via GitHub API"
            fi
          fi
          if [ -z "$NEW_PAT" ]; then
            NEW_PAT=$(op_read_first \
              "op://homelab/github/API Keys/personal_access_token" \
              "op://homelab/github/APIKeys/personal_access_token" \
              "op://homelab/github/credential" || true)
            log "Fell back to the PAT already rotated in 1Password"
          fi
          if [ -z "$NEW_PAT" ]; then
            log "Unable to resolve replacement GitHub PAT"
            exit 1
          fi

          op item edit "github" "APIKeys.personal_access_token=${NEW_PAT}" --vault homelab >/dev/null || true
          GH_TOKEN="$NEW_PAT" OP_SERVICE_ACCOUNT_TOKEN="$OP_SERVICE_ACCOUNT_TOKEN" go run scripts/sync-vault-secrets.go --force
          GH_TOKEN="$NEW_PAT" gh auth status
          printf '%s' "$NEW_PAT" > "$BACKUP_DIR/rollback-auth-token.txt"
          log "GitHub PAT rotated, written back to 1Password, and synced to GitHub secrets"

          {
