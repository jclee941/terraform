          }

          dispatch_and_wait() {
            local workflow="$1"
            local fallback="$2"
            local target="$workflow"
            local since run_id
            if ! gh workflow view "$target" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              if [ -n "$fallback" ] && gh workflow view "$fallback" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
