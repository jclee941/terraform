            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- 1Password item updated: \`github\`"
            echo "- Sync command: \`go run scripts/sync-vault-secrets.go --force\`"
            echo "- Verification: \`gh auth status\` with the rotated token"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-github
          path: ${{ runner.temp }}/credential-rotation/github/report
          if-no-files-found: ignore

  rotate_n8n:
    name: Rotate n8n MCP API Key
    runs-on: [self-hosted, homelab]
    timeout-minutes: 20
    needs: [prepare]
    if: needs.prepare.outputs.run_n8n == 'true'
    steps:
      - name: Rotate, restart, and verify
        env:
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_VE_SSH_PRIVATE_KEY }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § n8n MCP API Key
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/n8n"
          BACKUP_DIR="$AUDIT_DIR/private"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$BACKUP_DIR" "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          pve_host() {
            python3 - <<'PY'
            from urllib.parse import urlparse
            import os
            endpoint = os.environ["PROXMOX_VE_ENDPOINT"]
            parsed = urlparse(endpoint)
            print(parsed.hostname or endpoint)
          PY
          }

          if [ -z "${PROXMOX_VE_ENDPOINT:-}" ] || [ -z "${PROXMOX_VE_SSH_PRIVATE_KEY:-}" ]; then
            log "Missing Proxmox SSH configuration"
            exit 1
          fi

          printf '%s\n' "$PROXMOX_VE_SSH_PRIVATE_KEY" > "$BACKUP_DIR/pve.key"
          chmod 600 "$BACKUP_DIR/pve.key"
          PVE_HOST="$(pve_host)"

          ssh_pve() {
            ssh -i "$BACKUP_DIR/pve.key" -o BatchMode=yes -o StrictHostKeyChecking=no "root@${PVE_HOST}" "$@"
          }

          pct_exec() {
            local vmid="$1"
            local script="$2"
            ssh_pve "pct exec ${vmid} -- bash -lc $(printf '%q' "$script")"
          }

          remote_replace_env() {
            local vmid="$1"
            local path="$2"
            local key="$3"
            local value="$4"
            local value_b64
            value_b64=$(printf '%s' "$value" | base64 -w0)
            pct_exec "$vmid" "ENV_PATH='${path}' ENV_KEY='${key}' ENV_VALUE_B64='${value_b64}' python3 - <<'PY'
            from pathlib import Path
            import base64
            import os

            path = Path(os.environ['ENV_PATH'])
            key = os.environ['ENV_KEY']
            value = base64.b64decode(os.environ['ENV_VALUE_B64']).decode()
            lines = []
            found = False
            for line in path.read_text().splitlines():
                if line.startswith(f'{key}='):
                    lines.append(f'{key}={value}')
                    found = True
                else:
                    lines.append(line)
            if not found:
                lines.append(f'{key}={value}')
            path.write_text('\\n'.join(lines) + '\\n')
          PY"
          }

          rollback() {
            set +e
            log "Rollback started for MCPHub/n8n API key distribution"
            if [ -s "$BACKUP_DIR/previous-key.txt" ]; then
              remote_replace_env 112 /opt/mcphub/.env MCP_API_KEY "$(cat "$BACKUP_DIR/previous-key.txt")" >/dev/null 2>&1 || true
              pct_exec 112 "docker compose -f /opt/mcphub/docker-compose.yml restart && docker compose -f /opt/n8n/docker-compose.yml restart" >/dev/null 2>&1 || true
            fi
          }

          trap rollback ERR

          pct_exec 112 "python3 - <<'PY'
          from pathlib import Path
          for line in Path('/opt/mcphub/.env').read_text().splitlines():
              if line.startswith('MCP_API_KEY='):
                  print(line.split('=', 1)[1])
                  break
          PY" > "$BACKUP_DIR/previous-key.txt"
          log "Captured current MCPHub API key from /opt/mcphub/.env on VM 112"

          CURRENT_KEY=$(cat "$BACKUP_DIR/previous-key.txt")
          NEW_KEY=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${CURRENT_KEY}" \
            http://192.168.50.112:3000/api/keys/rotate 2>/dev/null | jq -r '.api_key // .key // .token // empty' || true)
          if [ -n "$NEW_KEY" ]; then
            log "Rotated MCP API key via MCPHub API"
          else
            NEW_KEY=$(python3 - <<'PY'
            import secrets
            print(secrets.token_urlsafe(48))
          PY
            )
            log "MCPHub API rotation endpoint unavailable; generated replacement key locally"
          fi

          remote_replace_env 112 /opt/mcphub/.env MCP_API_KEY "$NEW_KEY"
          pct_exec 112 "docker compose -f /opt/mcphub/docker-compose.yml restart && docker compose -f /opt/n8n/docker-compose.yml restart"
          curl -fsS -H "Authorization: Bearer ${NEW_KEY}" http://192.168.50.112:3000/api/health >/dev/null
          log "MCPHub and n8n restarted, and MCPHub health endpoint accepted the new key"

          {
            echo "## n8n MCP API Key Rotation"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- Runtime updated: \`/opt/mcphub/.env\` on VM/LXC 112"
            echo "- Services restarted: \`mcphub\`, \`n8n\`"
            echo "- Verification: \`curl http://192.168.50.112:3000/api/health\` with the rotated key"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-n8n
          path: ${{ runner.temp }}/credential-rotation/n8n/report
          if-no-files-found: ignore

  rotate_runner:
    name: Rotate GitHub Runner Registration Token
    runs-on: [self-hosted, homelab]
    timeout-minutes: 20
    needs: [prepare]
    if: needs.prepare.outputs.run_runner == 'true'
    steps:
      - name: Rotate, re-register, and verify
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_VE_SSH_PRIVATE_KEY }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § GitHub Actions Runner Token
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/runner"
          BACKUP_DIR="$AUDIT_DIR/private"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$BACKUP_DIR" "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          pve_host() {
            python3 - <<'PY'
            from urllib.parse import urlparse
            import os
            endpoint = os.environ["PROXMOX_VE_ENDPOINT"]
            parsed = urlparse(endpoint)
            print(parsed.hostname or endpoint)
          PY
          }

          if [ -z "${GH_TOKEN:-}" ] || [ -z "${PROXMOX_VE_ENDPOINT:-}" ] || [ -z "${PROXMOX_VE_SSH_PRIVATE_KEY:-}" ]; then
            log "Missing GH_PAT or Proxmox SSH configuration"
            exit 1
          fi

          printf '%s\n' "$PROXMOX_VE_SSH_PRIVATE_KEY" > "$BACKUP_DIR/pve.key"
          chmod 600 "$BACKUP_DIR/pve.key"
          PVE_HOST="$(pve_host)"
          REMOTE_BACKUP_DIR="/opt/runner/rotation-backup-${GITHUB_RUN_ID}"

          ssh_pve() {
            ssh -i "$BACKUP_DIR/pve.key" -o BatchMode=yes -o StrictHostKeyChecking=no "root@${PVE_HOST}" "$@"
          }

          pct_exec() {
            local vmid="$1"
            local script="$2"
            ssh_pve "pct exec ${vmid} -- bash -lc $(printf '%q' "$script")"
          }

          rollback() {
            set +e
            log "Rollback started for GitHub runner registration"
            pct_exec 101 "if [ -f '${REMOTE_BACKUP_DIR}/config.tar' ]; then cd /opt/runner && tar -xf '${REMOTE_BACKUP_DIR}/config.tar'; fi" >/dev/null 2>&1 || true
            pct_exec 101 "systemctl list-units 'github-runner-*terraform*.service' --state=loaded --no-legend >/tmp/runner-services.txt 2>/dev/null; if [ -s /tmp/runner-services.txt ]; then awk '{print \$1}' /tmp/runner-services.txt | xargs -r systemctl restart; else systemctl restart actions-runner; fi" >/dev/null 2>&1 || true
          }

          trap rollback ERR

          pct_exec 101 "mkdir -p '${REMOTE_BACKUP_DIR}' && cd /opt/runner && tar -cf '${REMOTE_BACKUP_DIR}/config.tar' .runner .credentials .credentials_rsaparams .env 2>/dev/null || true"
          log "Captured runner registration files from LXC 101 before re-registration"

          NEW_TOKEN=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/actions/runners/registration-token" --jq '.token')
          if [ -z "$NEW_TOKEN" ]; then
            log "Unable to generate GitHub runner registration token"
            exit 1
          fi

          pct_exec 101 "set -euo pipefail; if [ -x /opt/runner/scripts/register-repo.sh ]; then GITHUB_TOKEN='${NEW_TOKEN}' GITHUB_USER='qws941' bash /opt/runner/scripts/register-repo.sh terraform; else cd /opt/runner && ./config.sh --replace --unattended --url https://github.com/${GITHUB_REPOSITORY} --token '${NEW_TOKEN}'; fi"
          pct_exec 101 "systemctl list-units 'github-runner-*terraform*.service' --state=loaded --no-legend >/tmp/runner-services.txt 2>/dev/null; if [ -s /tmp/runner-services.txt ]; then awk '{print \$1}' /tmp/runner-services.txt | xargs -r systemctl restart; else systemctl restart actions-runner; fi"
          pct_exec 101 "systemctl list-units 'github-runner-*terraform*.service' --state=running --no-legend >/dev/null 2>&1 || systemctl is-active --quiet actions-runner"
          log "Runner registration token rotated and actions-runner service verified on LXC 101"

          {
            echo "## Runner Rotation"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- LXC updated: \`101\`"
            echo "- Service restarted: \`actions-runner\` or repo-scoped runner unit"
            echo "- Verification: systemd active check on the runner host"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-runner
          path: ${{ runner.temp }}/credential-rotation/runner/report
          if-no-files-found: ignore

  rotate_synology:
    name: Refresh Synology Credentials
    runs-on: [self-hosted, homelab]
    timeout-minutes: 10
    needs: [prepare]
    if: needs.prepare.outputs.run_synology == 'true'
    steps:
      - name: Read from 1Password and verify API connectivity
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
          OP_VERSION: ${{ env.OP_VERSION }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § Synology Credentials
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/synology"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          ensure_op() {
            if command -v op >/dev/null 2>&1; then
              return
            fi
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          }

          ensure_op
          USERNAME=$(op read "op://homelab/synology/Credentials/user" 2>/dev/null || op read "op://homelab/synology/Credentials/username")
          PASSWORD=$(op read "op://homelab/synology/Credentials/password")
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"
          AUTH=$(curl -sk "http://192.168.50.215:5000/webapi/auth.cgi?api=SYNO.API.Auth&version=3&method=login&account=${USERNAME}&passwd=${PASSWORD}&format=sid")
          SID=$(printf '%s' "$AUTH" | jq -r '.data.sid // empty')
          if [ -z "$SID" ]; then
            log "Synology DSM authentication failed"
            exit 1
          fi
          curl -sk "http://192.168.50.215:5000/webapi/auth.cgi?api=SYNO.API.Auth&version=3&method=logout&_sid=${SID}" >/dev/null 2>&1 || true
          log "Read-only refresh complete: 1Password values loaded and Synology DSM login succeeded"

          {
            echo "## Synology Credential Refresh"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- Source of truth: 1Password synology item"
            echo "- Verification: DSM API login at \`192.168.50.215:5000\`"
            echo "- Safety: read-only validation; no remote state mutated"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-synology
          path: ${{ runner.temp }}/credential-rotation/synology/report
          if-no-files-found: ignore

  rotate_slack:
    name: Refresh Slack Tokens
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15
    needs: [prepare]
    if: needs.prepare.outputs.run_slack == 'true'
    steps:
      - name: Sync from 1Password and verify Slack Apply
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CURRENT_SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CURRENT_SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          ROTATION_RUNBOOK: ${{ env.ROTATION_RUNBOOK }}
          OP_VERSION: ${{ env.OP_VERSION }}
        run: |
          set -euo pipefail
          umask 077

          # Runbook reference: docs/runbooks/credential-rotation.md § Slack Bot/App Tokens
          AUDIT_DIR="$RUNNER_TEMP/credential-rotation/slack"
          BACKUP_DIR="$AUDIT_DIR/private"
          REPORT_DIR="$AUDIT_DIR/report"
          mkdir -p "$BACKUP_DIR" "$REPORT_DIR"
          AUDIT_LOG="$REPORT_DIR/audit.log"

          log() {
            printf '%s %s\n' "$(date -u +%FT%TZ)" "$*" | tee -a "$AUDIT_LOG"
          }

          ensure_gh() {
            if command -v gh >/dev/null 2>&1; then
              return
            fi
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh jq
          }

          ensure_op() {
            if command -v op >/dev/null 2>&1; then
              return
            fi
            curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v${OP_VERSION}/op_linux_amd64_v${OP_VERSION}.zip"
            unzip -o /tmp/op.zip -d /tmp/op-bin >/dev/null
            sudo install -m 755 /tmp/op-bin/op /usr/local/bin/op
            rm -rf /tmp/op.zip /tmp/op-bin
          }

          dispatch_and_wait() {
            local workflow="$1"
            local since run_id
            since=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref master >/dev/null
            sleep 15
            run_id=""
            for _ in $(seq 1 24); do
              run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --limit 20 --json databaseId,createdAt --jq ".[] | select(.createdAt >= \"${since}\") | .databaseId" | sed -n '1p')
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 10
            done
            if [ -z "$run_id" ]; then
              log "Timed out locating downstream workflow run for $workflow"
              return 1
            fi
            gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          }

          rollback() {
            set +e
            log "Rollback started for Slack GitHub secret distribution"
            if [ -s "$BACKUP_DIR/previous-bot-token.txt" ]; then
              gh secret set SLACK_BOT_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/previous-bot-token.txt" >/dev/null 2>&1 || true
            fi
            if [ -s "$BACKUP_DIR/previous-app-token.txt" ]; then
              gh secret set SLACK_APP_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/previous-app-token.txt" >/dev/null 2>&1 || true
            fi
          }

          trap rollback ERR

          ensure_gh
          ensure_op
          if [ -z "${GH_TOKEN:-}" ]; then
            log "Missing GH_PAT for Slack secret sync and workflow dispatch"
            exit 1
          fi

          printf '%s' "${CURRENT_SLACK_BOT_TOKEN:-}" > "$BACKUP_DIR/previous-bot-token.txt"
          printf '%s' "${CURRENT_SLACK_APP_TOKEN:-}" > "$BACKUP_DIR/previous-app-token.txt"

          BOT_TOKEN=$(op read "op://homelab/slack/Bot/bot_token" 2>/dev/null || op read "op://homelab/slack/Bot/opencode_bot_token")
          APP_TOKEN=$(op read "op://homelab/slack/OpenCode Tokens/app_token" 2>/dev/null || op read "op://homelab/slack/OpenCodeTokens/app_token")
          printf '%s' "$BOT_TOKEN" > "$BACKUP_DIR/new-bot-token.txt"
          printf '%s' "$APP_TOKEN" > "$BACKUP_DIR/new-app-token.txt"

          gh secret set SLACK_BOT_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/new-bot-token.txt"
          gh secret set SLACK_APP_TOKEN --repo "$GITHUB_REPOSITORY" < "$BACKUP_DIR/new-app-token.txt"
          dispatch_and_wait slack-apply.yml
          log "Slack bot/app tokens synced from 1Password and verified with slack-apply.yml"

          {
            echo "## Slack Token Refresh"
            echo ""
            echo "- Runbook: \`${ROTATION_RUNBOOK}\`"
            echo "- GitHub secrets updated: \`SLACK_BOT_TOKEN\`, \`SLACK_APP_TOKEN\`"
            echo "- Verification: \`slack-apply.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-slack
          path: ${{ runner.temp }}/credential-rotation/slack/report
          if-no-files-found: ignore

