            echo "- Verification workflow: \`$(cat "$REPORT_DIR/verified-workflow.txt")\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted audit log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: credential-rotation-youtube
          path: ${{ runner.temp }}/credential-rotation/youtube/report
          if-no-files-found: ignore

  notify:
    name: Notify and Audit
    runs-on: ubuntu-latest
    if: always()
    needs:
      - prepare
      - rotate_1password
      - rotate_cloudflare
      - rotate_github
      - rotate_n8n
      - rotate_runner
      - rotate_synology
      - rotate_slack
      - rotate_youtube
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: false

      - name: Build summary
        id: summary
        run: |
          failures=0
          {
            echo "## Credential Rotation Results"
            echo ""
            echo "| Credential | Result |"
            echo "|------------|--------|"
            echo "| 1Password service account | ${{ needs.rotate_1password.result }} |"
            echo "| Cloudflare API token | ${{ needs.rotate_cloudflare.result }} |"
            echo "| GitHub PAT | ${{ needs.rotate_github.result }} |"
            echo "| n8n MCP API key | ${{ needs.rotate_n8n.result }} |"
            echo "| GitHub runner token | ${{ needs.rotate_runner.result }} |"
            echo "| Synology credentials | ${{ needs.rotate_synology.result }} |"
            echo "| Slack tokens | ${{ needs.rotate_slack.result }} |"
            echo "| YouTube OAuth | ${{ needs.rotate_youtube.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          for result in \
            "${{ needs.rotate_1password.result }}" \
            "${{ needs.rotate_cloudflare.result }}" \
            "${{ needs.rotate_github.result }}" \
            "${{ needs.rotate_n8n.result }}" \
            "${{ needs.rotate_runner.result }}" \
            "${{ needs.rotate_synology.result }}" \
            "${{ needs.rotate_slack.result }}" \
            "${{ needs.rotate_youtube.result }}"; do
            if [ "$result" = "failure" ]; then
              failures=$((failures + 1))
            fi
          done
          echo "failures=$failures" >> "$GITHUB_OUTPUT"

      - name: Create failure issue
        if: steps.summary.outputs.failures != '0'
        uses: ./.github/actions/notify-failure
        with:
          title-prefix: "[Credential Rotation] Failure"
          labels: "bug,automation,infrastructure"
          custom-body: |
            ## Credential Rotation Failure

            **Runbook:** `${{ env.ROTATION_RUNBOOK }}`
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **Mode:** `${{ needs.prepare.outputs.mode }}`
            **Selection:** `${{ needs.prepare.outputs.selected }}`

            | Credential | Result |
            |------------|--------|
            | 1Password service account | `${{ needs.rotate_1password.result }}` |
            | Cloudflare API token | `${{ needs.rotate_cloudflare.result }}` |
            | GitHub PAT | `${{ needs.rotate_github.result }}` |
            | n8n MCP API key | `${{ needs.rotate_n8n.result }}` |
            | GitHub runner token | `${{ needs.rotate_runner.result }}` |
            | Synology credentials | `${{ needs.rotate_synology.result }}` |
            | Slack tokens | `${{ needs.rotate_slack.result }}` |
            | YouTube OAuth | `${{ needs.rotate_youtube.result }}` |

            ### Safety Notes

            - [x] Each mutating job captured a pre-rotation backup before changing GitHub or runtime state.
            - [x] Each mutating job includes rollback-on-error before the workflow is marked failed.
            - [ ] Review the uploaded redacted audit artifacts for the failed credential family.

      - name: Record success audit
        if: steps.summary.outputs.failures == '0'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = 'Credential Rotation Audit Log';
            const body = [
              '## Credential Rotation Success',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Mode:** ${{ needs.prepare.outputs.mode }}`,
              `**Selection:** ${{ needs.prepare.outputs.selected }}`,
              '',
              '| Credential | Result |',
              '|------------|--------|',
              `| 1Password service account | ${{ needs.rotate_1password.result }} |`,
              `| Cloudflare API token | ${{ needs.rotate_cloudflare.result }} |`,
              `| GitHub PAT | ${{ needs.rotate_github.result }} |`,
              `| n8n MCP API key | ${{ needs.rotate_n8n.result }} |`,
              `| GitHub runner token | ${{ needs.rotate_runner.result }} |`,
              `| Synology credentials | ${{ needs.rotate_synology.result }} |`,
              `| Slack tokens | ${{ needs.rotate_slack.result }} |`,
              `| YouTube OAuth | ${{ needs.rotate_youtube.result }} |`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation,infrastructure',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automation', 'infrastructure'],
              });
            }
