name: Cloudflare Apply

on:
  push:
    branches:
      - master
    paths:
      - "300-cloudflare/**"
  workflow_dispatch:
permissions:
  contents: read
  issues: write

concurrency:
  group: cloudflare-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      service-name: Cloudflare
      working-directory: 300-cloudflare
      failure-title-prefix: "[Cloudflare] Apply failed on master"
      failure-extra-body: |
        **Workspace:** `300-cloudflare`

        ### Checklist
        - [ ] Verify Cloudflare API credentials
        - [ ] Verify 1Password service account token is valid
        - [ ] Run `terraform plan` locally to diagnose
        - [ ] Fix and re-apply, or revert the commit
      failure-labels: "terraform-drift,automated,infrastructure"
    secrets: inherit # pragma: allowlist secret
