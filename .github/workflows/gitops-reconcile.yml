name: GitOps Reconcile

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        type: choice
        options:
          - dry-run
          - reconcile
        default: dry-run
      workspaces:
        description: "Optional comma-separated workspace selectors (traefik, archon, github, proxmox)"
        type: string
        default: ""
      source_commit:
        description: "Optional controller-tracked source commit"
        type: string
        default: ""

permissions:
  actions: write
  contents: read

concurrency:
  group: gitops-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    uses: ./.github/workflows/_gitops-reconcile.yml
    with:
      mode: ${{ inputs.mode }}
      workspaces: ${{ inputs.workspaces }}
      source_commit: ${{ inputs.source_commit }}
