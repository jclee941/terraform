filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/*.log
      - /var/log/syslog
    fields:
      service: system
    fields_under_root: true
    max_bytes: 500000

  - type: log
    enabled: true
    paths:
      - /var/log/auth.log
    fields:
      service: auth
    fields_under_root: true
    max_bytes: 500000

  - type: log
    enabled: true
    paths:
      - /home/jclee/.local/share/opencode/log/*.log
    fields:
      service: opencode
    fields_under_root: true
    max_bytes: 500000

output.logstash:
  hosts: ["192.168.50.105:5044"]

processors:
  - add_host_metadata: ~

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
