services:
  web:
    image: glitchtip/glitchtip:v6.0.3
    container_name: glitchtip-web
    env_file:
      - ./glitchtip.env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: ["./bin/start.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/0/organizations/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: glitchtip/glitchtip:v6.0.3
    container_name: glitchtip-worker
    env_file:
      - ./glitchtip.env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: ["./bin/run-celery-with-beat.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A glitchtip inspect ping --timeout 10 2>/dev/null | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s

  postgres:
    image: postgres:15-alpine
    container_name: glitchtip-postgres
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - glitchtip_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - glitchtip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

volumes:
  glitchtip_postgres_data:
    driver: local
  glitchtip_redis_data:
    driver: local
