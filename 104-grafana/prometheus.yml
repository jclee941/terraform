# REFERENCE ONLY — deployed via templates/prometheus.yml.tftpl + config-renderer.
# Rendered output: tf-configs/prometheus.yml. Do not edit this file directly.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "traefik"
    metrics_path: /metrics
    static_configs:
      - targets: ["192.168.50.102:8080"]

  - job_name: "infrastructure-nodes"
    static_configs:
      - targets:
          - "192.168.50.101:9100" # runner
          - "192.168.50.102:9100" # traefik
          - "192.168.50.104:9100" # grafana
          - "192.168.50.105:9100" # elk
          - "192.168.50.106:9100" # glitchtip
          - "192.168.50.107:9100" # supabase
          - "192.168.50.108:9100" # archon
          - "192.168.50.112:9100" # mcphub
          - "192.168.50.200:9100" # oc
          - "192.168.50.220:9100" # sandbox

  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "http://192.168.50.112:5678/healthz" # n8n
          - "http://192.168.50.106:8000/_health/" # glitchtip
          - "http://192.168.50.112:3000" # mcphub
          - "http://192.168.50.102:8080/api/overview" # traefik
          - "http://elastic:placeholder@192.168.50.105:9200/_cluster/health" # elasticsearch
          - "http://192.168.50.104:3000/api/health" # grafana
          - "http://192.168.50.107:8000/rest/v1/" # supabase
          - "http://192.168.50.108:3737" # archon
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
