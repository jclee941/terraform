  - name: infrastructure-health
    folder: Alerting
    interval: 1m
    rules:
      - uid: service-down
        title: Service Down (HTTP Probe Failed)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: probe_success == 0
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "{{ $labels.service }} is DOWN"
          description: "HTTP probe to {{ $labels.instance }} has been failing for more than 2 minutes"
        labels:
          severity: critical

      - uid: disk-usage-high
        title: Disk Usage High (>80%)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: '(1 - node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"}) * 100'
              intervalMs: 30000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 80
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Disk usage above 80% on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is at {{ $values.B.Value | printf \"%.1f\" }}%"
        labels:
          severity: warning

      - uid: disk-usage-critical
        title: Disk Usage Critical (>90%)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: '(1 - node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"}) * 100'
              intervalMs: 30000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "CRITICAL: Disk usage above 90% on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is at {{ $values.B.Value | printf \"%.1f\" }}%"
        labels:
          severity: critical

      - uid: ssl-cert-expiry
        title: SSL Certificate Expiring Soon (<7 days)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 7
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: "SSL certificate expiring soon for {{ $labels.instance }}"
          description: "Certificate for {{ $labels.instance }} expires in {{ $values.B.Value | printf \"%.1f\" }} days"
        labels:
          severity: warning

      - uid: memory-pressure
        title: Memory Pressure High (>85%)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: '(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100'
              intervalMs: 30000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Memory pressure above 85% on {{ $labels.instance }}"
          description: "Available memory on {{ $labels.instance }} is at {{ $values.B.Value | printf \"%.1f\" }}% utilization"
        labels:
          severity: warning

      - uid: container-restart-loop
        title: Container Restart Loop Detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: P31C819B24CF3C3C7
            model:
              query: 'message:("container restart" OR "Restarting" OR "unhealthy" OR "OOMKilled") AND host:(supabase OR archon OR mcphub OR elk OR grafana)'
              alias: ""
              bucketAggs:
                - field: "@timestamp"
                  id: "2"
                  settings:
                    interval: auto
                  type: date_histogram
              metrics:
                - id: "1"
                  type: count
              timeField: "@timestamp"
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: sum
              settings:
                mode: dropNN
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Container restart loop detected"
          description: "{{ $values.B.Value }} container restart events in the last hour across Docker hosts"
        labels:
          severity: warning
