# DISABLED: Grafana alerting now handles this detection (critical-error-spike rule, exact overlap).
is_enabled: false
name: critical-error-spike
type: frequency
index: logs-*
num_events: 5
timeframe:
  minutes: 1
filter:
  - query:
      query_string:
        query: "level:fatal OR level:FATAL OR level:panic OR level:PANIC"
alert:
  - http_post
http_post_url: "http://192.168.50.106:8000/api/1/store/"
http_post_headers:
  Content-Type: "application/json"
  X-Sentry-Auth: "Sentry sentry_key=${GLITCHTIP_SENTRY_KEY},sentry_version=7"
http_post_payload:
  event_id: "{match[_id]}"
  timestamp: "{match[@timestamp]}"
  level: "fatal"
  logger: "elastalert"
  platform: "other"
  server_name: "{match[host][name]}"
  message: "Critical Error Spike: {num_matches} fatal/panic events in 1 minute on {match[service]}"
  tags:
    alert_rule: "critical-error-spike"
    service: "{match[service]}"
    tier: "critical"
    source: "elastalert"
  extra:
    num_matches: "{num_matches}"
    error_code: "{match[error_code]}"
http_post_static_payload:
  platform: "other"
  logger: "elastalert"
