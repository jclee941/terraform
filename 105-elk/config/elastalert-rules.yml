# =============================================================================
# DEPRECATED: This consolidated rules file is NOT used by ElastAlert.
#
# Docker mounts the elastalert-rules/ DIRECTORY (individual rule files):
#   - elastalert-rules/high-error-rate.yml
#   - elastalert-rules/critical-error-spike.yml
#   - elastalert-rules/gateway-errors.yml
#   - elastalert-rules/mcp-errors.yml
#
# This file is kept for reference only. Edit the individual files above instead.
# See: docker-compose.yml → elastalert → volumes
# =============================================================================

rules:
  - name: high-error-rate
    type: frequency
    index: logs-*
    num_events: 50
    timeframe:
      minutes: 5
    filter:
      - query:
          query_string:
            query: "level:error OR level:ERROR"
    alert:
      - http_post
    http_post_url: "http://192.168.50.106:8000/api/1/store/"
    http_post_headers:
      Content-Type: "application/json"
      X-Sentry-Auth: "Sentry sentry_key=${GLITCHTIP_SENTRY_KEY},sentry_version=7"
    http_post_payload:
      event_id: "{match[_id]}"
      timestamp: "{match[@timestamp]}"
      level: "error"
      logger: "elastalert"
      platform: "other"
      server_name: "{match[host][name]}"
      message: "High Error Rate: {num_matches} errors in 5 minutes on {match[service]}"
      tags:
        alert_rule: "high-error-rate"
        service: "{match[service]}"
        tier: "{match[tier]}"
        source: "elastalert"
      extra:
        num_matches: "{num_matches}"
        error_code: "{match[error_code]}"
    http_post_static_payload:
      platform: "other"
      logger: "elastalert"

  - name: critical-error-spike
    type: frequency
    index: logs-*
    num_events: 5
    timeframe:
      minutes: 1
    filter:
      - query:
          query_string:
            query: "level:fatal OR level:FATAL OR level:panic OR level:PANIC"
    alert:
      - http_post
    http_post_url: "http://192.168.50.106:8000/api/1/store/"
    http_post_headers:
      Content-Type: "application/json"
      X-Sentry-Auth: "Sentry sentry_key=${GLITCHTIP_SENTRY_KEY},sentry_version=7"
    http_post_payload:
      event_id: "{match[_id]}"
      timestamp: "{match[@timestamp]}"
      level: "fatal"
      logger: "elastalert"
      platform: "other"
      server_name: "{match[host][name]}"
      message: "CRITICAL: {num_matches} fatal/panic events in 1 minute on {match[service]}"
      tags:
        alert_rule: "critical-error-spike"
        service: "{match[service]}"
        tier: "CRITICAL_FAILURE"
        source: "elastalert"
      extra:
        num_matches: "{num_matches}"
    http_post_static_payload:
      platform: "other"
      logger: "elastalert"

  - name: gateway-errors
    type: frequency
    index: logs-*
    num_events: 10
    timeframe:
      minutes: 5
    filter:
      - query:
          query_string:
            query: "error_code:GATEWAY_ERROR"
    alert:
      - http_post
    http_post_url: "http://192.168.50.106:8000/api/1/store/"
    http_post_headers:
      Content-Type: "application/json"
      X-Sentry-Auth: "Sentry sentry_key=${GLITCHTIP_SENTRY_KEY},sentry_version=7"
    http_post_payload:
      event_id: "{match[_id]}"
      timestamp: "{match[@timestamp]}"
      level: "error"
      logger: "elastalert"
      platform: "other"
      server_name: "{match[host][name]}"
      message: "Gateway Errors: {num_matches} gateway errors in 5 minutes"
      tags:
        alert_rule: "gateway-errors"
        service: "traefik"
        tier: "GATEWAY_ERROR"
        source: "elastalert"
      extra:
        num_matches: "{num_matches}"
        error_code: "{match[error_code]}"
    http_post_static_payload:
      platform: "other"
      logger: "elastalert"

  - name: mcp-errors
    type: frequency
    index: logs-*
    num_events: 5
    timeframe:
      minutes: 5
    filter:
      - terms:
          service: ["mcp", "mcphub"]
      - query:
          query_string:
            query: "level:error OR level:ERROR"
    alert:
      - http_post
    http_post_url: "http://192.168.50.106:8000/api/1/store/"
    http_post_headers:
      Content-Type: "application/json"
      X-Sentry-Auth: "Sentry sentry_key=${GLITCHTIP_SENTRY_KEY},sentry_version=7"
    http_post_payload:
      event_id: "{match[_id]}"
      timestamp: "{match[@timestamp]}"
      level: "error"
      logger: "elastalert"
      platform: "other"
      server_name: "{match[host][name]}"
      message: "MCP Errors: {num_matches} errors in 5 minutes on {match[service]}"
      tags:
        alert_rule: "mcp-errors"
        service: "mcp"
        tier: "{match[tier]}"
        source: "elastalert"
      extra:
        num_matches: "{num_matches}"
        error_code: "{match[error_code]}"
    http_post_static_payload:
      platform: "other"
      logger: "elastalert"
