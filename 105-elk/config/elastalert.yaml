# ElastAlert2 Configuration
# Base config for connecting to Elasticsearch

rules_folder: /opt/elastalert/rules
run_every:
  minutes: 1
buffer_time:
  minutes: 15

es_host: elasticsearch
es_port: 9200

writeback_index: elastalert_status
writeback_alias: elastalert_status

alert_time_limit:
  days: 2
